<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Comisiones · Residencial</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="/js/fetch-interceptor.js" defer></script>
  <script src="/js/sidebar-loader.js?v=20260715b" defer></script>
  <script src="/js/logout-handler.js" defer></script>
  <script src="/js/user-info.js" defer></script>
  <style>
    :root {
      --bg:        #f1f3f7;
      --surface:   #ffffff;
      --surface2:  #f8f9fb;
      --border:    rgba(0,0,0,.07);
      --border2:   rgba(0,0,0,.12);
      --ink:       #0c0e14;
      --ink2:      #4a5068;
      --ink3:      #9098b0;
      --gold:      #c49a00;
      --gold-dim:  rgba(196,154,0,.09);
      --gold-glow: rgba(196,154,0,.2);
      --green:     #16a34a;
      --green-dim: rgba(22,163,74,.1);
      --red:       #dc2626;
      --red-dim:   rgba(220,38,38,.09);
      --blue:      #2563eb;
      --blue-dim:  rgba(37,99,235,.09);
      --nav-w:     220px;
      --f:         'Syne', sans-serif;
      --fm:        'DM Mono', monospace;
      --r:         10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      font-family: var(--f);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: var(--nav-w); min-height: 100vh; position: fixed; top:0; left:0; z-index:200; background:var(--ink); }
    .main { margin-left: var(--nav-w); flex:1; padding: 28px 32px 60px; max-width: 1400px; }

    /* ── Header ── */
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px; gap: 16px; flex-wrap: wrap;
    }
    .page-title-block { display: flex; flex-direction: column; gap: 4px; }
    .page-eyebrow {
      font-size: .68rem; font-weight: 700; letter-spacing: .15em;
      text-transform: uppercase; color: var(--gold); font-family: var(--fm);
    }
    .page-title {
      font-size: 1.8rem; font-weight: 800; letter-spacing: -.03em; color: var(--ink);
      line-height: 1;
    }
    .page-subtitle { font-size: .8rem; color: var(--ink2); margin-top: 2px; }

    /* ── Month picker ── */
    .month-nav {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: var(--r); padding: 4px;
    }
    .month-btn {
      width: 30px; height: 30px; border-radius: 6px; border: none;
      background: transparent; color: var(--ink2); cursor: pointer; font-size: .9rem;
      display: flex; align-items: center; justify-content: center; transition: all .12s;
    }
    .month-btn:hover { background: var(--border2); color: var(--ink); }
    .month-label {
      font-family: var(--fm); font-size: .82rem; font-weight: 500;
      color: var(--ink); padding: 0 10px; min-width: 110px; text-align: center;
    }

    /* ── View toggle (admin only) ── */
    .view-toggle {
      display: flex; gap: 4px; background: var(--surface2);
      border: 1px solid var(--border2); border-radius: var(--r); padding: 4px;
    }
    .vtab {
      padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer;
      font-family: var(--f); font-size: .75rem; font-weight: 700;
      color: var(--ink2); background: transparent; transition: all .12s; letter-spacing: .03em;
    }
    .vtab.active { background: var(--gold); color: #000; }

    /* ── KPI Strip ── */
    .kpi-strip {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px; margin-bottom: 28px;
    }
    .kpi-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 16px 18px;
      display: flex; flex-direction: column; gap: 6px;
      transition: border-color .15s;
    }
    .kpi-card:hover { border-color: var(--border2); }
    .kpi-card.gold { border-color: rgba(245,200,66,.3); background: var(--gold-dim); }
    .kpi-card.green { border-color: rgba(34,197,94,.3); background: var(--green-dim); }
    .kpi-lbl { font-size: .65rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--ink3); }
    .kpi-val { font-size: 1.6rem; font-weight: 800; letter-spacing: -.03em; color: var(--ink); font-family: var(--fm); }
    .kpi-val.gold { color: var(--gold); }
    .kpi-val.green { color: var(--green); }
    .kpi-sub { font-size: .68rem; color: var(--ink2); }

    /* ── Escala badge ── */
    .escala-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--gold-dim); border: 1px solid rgba(245,200,66,.35);
      border-radius: var(--r); padding: 8px 14px;
      font-family: var(--fm); font-size: .78rem; font-weight: 500; color: var(--gold);
    }
    .escala-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); flex-shrink:0; }

    /* ── Section ── */
    .section { margin-bottom: 32px; }
    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; gap: 12px; flex-wrap: wrap;
    }
    .section-title {
      font-size: .72rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--ink2);
      display: flex; align-items: center; gap: 8px;
    }
    .section-title::before { content:''; display:block; width:20px; height:2px; background:var(--gold); border-radius:2px; }

    /* ── Agent card (admin grid) ── */
    .agents-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 10px;
    }
    .agent-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px 16px; position: relative;
      transition: border-color .15s, transform .15s;
      cursor: default;
    }
    .agent-card:hover { border-color: var(--border2); transform: translateY(-1px); }
    .agent-card.no-meta { opacity: .55; }

    .agent-card-top { display: flex; align-items: center; gap: 9px; margin-bottom: 10px; }
    .agent-avatar {
      width: 32px; height: 32px; border-radius: 7px; flex-shrink: 0;
      background: var(--surface2); border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: .7rem; color: var(--gold); letter-spacing: .05em;
    }
    .agent-name { font-size: .78rem; font-weight: 700; color: var(--ink); }
    .agent-team { font-size: .62rem; color: var(--ink2); margin-top: 1px; }

    .agent-rows { display: flex; flex-direction: column; gap: 5px; }
    .agent-row { display: flex; justify-content: space-between; align-items: center; }
    .agent-row-lbl { font-size: .63rem; color: var(--ink2); }
    .agent-row-val { font-family: var(--fm); font-size: .7rem; font-weight: 500; color: var(--ink); }
    .agent-row-val.gold { color: var(--gold); }
    .agent-row-val.green { color: var(--green); }
    .agent-row-val.red { color: var(--red); }

    /* Progress bar */
    .prog-wrap { margin-top: 12px; }
    .prog-lbl { display: flex; justify-content: space-between; font-size: .65rem; color: var(--ink3); margin-bottom: 5px; }
    .prog-track { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--gold), #ffdf6b); transition: width .5s ease; }
    .prog-fill.green { background: linear-gradient(90deg, var(--green), #4ade80); }

    /* ══ MI VISTA — redesign ══════════════════════════ */

    /* Hero card */
    .sv-hero {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 16px; padding: 28px 32px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 24px; margin-bottom: 16px; position: relative; overflow: hidden;
    }
    .sv-hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 55% 80% at 90% 50%, rgba(196,154,0,.05) 0%, transparent 70%);
      pointer-events: none;
    }
    /* Admin nav wrapper */
    .sv-nav-wrap {
      display: flex; align-items: stretch; gap: 0; margin-bottom: 16px;
    }
    .sv-nav-wrap .sv-hero {
      flex: 1; margin-bottom: 0; border-radius: 0;
      border-left: none; border-right: none;
    }
    .sv-nav-btn {
      width: 44px; flex-shrink: 0;
      background: var(--surface); border: 1px solid var(--border2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; color: var(--ink2); transition: all .12s;
    }
    .sv-nav-btn:first-child { border-radius: 16px 0 0 16px; }
    .sv-nav-btn:last-child  { border-radius: 0 16px 16px 0; }
    .sv-nav-btn:hover { background: var(--surface2); color: var(--ink); }
    .sv-nav-btn:disabled { opacity: .3; cursor: default; }
    .sv-nav-counter {
      text-align: center; font-size: .62rem; color: var(--ink3);
      font-family: var(--fm); margin-top: 6px; margin-bottom: 10px;
    }

    .sv-hero-left { display: flex; align-items: center; gap: 18px; flex: 1; min-width: 0; }
    .sv-avatar {
      width: 52px; height: 52px; border-radius: 12px; flex-shrink: 0;
      background: var(--gold-dim); border: 1px solid rgba(196,154,0,.3);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1rem; color: var(--gold); letter-spacing: .04em;
    }
    .sv-agent-info { min-width: 0; }
    .sv-agent-name {
      font-size: 1.1rem; font-weight: 800; color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sv-agent-meta { font-size: .7rem; color: var(--ink3); margin-top: 3px; }
    .sv-escala-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--gold-dim); border: 1px solid rgba(196,154,0,.28);
      border-radius: 20px; padding: 4px 10px; margin-top: 8px;
      font-size: .63rem; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--gold);
    }
    .sv-escala-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
    .sv-hero-right { text-align: right; flex-shrink: 0; }
    .sv-comm-lbl {
      font-size: .6rem; font-weight: 700; letter-spacing: .14em;
      text-transform: uppercase; color: var(--ink3); margin-bottom: 6px;
    }
    .sv-comm-amount {
      font-family: var(--fm); font-size: 3.4rem; font-weight: 500;
      color: var(--gold); letter-spacing: -.04em; line-height: 1;
    }
    .sv-comm-amount.no-meta { color: var(--ink3); font-size: 2.4rem; }
    .sv-comm-basis { font-size: .7rem; color: var(--ink3); margin-top: 6px; }

    /* ── Mi Vista body layout ── */
    .sv-body {
      display: flex; flex-direction: column; gap: 14px;
    }
    /* Row 1: 4 stat cards */
    .sv-stats {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
    }
    /* Row 2: track (60%) + breakdown (40%) side by side */
    .sv-mid-row {
      display: grid; grid-template-columns: 1fr 320px; gap: 14px; align-items: start;
    }
    .sv-track-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 28px 32px 36px;
    }
    /* Breakdown */
    .sv-breakdown {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 26px 28px;
    }
    /* Row 3: Ventas table full width */
    .sv-ventas-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .sv-ventas-head {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      font-size: .62rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--ink3);
      display: flex; align-items: center; gap: 8px;
    }
    .sv-ventas-head::before { content:''; display:block; width:16px; height:2px; background:var(--gold); border-radius:2px; }
    .sv-vtable { width: 100%; border-collapse: collapse; font-size: .78rem; }
    .sv-vtable thead tr { background: var(--surface2); }
    .sv-vtable thead th {
      padding: 9px 16px; text-align: left; font-size: .6rem; font-weight: 700;
      letter-spacing: .09em; text-transform: uppercase; color: var(--ink3);
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    .sv-vtable tbody tr { border-bottom: 1px solid var(--border); transition: background .07s; }
    .sv-vtable tbody tr:last-child { border-bottom: none; }
    .sv-vtable tbody tr:hover { background: var(--surface2); }
    .sv-vtable tbody td { padding: 10px 16px; color: var(--ink2); vertical-align: middle; }
    .sv-vtable tbody td:first-child { color: var(--ink); font-weight: 600; }
    .sv-vbadge {
      display: inline-flex; padding: 2px 7px; border-radius: 20px;
      font-size: .6rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
    }
    .sv-vbadge.colchon { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(37,99,235,.2); }
    .sv-vbadge.venta   { background: var(--green-dim); color: var(--green); border: 1px solid rgba(22,163,74,.2); }

    .sv-stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 18px 20px;
      display: flex; flex-direction: column; gap: 6px;
      transition: border-color .12s;
    }
    .sv-stat:hover { border-color: var(--border2); }
    .sv-stat.accent-gold { border-color: rgba(196,154,0,.25); background: rgba(196,154,0,.04); }
    .sv-stat.accent-green { border-color: rgba(22,163,74,.25); background: rgba(22,163,74,.04); }
    .sv-stat-lbl {
      font-size: .6rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--ink3);
    }
    .sv-stat-val {
      font-family: var(--fm); font-size: 2rem; font-weight: 500;
      color: var(--ink); letter-spacing: -.03em; line-height: 1;
    }
    .sv-stat-val.gold { color: var(--gold); }
    .sv-stat-val.green { color: var(--green); }
    .sv-stat-sub { font-size: .62rem; color: var(--ink3); }

    /* Track */
    .sv-track-title {
      font-size: .62rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--ink3); margin-bottom: 36px;
      display: flex; align-items: center; gap: 8px;
    }
    .sv-track-title::before { content:''; display:block; width:16px; height:2px; background:var(--gold); border-radius:2px; }
    .sv-track-wrap { position: relative; padding: 0 0 38px; }
    .sv-track-line {
      position: absolute; top: 13px; left: 0; right: 0; height: 5px;
      background: var(--surface2); border-radius: 3px; overflow: hidden;
    }
    .sv-track-line-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, var(--green) 0%, #4ade80 100%);
      transition: width .8s cubic-bezier(.4,0,.2,1);
    }
    .sv-track-nodes {
      position: relative; display: flex; justify-content: space-between;
    }
    .sv-track-node { display: flex; flex-direction: column; align-items: center; }
    .sv-track-dot {
      width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border2);
      background: var(--surface2); display: flex; align-items: center; justify-content: center;
      font-size: .62rem; font-weight: 800; color: var(--ink3);
      transition: all .3s; position: relative; z-index: 1;
    }
    .sv-track-dot.reached {
      background: var(--green); border-color: var(--green);
      color: #fff; box-shadow: 0 0 0 5px rgba(22,163,74,.12);
    }
    .sv-track-dot.current {
      background: var(--gold); border-color: var(--gold);
      color: #000; box-shadow: 0 0 0 6px rgba(196,154,0,.18);
      width: 34px; height: 34px; font-size: .7rem;
    }
    .sv-track-node-lbl {
      margin-top: 10px; font-family: var(--fm); font-size: .7rem;
      font-weight: 600; color: var(--ink3); white-space: nowrap;
    }
    .sv-track-node-lbl.reached { color: var(--green); }
    .sv-track-node-lbl.current { color: var(--gold); }
    .sv-track-node-rate {
      font-size: .62rem; color: var(--ink3); margin-top: 4px; white-space: nowrap;
    }
    .sv-track-node-rate.reached { color: var(--green); }
    .sv-track-node-rate.current { color: var(--gold); font-weight: 700; }

    /* Breakdown */
    .sv-breakdown-title {
      font-size: .65rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--ink3); margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }
    .sv-breakdown-title::before { content:''; display:block; width:16px; height:2px; background:var(--gold); border-radius:2px; }
    .sv-breakdown-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 0; font-size: .9rem; color: var(--ink2);
      border-bottom: 1px solid var(--border);
    }
    .sv-breakdown-row:last-child { border-bottom: none; }
    .sv-breakdown-row.total {
      font-weight: 700; font-size: 1rem; color: var(--ink); padding-top: 16px;
    }
    .sv-breakdown-val { font-family: var(--fm); font-size: 1rem; font-weight: 600; color: var(--ink); }
    .sv-breakdown-val.gold { color: var(--gold); }
    .sv-breakdown-val.green { color: var(--green); font-size: 1.1rem; }

    @media (max-width: 900px) {
      .sv-mid-row { grid-template-columns: 1fr; }
      .sv-stats { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 700px) {
      .sv-hero { flex-direction: column; align-items: flex-start; }
      .sv-hero-right { text-align: left; }
      .sv-stats { grid-template-columns: 1fr 1fr; }
      .sv-comm-amount { font-size: 2.4rem; }
    }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden;
    }
    .ctable { width: 100%; border-collapse: collapse; font-size: .78rem; }
    .ctable thead tr { background: var(--surface2); }
    .ctable thead th {
      padding: 10px 14px; text-align: left; font-size: .62rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; color: var(--ink3);
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    .ctable tbody tr { border-bottom: 1px solid var(--border); transition: background .08s; }
    .ctable tbody tr:last-child { border-bottom: none; }
    .ctable tbody tr:hover { background: var(--surface2); }
    .ctable tbody td { padding: 11px 14px; color: var(--ink2); vertical-align: middle; }
    .ctable tbody td:first-child { color: var(--ink); font-weight: 600; }
    .mono { font-family: var(--fm); font-size: .76rem; }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 20px; font-size: .63rem; font-weight: 700;
      letter-spacing: .04em; text-transform: uppercase; white-space: nowrap;
    }
    .badge-gold { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(245,200,66,.3); }
    .badge-green { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,.3); }
    .badge-gray { background: rgba(255,255,255,.05); color: var(--ink2); border: 1px solid var(--border); }
    .sv-pay-strip { grid-template-columns: repeat(6,1fr) !important; }
    .sv-stat-input { position: relative; }
    .sv-input-wrap { display:flex; align-items:center; gap:4px; margin-top:4px; }
    .sv-input-prefix { font-size:1.1rem; font-weight:700; color:var(--ink2); }
    .sv-num-input {
      font-family:var(--fm); font-size:1.1rem; font-weight:700; color:var(--ink);
      border:none; border-bottom:2px solid var(--border2); background:transparent;
      outline:none; width:100%; padding:2px 0;
    }
    .sv-num-input:focus { border-bottom-color:var(--gold); }
    .badge-nuevo1 { background: rgba(37,99,235,.1); color: var(--blue); border: 1px solid rgba(37,99,235,.25); cursor:pointer; }
    .badge-nuevo2 { background: rgba(22,163,74,.1); color: var(--green); border: 1px solid rgba(22,163,74,.25); cursor:pointer; }
    .badge-regular { background: rgba(0,0,0,.05); color: var(--ink3); border: 1px solid var(--border); cursor:pointer; }

    /* ── Loading ── */
    .loader-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 60px 20px; color: var(--ink2); font-size: .8rem; }
    .spinner { width: 28px; height: 28px; border: 3px solid var(--border2); border-top-color: var(--gold); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty ── */
    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 48px 20px; color: var(--ink2); font-size: .78rem; text-align: center; }
    .empty-icon { font-size: 2rem; opacity: .4; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .main { margin-left: 0; padding: 16px; }
      .sidebar { display: none; }
      .agents-grid { grid-template-columns: 1fr; }
      .kpi-strip { grid-template-columns: repeat(2, 1fr); }
    }

<script>
/* ══════════════════════════════════════════════════════
   AUTH helpers
══════════════════════════════════════════════════════ */
const AUTH = (function(){
  function getUser(){ try{ return JSON.parse(localStorage.getItem('user')||sessionStorage.getItem('user')||'{}'); }catch(_){ return {}; } }
  function redirectLogin(){ sessionStorage.setItem('crm_redirect_after_login', window.location.pathname); window.location.replace('/login.html'); }
  async function verifySession(){
    try{
      const r = await fetch('/api/auth/verify-server', { credentials:'include' });
      if(!r.ok) return null;
      const d = await r.json();
      return d.authenticated ? (d.user || null) : null;
    }catch(_){ return null; }
  }
  async function sf(url,opts){
    try{
      const res=await fetch(url,Object.assign({ credentials:'include' },opts,{
        headers:Object.assign({'Content-Type':'application/json','X-Requested-With':'XMLHttpRequest'},(opts&&opts.headers)||{})
      }));
      if(res.status===401){ redirectLogin(); return null; }
      return res;
    }catch(e){ return null; }
  }
  return { getUser, verifySession, sf, redirectLogin };
})();

/* ══════════════════════════════════════════════════════
   ROLE HELPERS
══════════════════════════════════════════════════════ */
function isAdmin(role){
  const r=String(role||'').toLowerCase();
  return ['admin','administrador','administrator','administrativo','backoffice','back office','back_office','bo','b.o','rol_icon','rol-icon','rol_bamo'].some(v=>r===v||r.includes(v));
}
function isAgentRole(role){
  const r=String(role||'').toLowerCase();
  return ['agente','agent','agentes','vendedor','vendedores','seller'].some(v=>r===v||r.includes(v));
}
function isSupervisorRole(role){
  return String(role||'').toLowerCase().includes('supervisor');
}
// El supervisor (no admin) solo ve las comisiones de los agentes de SU equipo,
// definido por la "card de team" de la página de permisos (users.team) vía /api/teams/agents.
let _teamAgentKeys = null;   // Set de nombres normalizados; null = aún no cargado
function _agentMatchKey(s){
  return normalizeAgentName(String(s||'')).toLowerCase().replace(/\./g,' ').replace(/\s+/g,' ').trim();
}
async function _loadTeamScope(){
  _teamAgentKeys = null;
  if(isAdmin(_user?.role) || !isSupervisorRole(_user?.role)) return;
  try{
    const sid = _user?.username || _user?.name || _user?.id || '';
    const res = await AUTH.sf('/api/teams/agents?supervisor=' + encodeURIComponent(sid));
    const j = await res.json();
    const keys = new Set();
    ((j && j.data) || []).forEach(function(a){
      [a.name, a.username].forEach(function(v){ const k = _agentMatchKey(v); if(k) keys.add(k); });
    });
    _teamAgentKeys = keys;
  }catch(e){
    console.error('[comisiones] No se pudo cargar el equipo del supervisor:', e);
    _teamAgentKeys = new Set();  // ante fallo: no exponer agentes de otros equipos
  }
}
function _scopeAgentsForRole(){
  if(isAdmin(_user?.role) || !isSupervisorRole(_user?.role)) return;
  if(!_teamAgentKeys) return;  // aún sin cargar (se carga en init antes del primer loadData)
  _agents = _agents.filter(function(a){ return _teamAgentKeys.has(_agentMatchKey(a.rawName)); });
}

/* ══════════════════════════════════════════════════════
   COMMISSION FORMULA — RESIDENCIAL
   Solo cuenta: completed del mes + colchones completed
   Escala basada en puntos (floor):
     17-20 → $6/pto | 21-25 → $12/pto | 26-30 → $15/pto | 31+ → $18/pto
   Decimal bonus (solo si puntos >= 17):
     .25/.35 → +$2 | .45/.75 → +$3 | .80/.85 → +$4
══════════════════════════════════════════════════════ */
function calcComision(puntos) {
  const p = (typeof puntos === 'number' ? puntos : parseFloat(puntos||0)) || 0;
  if (p < 17) return 0;

  const base = Math.floor(p);
  let tasa = 0;
  if      (base >= 31) tasa = 18;
  else if (base >= 26) tasa = 15;
  else if (base >= 21) tasa = 12;
  else if (base >= 17) tasa = 6;

  const frac = parseFloat((p - base).toFixed(2));
  let bonus = 0;
  if (frac >= 0.85)      bonus = 4;
  else if (frac >= 0.80) bonus = 4;
  else if (frac >= 0.75) bonus = 3;
  else if (frac >= 0.45) bonus = 3;  // Changed from 0.50 to 0.45
  else if (frac >= 0.35) bonus = 2;
  else if (frac >= 0.25) bonus = 2;

  return (base * tasa) + bonus;
}

function getEscala(p) {
  if (p >= 31) return 'Escala 31+';
  if (p >= 26) return 'Escala 26-30';
  if (p >= 21) return 'Escala 21-25';
  if (p >= 17) return 'Escala 17-20';
  return 'Sin meta';
}

function getTasa(p) {
  if (p >= 31) return 18;
  if (p >= 26) return 15;
  if (p >= 21) return 12;
  if (p >= 17) return 6;
  return 0;
}

function getEscalaPct(p) {
  if (p >= 31) return 100;
  if (p >= 26) return Math.min(100, ((p-26)/(31-26))*100);
  if (p >= 21) return Math.min(100, ((p-21)/(26-21))*100);
  if (p >= 17) return Math.min(100, ((p-17)/(21-17))*100);
  return Math.min(100, (p/17)*100);
}

/* ══════════════════════════════════════════════════════
   AGENTE NUEVO LOGIC
   Mes 1: sin meta, todos los pts × $5 + bonus decimal
   Mes 2: meta 14 pts, desde 14 pts × $6 + bonus decimal
══════════════════════════════════════════════════════ */
function _bonusDecimal(p) {
  const frac = parseFloat((p - Math.floor(p)).toFixed(2));
  // Redondeo: 0.45 se trata como 0.50 y paga $3
  if (frac >= 0.80) return 4;
  if (frac >= 0.75) return 3;
  if (frac >= 0.45) return 3;  // Changed from 0.50 to 0.45 (includes 0.45-0.49 → $3)
  if (frac >= 0.35) return 2;
  if (frac >= 0.25) return 2;
  return 0;
}

function calcComisionNuevo(p, mes) {
  if (mes === 1) {
    // Mes 1: pts enteros × $10 + bonus decimal (misma tabla que regulares)
    return (Math.floor(p) * 10) + _bonusDecimal(p);
  }
  if (mes === 2) {
    // Mes 2: misma escala que regular pero meta mínima 14 pts
    if (p < 14) return 0;
    const base = Math.floor(p);
    let tasa = 0;
    if      (base >= 31) tasa = 18;
    else if (base >= 26) tasa = 15;
    else if (base >= 21) tasa = 12;
    else                 tasa = 6;
    return (base * tasa) + _bonusDecimal(p);
  }
  return calcComision(p);
}

function getEscalaNuevo(p, mes) {
  if (mes === 1) return 'Nuevo · Mes 1 ($10/pto)';
  if (mes === 2) {
    if (p < 14) return 'Sin meta (mín. 14)';
    if (p >= 31) return 'Nuevo M2 · 31+';
    if (p >= 26) return 'Nuevo M2 · 26-30';
    if (p >= 21) return 'Nuevo M2 · 21-25';
    return 'Nuevo M2 · 14-20';
  }
  return getEscala(p);
}

function getTasaNuevo(p, mes) {
  if (mes === 1) return 10;
  if (mes === 2) {
    if (p < 14) return 0;
    if (p >= 31) return 18;
    if (p >= 26) return 15;
    if (p >= 21) return 12;
    return 6;
  }
  return getTasa(p);
}

function getEscalaPctNuevo(p, mes) {
  if (mes === 1) return Math.min(100, (p / 25) * 100);
  if (mes === 2) return p < 14 ? Math.min(100, (p/14)*100) : getEscalaPct(p);
  return getEscalaPct(p);
}

// _usersCreatedAt: eliminado — ya no se llama /api/users/admin-list
// La detección de agentes nuevos usa override manual (localStorage) únicamente
let _usersCreatedAt = {};
async function loadUsersCreatedAt(){ /* no-op: removido para reducir llamadas API */ }

// Devuelve cuántos meses han pasado desde la creación del usuario hasta el mes visualizado
function getMonthsWorked(agentKey, targetYM){
  const createdAt = _usersCreatedAt[agentKey];
  if(!createdAt) {
    // console.log('[getMonthsWorked] No encontrado:', agentKey, '→ regular');
    return 99; // no encontrado → regular
  }
  const created = new Date(createdAt);
  const [ty, tm] = targetYM.split('-').map(Number);
  const months = (ty - created.getFullYear()) * 12 + (tm - (created.getMonth()+1));
  return months;
  // <0 → no existía aún, 0 → primer mes, 1 → segundo mes, 2+ → regular
}

// Tipo automático basado en createdAt, overrideable manualmente
// localStorage override: { 'agentkey': 1|2|99 }  99=forzar regular
function getNuevoMap() {
  try { return JSON.parse(localStorage.getItem('com_nuevo_map')||'{}'); } catch { return {}; }
}
function setAgentOverride(agentKey, val) {
  const m = getNuevoMap();
  if(val === null) delete m[agentKey]; else m[agentKey] = val;
  localStorage.setItem('com_nuevo_map', JSON.stringify(m));
}

function getAgentMes(agentKey, targetYM) {
  const overrides = getNuevoMap();
  if(agentKey in overrides) {
    const val = overrides[agentKey] === 99 ? 0 : overrides[agentKey];
    return val;
  }
  // Auto-detect por antigüedad relativa al mes visualizado
  const months = getMonthsWorked(agentKey, targetYM);
  let tipo = 0;
  if(months < 0) tipo = 0;  // no existía aún → regular
  else if(months === 0) tipo = 1; // primer mes
  else if(months === 1) tipo = 2; // segundo mes
  else tipo = 0; // 2+ meses → regular
  return tipo;
}

function normalizeStatus(s){
  const v=String(s||'').trim().toLowerCase();
  if(v==='completed'||v==='active'||v.includes('complet')||v.includes('activ')||v.includes('cerr')||v.includes('vend')) return 'completed';
  if(v==='cancelled'||v.includes('cancel')) return 'cancelled';
  if(v==='pending'||v.includes('pend')) return 'pending';
  if(v==='hold'||v.includes('hold')) return 'hold';
  if(v.includes('reserv')) return 'reserva';
  if(v.includes('resche')||v.includes('reagend')) return 'rescheduled';
  if(v.includes('oficin')) return 'oficina';
  return v;
}

function getYM(y,m){ return y+'-'+String(m).padStart(2,'0'); }

function isColchon(lead, targetYM){
  const dv=String(lead.dia_venta||lead.diaVenta||'').slice(0,7);
  const di=String(lead.dia_instalacion||lead.diaInstalacion||'').slice(0,7);
  if(!dv||!di) return false;
  return dv !== targetYM && di === targetYM;
}

// Cuenta para comisión: completed del mes + colchón completed
// REGLA: la venta cuenta en el mes en que se INSTALA, no en que se vende
// - Venta normal: dia_venta === targetYM Y dia_instalacion === targetYM (o sin instalación)
// - Colchón: dia_venta !== targetYM Y dia_instalacion === targetYM
// - Venta futura: dia_venta === targetYM pero dia_instalacion en mes siguiente → NO cuenta aún
function cuentaParaComision(lead, targetYM){
  // La comisión se controla por status_comision (columna independiente del status normal).
  // Fallback a status normal para registros previos a la columna (status_comision NULL/vacío).
  const sc = (lead.status_comision !== null && lead.status_comision !== undefined && lead.status_comision !== '')
    ? lead.status_comision : lead.status;
  const st = normalizeStatus(sc);
  if(st !== 'completed') return false;
  const dv = String(lead.dia_venta||lead.diaVenta||'').slice(0,7);
  const di = String(lead.dia_instalacion||lead.diaInstalacion||'').slice(0,7);

  // Colchón: vendido en mes anterior, instalado en targetYM → cuenta en targetYM
  if(isColchon(lead, targetYM)) return true;

  // Venta del mes: dia_venta === targetYM
  if(dv === targetYM){
    // Si tiene dia_instalacion en un mes FUTURO → no cuenta aún (será colchón del mes siguiente)
    if(di && di > targetYM) return false;
    return true;
  }

  return false;
}

function capName(s){
  return String(s||'').trim().split(/\s+/)
    .map(w=>w?w[0].toUpperCase()+w.slice(1).toLowerCase():'').join(' ');
}

function initials(name){
  return String(name||'').trim().split(/\s+/).slice(0,2)
    .map(w=>w[0]||'').join('').toUpperCase()||'??';
}

function fmtUSD(n){
  const v = typeof n==='number'?n:parseFloat(n||0)||0;
  return '$'+v.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
}

function normalizeAgentName(s){
  return String(s||'').replace(/\./g,' ').trim();
}

function normalizeStringForCompare(s){
  try{ return String(s||'').normalize('NFD').replace(/\p{Diacritic}+/gu,'').trim().toLowerCase().replace(/\s+/g,' '); }
  catch{ return String(s||'').trim().toLowerCase(); }
}

/* ══════════════════════════════════════════════════════
   AGGREGATE — calcula puntos y comisión por agente
   a partir de leads del mes
══════════════════════════════════════════════════════ */
function aggregateAgents(leads, targetYM){
  const map = {};
  leads.forEach(lead => {
    if(!cuentaParaComision(lead, targetYM)) return;

    const rawName = String(
      lead.agenteNombre || lead.agente || lead.createdBy || lead.creadoPor || lead.usuario || ''
    ).trim();
    if(!rawName) return;
    const normName = normalizeAgentName(rawName);
    const key = normName.toLowerCase();
    const pts = parseFloat(lead.puntaje||lead.score||lead.puntos||0)||0;
    const rawTeam = String(lead.supervisor||lead.equipo||lead.team||'').trim();
    const team = normalizeTeam(rawTeam);
    const esColchon = isColchon(lead, targetYM);

    if(!map[key]){
      map[key] = {
        name:     capName(normName),
        rawName:  normName,
        team:     team,
        puntos:   0,
        ventas:   0,
        colchones:0,
      };
    }
    map[key].puntos += pts;
    if(esColchon) map[key].colchones++;
    else map[key].ventas++;
    if(!map[key].team && team) map[key].team = team;
  });

  return Object.values(map).map(a => {
    const p = parseFloat(a.puntos.toFixed(2));
    const tipo = getAgentMes(a.rawName.toLowerCase().replace(/\./g,' ').trim(), targetYM);
    return {
      ...a,
      puntos: p,
      tipo,
      comision: tipo > 0 ? calcComisionNuevo(p, tipo) : calcComision(p),
      escala:   tipo > 0 ? getEscalaNuevo(p, tipo)    : getEscala(p),
      tasa:     tipo > 0 ? getTasaNuevo(p, tipo)       : getTasa(p),
      pct:      tipo > 0 ? getEscalaPctNuevo(p, tipo)  : getEscalaPct(p),
      totalVentas: a.ventas + a.colchones,
    };
  }).sort((a,b) => {
    // Primero los que comisionan (desc), luego los que no (desc por puntos)
    if(a.comision > 0 && b.comision === 0) return -1;
    if(b.comision > 0 && a.comision === 0) return 1;
    if(a.comision > 0 && b.comision > 0) return b.comision - a.comision;
    return b.puntos - a.puntos;
  });
}

    return { data: _agents[_agentIdx], isAdmin: true, idx: _agentIdx, total: _agents.length };
  }

  // Regular agent — match own name
  const userName = String(_user?.name||_user?.username||_user?.nombre||'').trim();
  const userNorm = normalizeAgentName(userName).toLowerCase();
  const userUsername = String(_user?.username||'').replace(/\./g,' ').trim().toLowerCase();

  const found = _agents.find(a => {
    const an = a.rawName.toLowerCase().replace(/\./g,' ').trim();
    const un = userNorm.replace(/\./g,' ').trim();
    if(an === un) return true;
    if(userUsername && an === userUsername) return true;
    const normWords = un.split(' ').filter(w=>w.length>2);
    const anWords   = an.split(' ').filter(w=>w.length>2);
    if(normWords.length === 0) return false;
    const allMatch = normWords.every(w => anWords.includes(w));
    return allMatch && Math.abs(normWords.length - anWords.length) <= 1;
  }) || {
    name: capName(userName)||'Mi usuario',
    rawName: userName || 'usuario',   // necesario: el código aguas abajo usa agentData.rawName.toLowerCase()

  };

  return { data: found, isAdmin: false, idx: -1, total: 0 };

  } else if (tipo === 2) {
    TRACK_MAX = 30;
    nodes = [
      { pts: 0,  label: '0',   rate: '—'     },
      { pts: 14, label: '14',  rate: '$6/pto'},
      { pts: 20, label: '20',  rate: '$6/pto'},
      { pts: 25, label: '25',  rate: '$6/pto'},
      { pts: 30, label: '30+', rate: '$6/pto'},
    ];
  } else {
    TRACK_MAX = 36;
    nodes = [
      { pts: 0,  label: '0',   rate: '—'      },
      { pts: 17, label: '17',  rate: '$6/pto' },
      { pts: 21, label: '21',  rate: '$12/pto'},
      { pts: 26, label: '26',  rate: '$15/pto'},
      { pts: 31, label: '31+', rate: '$18/pto'},
    ];
  }
  const trackPct = Math.min(100, (p / TRACK_MAX) * 100).toFixed(1);

  const nodesHtml = nodes.map((n, i) => {
    const reached = p >= n.pts && n.pts > 0;
    const isCurrent = i > 0 && p >= n.pts && (i === nodes.length - 1 || p < nodes[i+1]?.pts);
    const cls = isCurrent ? 'current' : (reached ? 'reached' : '');
    const dotTxt = n.pts === 0 ? '' : (isCurrent ? '✦' : (reached ? '✓' : ''));
    return `<div class="sv-track-node">
      <div class="sv-track-dot ${cls}">${dotTxt}</div>
      <div class="sv-track-node-lbl ${cls}">${n.label}</div>
      <div class="sv-track-node-rate ${cls}">${n.rate}</div>
    </div>`;
  }).join('');

  return `

          <span class="sv-input-prefix">$</span>
          ${canEditPay
            ? `<input id="kpi-cb-input" class="sv-num-input" type="number" min="0" step="0.01" placeholder="0.00"
                value="${_payInputs[payKey+'_cb']||''}"
                oninput="updatePayKPIs('${payKey}',${agentData.comision})"/>`
            : `<span id="kpi-cb-input" class="sv-num-input" style="pointer-events:none;border:none;color:var(--ink2)">${_payInputs[payKey+'_cb']||'0.00'}</span>`
          }
        </div>
        <div class="sv-stat-sub">Resta al total</div>
      </div>
      <div class="sv-stat accent-gold">
        <div class="sv-stat-lbl">Sub Total</div>
        <div class="sv-stat-val gold" id="kpi-subtotal">${excluido ? '$0.00' : fmtUSD2(agentData.comision)}</div>

        <div class="sv-stat-val" id="kpi-renta" style="color:var(--red)">${excluido ? '−$0.00' : '−'+fmtUSD2(agentData.comision*0.1)}</div>
        <div class="sv-stat-sub">10% del Sub Total</div>
      </div>
      <div class="sv-stat sv-stat-input">
        <div class="sv-stat-lbl">Anticipo <span style="font-size:.6rem;color:var(--ink3)">(manual)</span></div>
        <div class="sv-input-wrap">
          <span class="sv-input-prefix">$</span>
          ${canEditPay
            ? `<input id="kpi-anticipo-input" class="sv-num-input" type="number" min="0" step="0.01" placeholder="0.00"
                value="${_payInputs[payKey+'_ant']||''}"
                oninput="updatePayKPIs('${payKey}',${agentData.comision})"/>`
            : `<span id="kpi-anticipo-input" class="sv-num-input" style="pointer-events:none;border:none;color:var(--ink2)">${_payInputs[payKey+'_ant']||'0.00'}</span>`

    <!-- Row 1b: stats secundarios -->

const DCB_COLORS = ['oklch(68% 0.13 255)','oklch(72% 0.13 150)','oklch(72% 0.13 300)','oklch(78% 0.13 80)','oklch(72% 0.12 190)','oklch(68% 0.16 20)','oklch(75% 0.02 255)'];
const DCB_MESES = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
let _dashCache = {};   // ym → { pts, ventas, teamVentas:{team:n} } (meses ya consultados)
let _dashToken = 0;    // invalida cargas en vuelo al cambiar de mes

function esc(s){ const d=document.createElement('div'); d.textContent=String(s==null?'':s); return d.innerHTML; }

function dcbServiceName(lead){
  let s = lead.servicios;
  if(typeof s === 'string'){ try{ const j=JSON.parse(s); if(Array.isArray(j)) s=j; }catch(_){} }
  if(Array.isArray(s) && s.length) return String(s[0]||'').trim();
  return String(lead.tipo_servicio||lead.tipoServicio||'').trim();
}

// Agregados de un array de leads para un mes (mismo criterio que la comisión)
function dcbAggregates(leads, ym){
  let pts=0, ventas=0; const teamVentas={}; const productos={};
  (leads||[]).forEach(l=>{
    if(!cuentaParaComision(l, ym)) return;
    ventas++;
    const p = parseFloat(l.puntaje||l.score||l.puntos||0)||0;
    pts += p;
    const t = normalizeTeam(String(l.supervisor||l.equipo||l.team||'').trim()) || 'Sin equipo';
    teamVentas[t] = (teamVentas[t]||0)+1;
    const svc = dcbServiceName(l) || 'Sin producto';
    if(!productos[svc]) productos[svc] = { n:0, pts:0 };
    productos[svc].n++;
    productos[svc].pts += p;
  });
  return { pts: parseFloat(pts.toFixed(2)), ventas, teamVentas, productos };
}

function renderDcbKpis(){

    <div class="dcb-kpi" style="border-top:3px solid ${accent};">

      ${progressPct==null?'':`<div class="dcb-prog"><div style="width:${progressPct}%;background:${accent};"></div></div>`}
    </div>`;
  return `<div class="dcb dcb-kpis">
    ${k('AGENTES ACTIVOS', _agents.length, conMeta+' con meta de comisión', 'oklch(68% 0.13 255)', metaPct)}
    ${k('VENTAS TOTALES', totalVentas, 'completadas este mes', 'oklch(72% 0.13 150)', null)}

}

let _dcbProd = [];        // datos de la gráfica para los handlers de hover
let _dcbProdTotal = 0;
let _dcbOtrosOpen = false;

window.dcbProdHover = function(i){
  const svg=document.getElementById('dcb-prod-svg'); if(!svg) return;
  svg.classList.add('dcb-hl');
  svg.querySelectorAll('.dcb-arc').forEach((el,idx)=>el.classList.toggle('is-hl', idx===i));
  document.querySelectorAll('#dcb-prod-legend .dcb-legend-row').forEach((el,idx)=>el.classList.toggle('is-hl', idx===i));
  const p=_dcbProd[i]; if(!p) return;
  const v=document.getElementById('dcb-prod-val'), l=document.getElementById('dcb-prod-lbl');
  if(v){ v.textContent=p.value; v.setAttribute('fill', '#f1f5f9'); }
  if(l) l.textContent=(p.name.length>18?p.name.slice(0,17)+'…':p.name)+' · '+p.pts.toFixed(2)+' pts';
};
window.dcbProdLeave = function(){
  const svg=document.getElementById('dcb-prod-svg'); if(!svg) return;
  svg.classList.remove('dcb-hl');
  svg.querySelectorAll('.dcb-arc.is-hl').forEach(el=>el.classList.remove('is-hl'));
  document.querySelectorAll('#dcb-prod-legend .dcb-legend-row.is-hl').forEach(el=>el.classList.remove('is-hl'));
  const v=document.getElementById('dcb-prod-val'), l=document.getElementById('dcb-prod-lbl');
  if(v) v.textContent=_dcbProdTotal;
  if(l) l.textContent='ventas totales';
};
window.dcbToggleOtros = function(ev){
  if(ev) ev.stopPropagation();
  _dcbOtrosOpen = !_dcbOtrosOpen;
  const box=document.getElementById('dcb-otros-list');
  const tog=document.getElementById('dcb-otros-toggle');
  if(box) box.style.display=_dcbOtrosOpen?'block':'none';
  if(tog) tog.textContent=_dcbOtrosOpen?'▲ ocultar':'▼ detalle';
};

function renderDcbProductos(){
  const ym = getYM(_month.year, _month.month);
  const agg = dcbAggregates(_leads, ym);
  const entries = Object.entries(agg.productos).sort((a,b)=>b[1].n-a[1].n);
  const top = entries.slice(0,6);
  const otros = entries.slice(6);
  const restosN = otros.reduce((s,e)=>s+e[1].n,0);
  const restosPts = otros.reduce((s,e)=>s+e[1].pts,0);
  const total = entries.reduce((s,e)=>s+e[1].n,0);
  if(!total) return `<div class="dcb-card"><div class="dcb-card-head"><h3>Ventas por Producto</h3><span class="dcb-card-tag">RADIAL</span></div><div class="dcb-loading">Sin ventas completed este mes</div></div>`;

  const items = top.map(([name,d])=>({name, value:d.n, pts:d.pts}));
  if(restosN>0) items.push({name:'Otros productos', value:restosN, pts:restosPts, esOtros:true});

  // Donut segmentado: TODAS las porciones juntas cierran el círculo completo.
  const R=104, W=42, C=2*Math.PI*R, GAP=Math.min(5, C*0.008);
  let cum=0;
  _dcbProd = items.map((p,i)=>{
    const frac = p.value/total, pct = frac*100;
    const arc = Math.max(frac*C - GAP, 2);
    const start = cum*C; cum += frac;
    const color = p.esOtros ? 'oklch(75% 0.02 255)' : DCB_COLORS[i%DCB_COLORS.length];
    return { ...p, pct, color, arc, start };
  });
  _dcbProdTotal = total;

  const bg = `<circle cx="150" cy="150" r="${R}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="${W}"></circle>
    <circle cx="150" cy="150" r="${R-W/2-9}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="1.5"></circle>`;
  const arcs = _dcbProd.map((p,i)=>`<circle class="dcb-arc" cx="150" cy="150" r="${R}" fill="none" stroke="${p.color}" stroke-width="${W}"
    stroke-dasharray="${p.arc.toFixed(1)} ${(C-p.arc).toFixed(1)}" stroke-dashoffset="${(-p.start-GAP/2).toFixed(1)}" transform="rotate(-90 150 150)"
    style="animation-delay:${(i*90)}ms;color:${p.color};"
    onmouseenter="dcbProdHover(${i})" onmouseleave="dcbProdLeave()">
    <title>${esc(p.name)}: ${p.value} ventas · ${p.pts.toFixed(2)} pts (${p.pct.toFixed(1)}% del total)</title></circle>`).join('');

  const legend = _dcbProd.map((p,i)=>{
    const otrosBtn = p.esOtros
      ? `<span id="dcb-otros-toggle" class="dcb-otros-toggle dcb-t4" onclick="dcbToggleOtros(event)">${_dcbOtrosOpen?'▲ ocultar':'▼ detalle'}</span>` : '';
    const row = `
    <div class="dcb-legend-row" onmouseenter="dcbProdHover(${i})" onmouseleave="dcbProdLeave()" ${p.esOtros?'onclick="dcbToggleOtros(event)"':''}>
      <span class="dcb-legend-dot" style="background:${p.color};color:${p.color};"></span>
      <span class="dcb-t2" style="flex:1;">${esc(p.name)}${otrosBtn}</span>
      <span class="dcb-mono dcb-t3">${p.value}</span>
      <span class="dcb-mono dcb-t4" style="width:74px;text-align:right;">${p.pts.toFixed(2)} pts</span>
    </div>`;
    // Desglose exacto de "Otros productos"
    if(p.esOtros){
      const subs = otros.map(([n,d])=>`
        <div class="dcb-legend-sub">
          <span class="dcb-t3" style="flex:1;">${esc(n)}</span>
          <span class="dcb-mono dcb-t4">${d.n}</span>
          <span class="dcb-mono dcb-t4" style="width:74px;text-align:right;">${d.pts.toFixed(2)} pts</span>
        </div>`).join('');
      return row + `<div id="dcb-otros-list" style="display:${_dcbOtrosOpen?'block':'none'};border-left:2px solid rgba(255,255,255,.12);margin-left:9px;">${subs}</div>`;
    }
    return row;
  }).join('');

  return `<div class="dcb-card">
    <div class="dcb-card-head"><h3>Ventas por Producto</h3><span class="dcb-card-tag">RADIAL · ${entries.length} PRODUCTOS</span></div>
    <div class="dcb-radial-wrap">
      <svg id="dcb-prod-svg" width="210" height="210" viewBox="0 0 300 300" style="flex:0 0 auto;">
        ${bg}${arcs}
        <text id="dcb-prod-val" x="150" y="146" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-weight="700" font-size="30" fill="#f1f5f9">${total}</text>
        <text id="dcb-prod-lbl" x="150" y="168" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="#8fa0b8">ventas totales</text>
      </svg>
      <div class="dcb-legend" id="dcb-prod-legend">${legend}</div>
    </div>
  </div>`;
}

function renderDcbTeamsBody(){
  const ym = getYM(_month.year, _month.month);
  const agg = dcbAggregates(_leads, ym);
  // puntos por team desde _agents (ya agregados y con scope aplicado)
  const teamPts = {};
  _agents.forEach(a=>{ const t=a.team||'Sin equipo'; teamPts[t]=(teamPts[t]||0)+a.puntos; });
  const prev = (()=>{ let m=_month.month-1, y=_month.year; if(m<1){m=12;y--;} return _dashCache[getYM(y,m)]; })();
  const rows = Object.entries(agg.teamVentas).sort((a,b)=>b[1]-a[1]);
  if(!rows.length) return `<div class="dcb-loading">Sin ventas completed este mes</div>`;
  const maxScale = Math.max(...rows.map(([t,v])=>Math.max(v, (prev&&prev.teamVentas&&prev.teamVentas[t])||0))) || 1;
  return `<div class="dcb-teams">${rows.map(([t,v])=>{
    const meta = prev && prev.teamVentas ? (prev.teamVentas[t]||0) : null;
    const pts = (teamPts[t]||0).toFixed(2);
    const tip = `${t}: ${v} ventas · ${pts} pts${meta!=null?` (mes anterior ${meta})`:''}`;
    return `<div>
      <div class="dcb-team-lbl">
        <span class="dcb-t2" style="font-weight:600;">${esc(t)}</span>
        <span class="dcb-mono dcb-t3">${v} vtas · ${pts} pts</span>
      </div>
      <div class="dcb-bullet">
        <div class="dcb-bullet-fill" style="width:${(v/maxScale*100).toFixed(1)}%" title="${esc(tip)}"></div>
        ${meta!=null&&meta>0?`<div class="dcb-bullet-tick" style="left:${(meta/maxScale*100).toFixed(1)}%" title="Mes anterior: ${meta} ventas"></div>`:''}
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderDcbTrendBody(){
  // 6 meses terminando en el mes activo; usa _dashCache (el mes activo se calcula de _leads)
  const yms=[]; let y=_month.year, m=_month.month;
  for(let i=0;i<6;i++){ yms.unshift({ym:getYM(y,m), m}); m--; if(m<1){m=12;y--;} }
  const curYM = getYM(_month.year, _month.month);
  const vals = yms.map(o=> o.ym===curYM ? dcbAggregates(_leads,o.ym).pts : (_dashCache[o.ym]?_dashCache[o.ym].pts:null));
  if(vals.some(v=>v===null)) return `<div class="dcb-loading">Cargando tendencia…</div>`;

  const W=640,H=180,PX=14,PT=12,PB=30;
  const min=Math.min(...vals), max=Math.max(...vals), range=(max-min)||1;
  const pts = vals.map((v,i)=>({ x:PX+i*(W-2*PX)/(vals.length-1), y:PT+(1-(v-min)/range)*(H-PT-PB), v }));
  const line = pts.map((p,i)=>(i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`)).join(' ');
  const area = `${line} L${pts[pts.length-1].x},${H} L${pts[0].x},${H} Z`;
  const first = vals[0]||0;
  const delta = first>0 ? ((vals[vals.length-1]-first)/first*100) : 0;
  const deltaTxt = (delta>=0?'▲ ':'▼ ')+Math.abs(delta).toFixed(1)+'% vs. '+DCB_MESES[yms[0].m-1];
  const tagEl = document.getElementById('dcb-trend-delta'); if(tagEl) tagEl.textContent = deltaTxt;

  return `<svg width="100%" height="160" viewBox="0 0 640 180" preserveAspectRatio="none" style="margin-top:8px;overflow:visible;">
    ${[0.25,0.5,0.75,1].map(f=>`<line x1="0" x2="640" y1="${PT+f*(H-PT-PB)}" y2="${PT+f*(H-PT-PB)}" stroke="rgba(255,255,255,.08)" stroke-width="1"></line>`).join('')}
    <path d="${area}" fill="oklch(78% 0.13 80 / 0.16)"></path>
    <path d="${line}" fill="none" stroke="oklch(78% 0.13 80)" stroke-width="2.5"></path>
    ${pts.map((p,i)=>`
      <circle cx="${p.x}" cy="${p.y}" r="4.5" fill="#0b1526" stroke="oklch(78% 0.13 80)" stroke-width="2.5"><title>${DCB_MESES[yms[i].m-1]}: ${p.v.toFixed(2)} pts</title></circle>
      <text x="${p.x}" y="176" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10.5" fill="#8fa0b8">${DCB_MESES[yms[i].m-1]}</text>`).join('')}
  </svg>`;
}

let _dcbTopAll = false;
window.dcbToggleTop = function(){ _dcbTopAll = !_dcbTopAll; render(); };

function renderDcbTopAgentes(){
  const RANK1={bg:'oklch(80% 0.13 80)',color:'oklch(25% 0.05 80)'};
  const RANK2={bg:'oklch(88% 0.006 250)',color:'oklch(35% 0.02 255)'};
  const RANK3={bg:'oklch(78% 0.1 50)',color:'oklch(28% 0.05 50)'};
  const RANKN={bg:'rgba(255,255,255,.10)',color:'#cbd5e1'};
  const RANKS=i=> i===0?RANK1 : i===1?RANK2 : i===2?RANK3 : RANKN;
  const sorted = _agents.slice().sort((a,b)=>b.puntos-a.puntos);
  const top = _dcbTopAll ? sorted : sorted.slice(0,6);
  if(!top.length) return '';
  return `<div class="dcb-card" style="margin-bottom:16px;">
    <div class="dcb-card-head" style="margin-bottom:12px;"><h3>Top Agentes por Puntos</h3>
      <a href="#" class="dcb-card-tag" style="text-decoration:none;cursor:pointer;" onclick="dcbToggleTop();return false;">${_dcbTopAll?'Ver top 6 ←':'Ver todos →'}</a></div>
    <div class="dcb-top-grid">${top.map((a,i)=>`
      <div class="dcb-top-card">
        <div style="display:flex;align-items:center;gap:9px;">
          <div class="dcb-rank" style="background:${RANKS(i).bg};color:${RANKS(i).color};">${i+1}</div>
          <div style="min-width:0;">
            <div class="dcb-t1" style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(a.name)}</div>
            <div class="dcb-t4" style="font-size:10.5px;">${esc(a.team||'Sin equipo')}</div>
          </div>
        </div>
        <div class="dcb-mono dcb-t1" style="font-size:19px;font-weight:700;margin-top:10px;">${a.puntos.toFixed(2)}<span class="dcb-t4" style="font-size:11px;font-weight:500;"> pts</span></div>
        <div class="dcb-mono dcb-t4" style="display:flex;justify-content:space-between;font-size:10.5px;margin-top:6px;">
          <span class="dcb-t4">${a.totalVentas} vtas</span><span class="dcb-t4">${fmtUSD(a.comision)}</span>
        </div>
      </div>`).join('')}</div>
  </div>`;
}

function renderDashboard(){
  return `<div class="dcb">
    <div class="dcb-charts">
      ${renderDcbProductos()}
      <div class="dcb-card">
        <div class="dcb-card-head"><h3>Ventas y Puntos por Equipo</h3><span class="dcb-card-tag">BULLET · VS MES ANTERIOR</span></div>
        <div id="dcb-teams-body">${renderDcbTeamsBody()}</div>
      </div>
    </div>
    <div class="dcb-card" style="margin-bottom:16px;">
      <div class="dcb-card-head"><h3>Tendencia de Puntaje — Últimos 6 Meses</h3><span class="dcb-card-tag" id="dcb-trend-delta"></span></div>
      <div id="dcb-trend-body">${renderDcbTrendBody()}</div>
    </div>
    ${renderDcbTopAgentes()}
  </div>`;
}

// Carga en segundo plano los 5 meses previos (tendencia + metas de team)
async function loadDashDeferred(){
  const token = ++_dashToken;
  const months=[]; let y=_month.year, m=_month.month;
  for(let i=0;i<5;i++){ m--; if(m<1){m=12;y--;} months.push({y,m,ym:getYM(y,m)}); }
  const adminScope = isAdmin(_user?.role) ? '&scope=ranking' : '';
  await Promise.all(months.filter(mo=>!_dashCache[mo.ym]).map(async mo=>{
    try{
      const res = await AUTH.sf(`/api/leads?year=${mo.y}&month=${mo.m}${adminScope}`);
      if(!res||!res.ok) return;
      const data = await res.json();
      const leads = Array.isArray(data)?data:(data.data||data.leads||[]);
      _dashCache[mo.ym] = dcbAggregates(leads, mo.ym);
    }catch(_){}
  }));
  if(token!==_dashToken) return; // cambió el mes: descartar
  const tb=document.getElementById('dcb-trend-body'); if(tb) tb.innerHTML=renderDcbTrendBody();
  const teams=document.getElementById('dcb-teams-body'); if(teams) teams.innerHTML=renderDcbTeamsBody();
}

function render(){
  const container = document.getElementById('main-content');
  if(!container) return;

  const userIsAdmin = isAdmin(_user?.role);
  // El supervisor ve la grilla del equipo (ya filtrada a sus agentes), siempre en solo lectura.
  const isSup = !userIsAdmin && isSupervisorRole(_user?.role);
  const showAdminView = (userIsAdmin && _view === 'admin') || isSup;

  container.innerHTML = `
    <div class="page-header">
      <div class="page-title-block">
        <div class="page-eyebrow">Servicios Residenciales</div>
        <div class="page-title">Comisiones</div>
        <div class="page-subtitle">Cálculo basado en puntaje · solo ventas completed</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        ${renderMonthNav()}
        ${renderViewToggle()}
      </div>
    </div>
    ${showAdminView ? renderAdminView() : renderAgentSelfView()}`;
  // Dashboard (admin): completar tendencia y metas de team en segundo plano
  if(!_loading && showAdminView && userIsAdmin){
    setTimeout(loadDashDeferred, 0);
  }
  // Inicializar KPIs de pago DESPUÉS de que el DOM esté listo
  if(!_loading && !showAdminView){
    const ym = getYM(_month.year, _month.month);
    const {data: ad} = resolveAgentData();
    const agKey = (ad.rawName||ad.name||'').toLowerCase().replace(/\s+/g,'_');
    window.updatePayKPIs(ym+'_'+agKey, ad.comision);
  }
}

/* ══════════════════════════════════════════════════════
   ACTIONS
══════════════════════════════════════════════════════ */
window.changeMonth = function(delta){
  let {year, month} = _month;
  month += delta;
  if(month>12){ month=1; year++; }
  if(month<1){ month=12; year--; }
  _month = {year, month};
  loadData();
};

window.switchView = function(v){
  _view = v;
  if(v === 'agent') _agentIdx = 0; // admin siempre arranca en el primer agente
  render();
};

window.navAgent = function(delta){
  _agentIdx = Math.max(0, Math.min(_agents.length - 1, _agentIdx + delta));
  render();
};

/* ══════════════════════════════════════════════════════
   LOAD DATA
══════════════════════════════════════════════════════ */
async function loadData(){
  _loading = true;
  const leads = await fetchLeads();
  _leads = leads;
  const ym = getYM(_month.year, _month.month);
  _agents = aggregateAgents(leads, ym);
  _scopeAgentsForRole();
  _loading = false;
  render();
}

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
(async function init(){
  // ── Llamada 1: Auth desde localStorage (sin server call si hay sesión) ──
  let user = null;
  try {
    const cached = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || '{}');
    if (cached && cached.username) user = cached;
  } catch(_) {}

  if (!user) {
    // Solo ir al servidor si no hay sesión en localStorage
    user = await AUTH.verifySession();
    if (!user) { AUTH.redirectLogin(); return; }
    try { localStorage.setItem('user', JSON.stringify(user)); } catch(_) {}
  }

  _user = user;
  const role = String(_user?.role||'').toLowerCase();
  const allowed = isAdmin(role) || isAgentRole(role) || role.includes('supervisor');
  if (!allowed) {
    document.getElementById('main-content').innerHTML = `
      <div class="empty" style="height:60vh">
        <div class="empty-icon">🔒</div>
        <span>No tienes acceso a esta página</span>
      </div>`;
    return;
  }

  _view = isAdmin(role) ? 'admin' : 'agent';

  // Carga los agentes del equipo del supervisor (card de permisos) para acotar la vista.
  await _loadTeamScope();

  // ── Llamada 2: Leads del mes actual (filtrado, sin limit=10000) ──
  await loadData();
})();
</script>
