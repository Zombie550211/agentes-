<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Semáforo</title>
  <link rel="stylesheet" href="css/theme.css?v=20251124f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="css/sidebar-shared.css?v=20251124f">
  <script src="js/fetch-interceptor.js" defer></script>
  <script src="js/sidebar-loader.js" defer></script>
  <script src="js/logout-handler.js" defer></script>

  <style>
    /* ═══════════════════════════════════════════════
       TOKENS
    ═══════════════════════════════════════════════ */
    :root {
      --bg:         #f5f7fa;
      --surface:    #ffffff;
      --card:       #ffffff;
      --border:     #e2e8f0;
      --border2:    #cbd5e1;
      --text:       #0f172a;
      --muted:      #64748b;
      --muted2:     #94a3b8;

      --green:      #16a34a;
      --green-dim:  rgba(22,163,74,0.10);
      --green-glow: rgba(22,163,74,0.20);

      --yellow:     #d97706;
      --yellow-dim: rgba(217,119,6,0.10);
      --yellow-glow:rgba(217,119,6,0.20);

      --red:        #dc2626;
      --red-dim:    rgba(220,38,38,0.10);
      --red-glow:   rgba(220,38,38,0.20);

      --black-dim:  rgba(15,23,42,0.08);

      --accent:     #0284c7;
      --gold:       #d97706;

      --font-display: 'Bebas Neue', sans-serif;
      --font-body:    'Outfit', sans-serif;
      --sidebar-w:    260px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* subtle noise grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ═══════════════════════════════════════════════
       LAYOUT
    ═══════════════════════════════════════════════ */
    .layout {
      display: flex;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .main-content {
      margin-left: var(--sidebar-w);
      width: calc(100% - var(--sidebar-w));
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body.embed .main-content { margin-left: 0; width: 100%; }
    body.embed .sidebar { display: none; }

    .page-wrap {
      width: 100%;
      max-width: 1360px;
      margin: 0 auto;
      padding: 32px 32px 64px;
    }

    /* ═══════════════════════════════════════════════
       TOPBAR / HEADER
    ═══════════════════════════════════════════════ */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }

    .page-header-left h1 {
      font-family: var(--font-display);
      font-size: 52px;
      letter-spacing: 0.04em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 4px;
    }

    .page-header-left p {
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
    }

    .month-nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
    }

    .month-nav-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      transition: all .18s;
      display: flex; align-items: center; justify-content: center;
    }

    .month-nav-btn:hover {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .month-nav-label {
      min-width: 150px;
      text-align: center;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.06em;
      color: var(--text);
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      padding-top: 6px;
    }

    /* ═══════════════════════════════════════════════
       BUTTONS
    ═══════════════════════════════════════════════ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all .18s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }
    .btn-primary:hover { background: #fff; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(56,189,248,0.3); }

    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border2);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    .btn-ghost {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); }

    /* ═══════════════════════════════════════════════
       METRICS STRIP
    ═══════════════════════════════════════════════ */
    .metrics-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .metric-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
      transition: border-color .2s;
    }

    .metric-card::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
    }

    .metric-card.mc-green::before  { background: var(--green); }
    .metric-card.mc-yellow::before { background: var(--yellow); }
    .metric-card.mc-red::before    { background: var(--red); }
    .metric-card.mc-blue::before   { background: var(--accent); }

    .metric-card:hover { border-color: var(--border2); }

    .metric-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .metric-value {
      font-family: var(--font-display);
      font-size: 42px;
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--text);
    }

    .metric-card.mc-green  .metric-value { color: var(--green); }
    .metric-card.mc-yellow .metric-value { color: var(--yellow); }
    .metric-card.mc-red    .metric-value { color: var(--red); }
    .metric-card.mc-blue   .metric-value { color: var(--accent); }

    /* ═══════════════════════════════════════════════
       VIEW STACK
    ═══════════════════════════════════════════════ */
    .view-stack { position: relative; }

    .view-panel {
      width: 100%;
      transition: opacity .25s ease, transform .25s ease;
    }

    .view-panel.is-hidden {
      position: absolute;
      top: 0; left: 0;
      opacity: 0;
      transform: translateY(8px) scale(0.99);
      pointer-events: none;
    }

    .view-panel.is-visible {
      opacity: 1;
      transform: none;
      pointer-events: auto;
    }

    /* ═══════════════════════════════════════════════
       RANKING ROWS
    ═══════════════════════════════════════════════ */
    .ranking-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ranking-row {
      display: grid;
      grid-template-columns: 56px 1fr 120px 120px 200px;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      border-radius: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 4px solid transparent;
      transition: all .2s;
      position: relative;
      overflow: hidden;
      animation: slideIn .3s ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .ranking-row:nth-child(1) { animation-delay: .05s }
    .ranking-row:nth-child(2) { animation-delay: .10s }
    .ranking-row:nth-child(3) { animation-delay: .15s }
    .ranking-row:nth-child(4) { animation-delay: .20s }
    .ranking-row:nth-child(5) { animation-delay: .25s }

    .ranking-row:hover { transform: translateX(4px); border-color: var(--border2); }

    .ranking-row.row-top     { border-left-color: var(--green);  background: linear-gradient(90deg, rgba(34,197,94,0.06) 0%, var(--card) 40%); }
    .ranking-row.row-warning { border-left-color: var(--yellow); background: linear-gradient(90deg, rgba(234,179,8,0.06) 0%, var(--card) 40%); }
    .ranking-row.row-danger  { border-left-color: var(--red);    background: linear-gradient(90deg, rgba(239,68,68,0.06) 0%, var(--card) 40%); }

    .rank-number {
      font-family: var(--font-display);
      font-size: 36px;
      letter-spacing: 0.02em;
      text-align: center;
      color: var(--muted);
    }

    .row-top    .rank-number { color: var(--green); }
    .row-warning .rank-number { color: var(--yellow); }
    .row-danger  .rank-number { color: var(--red); }

    .ranking-name h3 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .ranking-name p  { font-size: 12px; font-weight: 500; color: var(--muted); }

    .ranking-stat { text-align: center; }
    .stat-value { font-family: var(--font-display); font-size: 30px; letter-spacing: 0.04em; color: var(--text); }
    .stat-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }

    /* Status badge as image container */
    .status-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 80px;
    }

    .status-badge img {
      max-height: 80px;
      max-width: 180px;
      object-fit: contain;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    }

    .status-badge.badge-200 {
      height: 80px;
    }

    .status-badge img.badge-200 {
      max-height: 150px;
      max-width: 320px;
      transform: scale(1.6);
      transform-origin: center;
    }

    .status-badge.status-text {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      height: auto;
    }

    /* ═══════════════════════════════════════════════
       LEGEND
    ═══════════════════════════════════════════════ */
    .ranking-legend {
      display: flex;
      gap: 28px;
      justify-content: center;
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }

    .legend-dot.top     { background: var(--green);  box-shadow: 0 0 8px var(--green-glow); }
    .legend-dot.warning { background: var(--yellow); box-shadow: 0 0 8px var(--yellow-glow); }
    .legend-dot.danger  { background: var(--red);    box-shadow: 0 0 8px var(--red-glow); }

    .legend-text { font-size: 13px; font-weight: 500; color: var(--muted2); }

    /* ═══════════════════════════════════════════════
       AGENTS VIEW
    ═══════════════════════════════════════════════ */
    .agents-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .agents-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .agents-title {
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: 0.06em;
      color: var(--text);
    }

    .agents-count {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 999px;
    }

    .agents-list {
      max-height: min(80vh, 900px);
      overflow-y: auto;
      padding: 14px 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .agents-list::-webkit-scrollbar { width: 5px; }
    .agents-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .agent-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      margin-bottom: 8px;
      transition: all .18s;
      border-left: 4px solid transparent;
    }

    .agent-item:hover { background: var(--card); transform: translateX(2px); }

    .agent-item.status-green      { border-left-color: var(--green); }
    .agent-item.status-greenlight { border-left-color: #86efac; }
    .agent-item.status-yellow     { border-left-color: var(--yellow); }
    .agent-item.status-red        { border-left-color: var(--red); }
    .agent-item.status-black {
      border-left-color: #fff;
      background: rgba(2,6,23,0.7);
      border-color: rgba(255,255,255,0.06);
    }

    .agent-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 1;
    }

    .agent-rank {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted2);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
    }

    .agent-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #6366f1);
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .agent-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .agent-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .agent-sub  { font-size: 11px; font-weight: 500; color: var(--muted); margin-top: 2px; }
    .agent-item.status-black .agent-name { color: rgba(255,255,255,0.9); }
    .agent-item.status-black .agent-sub  { color: rgba(255,255,255,0.5); }

    .agent-stats-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .agent-pill {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill-sales  { background: rgba(56,189,248,0.12);  color: #7dd3fc; }
    .pill-points { background: rgba(99,102,241,0.12);  color: #a5b4fc; }
    .pill-days   { background: rgba(255,255,255,0.06); color: var(--muted2); }

    .agent-item.status-black .pill-sales  { background: rgba(56,189,248,0.18);  color: #bae6fd; }
    .agent-item.status-black .pill-points { background: rgba(165,180,252,0.18); color: #e0e7ff; }
    .agent-item.status-black .pill-days   { background: rgba(255,255,255,0.1);  color: rgba(255,255,255,0.8); }

    .agents-divider {
      margin: 14px 0 8px;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      font-size: 12px;
      font-weight: 700;
      color: var(--red);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ═══════════════════════════════════════════════
       TOOLTIP
    ═══════════════════════════════════════════════ */
    .tooltip-floating {
      position: fixed;
      z-index: 99999;
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 12px;
      line-height: 1.5;
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
      pointer-events: none;
      opacity: 0;
      transform: translateY(6px) scale(0.97);
      transition: opacity .12s ease, transform .12s ease;
      max-width: 240px;
    }

    .tooltip-floating.is-visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .tt-title { font-weight: 700; font-size: 13px; margin-bottom: 8px; color: var(--accent); }
    .tt-row { display: flex; justify-content: space-between; gap: 12px; }
    .tt-label { color: var(--muted); font-weight: 600; }
    .tt-val { font-weight: 700; }

    /* ═══════════════════════════════════════════════
       MODAL (CUADRATURA)
    ═══════════════════════════════════════════════ */
    .cuadratura-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }

    .cuadratura-modal.is-open { display: flex; }

    .cuadratura-card {
      width: 100%;
      max-width: 1020px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
    }

    .cuadratura-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .cuadratura-card-header h3 {
      font-family: var(--font-display);
      font-size: 20px;
      letter-spacing: 0.06em;
      color: var(--text);
    }

    .cuadratura-card-body {
      padding: 18px 20px;
      overflow-y: auto;
      flex: 1;
    }

    .cuadratura-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
    }

    .cuadratura-actions select {
      min-width: 190px;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 13px;
      outline: none;
    }

    .cuadratura-actions select:focus { border-color: var(--accent); }

    .cuadratura-actions label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 13px;
      color: var(--muted2);
      cursor: pointer;
    }

    .cuadratura-kpis {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .cuadratura-kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }

    .cuadratura-kpi .label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .cuadratura-kpi .value {
      font-family: var(--font-display);
      font-size: 32px;
      letter-spacing: 0.04em;
      color: var(--accent);
    }

    .cuadratura-section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .cuadratura-lists {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .cuadratura-list {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .cuadratura-list h4 {
      padding: 10px 12px;
      background: var(--bg);
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .cuadratura-list .body {
      max-height: 280px;
      overflow-y: auto;
      padding: 10px 12px;
    }

    .cuadratura-row {
      display: grid;
      grid-template-columns: 1fr 110px 80px;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }

    .cuadratura-row:last-child { border-bottom: none; }
    .cuadratura-row .muted { color: var(--muted); font-size: 11px; }

    #cuadratura-status {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted2);
    }

    #cuadratura-debug {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }

    /* ═══════════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════════ */
    @media (max-width: 900px) {
      .metrics-strip { grid-template-columns: repeat(2, 1fr); }
      .ranking-row   { grid-template-columns: 44px 1fr 90px 90px 140px; }
      .cuadratura-kpis { grid-template-columns: repeat(2, 1fr); }
      .cuadratura-lists { grid-template-columns: 1fr; }
    }

    @media (max-width: 600px) {
      .main-content { margin-left: 0; width: 100%; }
      .ranking-row  { grid-template-columns: 1fr; text-align: center; }
      .page-wrap    { padding: 20px 16px 48px; }
    }

    /* ═══════════════════════════════════════════════
       SECTION HEADING
    ═══════════════════════════════════════════════ */
    .section-heading {
      font-family: var(--font-display);
      font-size: 18px;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── DARK MODE ── */
    body.dark-theme {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --card:      #1e293b;
      --border:    #334155;
      --border2:   #475569;
      --text:      #e2e8f0;
      --muted:     #94a3b8;
      --muted2:    #64748b;
      --black-dim: rgba(0,0,0,0.25);
    }
  </style>
</head>
