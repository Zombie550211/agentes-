<script>
(function() {
  try {
    /* ── Rol y permisos ── */
    const userData = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || '{}');
    const roleRaw = (userData.role || userData?.usuario?.role || '').toString().toLowerCase().trim();

    const costumerLineasMenu = document.getElementById('costumer-lineas-menu');
    if (costumerLineasMenu) {
      const allowedLineas = new Set(['admin','administrador','administrator','backoffice','back office','back_office','bo','b.o','b:o','b-o']);
      costumerLineasMenu.style.display = allowedLineas.has(roleRaw) ? 'block' : 'none';
    }

    const menuLead = document.getElementById('menu-lead');
    const menuNuevoLead = document.getElementById('menu-nuevo-lead');
    const isAgente = roleRaw.startsWith('agente') || roleRaw === 'agent';
    if (menuLead) menuLead.style.display = isAgente ? 'none' : '';
    if (menuNuevoLead) {
      const isAdminOrProcesamiento = ['admin','administrador','administrator'].includes(roleRaw) || roleRaw.startsWith('procesamiento');
      menuNuevoLead.style.display = isAdminOrProcesamiento ? 'block' : 'none';
    }

    const menuPermisos = document.getElementById('menu-permisos');
    if (menuPermisos) {
      const adminRoles = new Set(['admin','administrador','administrator']);
      menuPermisos.style.display = adminRoles.has(roleRaw) ? 'block' : 'none';
    }

    /* ── Botón colapsar ── */
    const sidebar  = document.getElementById('main-sidebar');
    const colBtn   = document.getElementById('sb-collapse-btn');
    const COLLAPSED_KEY = 'sb_collapsed';

    function applyCollapsed(collapsed) {
      sidebar.classList.toggle('sb-collapsed', collapsed);
      try { localStorage.setItem(COLLAPSED_KEY, collapsed ? '1' : '0'); } catch(e) {}
    }

    if (colBtn && sidebar) {
      const savedCollapsed = localStorage.getItem(COLLAPSED_KEY) === '1';
      applyCollapsed(savedCollapsed);
      colBtn.addEventListener('click', () => applyCollapsed(!sidebar.classList.contains('sb-collapsed')));
    }

    /* ── Búsqueda ── */
    const searchInput = document.getElementById('sb-search-input');
    if (searchInput) {
      searchInput.addEventListener('input', function() {
        const q = this.value.toLowerCase();
        document.querySelectorAll('#main-sidebar .menu li').forEach(li => {
          const label = li.querySelector('.menu-label');
          if (!label) return;
          li.style.display = label.textContent.toLowerCase().includes(q) ? '' : 'none';
        });
      });
    }

    /* ── Theme toggle ── */
    const lightBtn = document.getElementById('sb-light-btn');
    const darkBtn  = document.getElementById('sb-dark-btn');

    function applyTheme(dark) {
      document.body.classList.toggle('dark-theme', dark);
      try { localStorage.setItem('theme', dark ? 'dark' : 'light'); } catch(e) {}
      if (lightBtn) lightBtn.classList.toggle('active', !dark);
      if (darkBtn)  darkBtn.classList.toggle('active',  dark);
    }

    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(savedTheme === 'dark' || (!savedTheme && prefersDark));

    if (lightBtn) lightBtn.addEventListener('click', () => applyTheme(false));
    if (darkBtn)  darkBtn.addEventListener('click',  () => applyTheme(true));

  } catch (error) {
    console.warn('[Sidebar] Error:', error);
  }
})();
</script>
