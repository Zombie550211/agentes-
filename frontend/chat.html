<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — CRM Connecting</title>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="js/inactivity-manager.js" defer></script>
  <script src="js/crm-init.js" defer></script>
  <script src="/js/sidebar-loader.js" defer></script>
  <script src="js/dashboard-init.js" defer></script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
  <style>
    :root {
      --sidebar-w: 56px;
      --chat-left-w: 300px;
      --bg: #f6f8fc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --accent: #6366f1;
      --accent-light: #eef2ff;
      --text: #1e293b;
      --text-2: #64748b;
      --text-3: #94a3b8;
      --green: #22c55e;
      --yellow: #f59e0b;
      --red: #ef4444;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,.10);
      font-family: 'Inter', sans-serif;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

    .layout { display: flex; height: 100vh; overflow: hidden; }

    /* sidebar ocupa su ancho natural; sidebar-loader lo gestiona */
    .layout > nav.sidebar { flex-shrink: 0; }

    /* ── MAIN CONTENT ── */
    .main-content {
      flex: 1; display: flex; flex-direction: column;
      height: 100vh; overflow: hidden; padding: 0;
      min-width: 0;
    }

    /* ── CHAT LAYOUT ── */
    .chat-layout {
      display: flex; flex: 1; overflow: hidden; height: 100%;
    }

    /* ── LEFT PANEL ── */
    .chat-left {
      width: var(--chat-left-w); min-width: var(--chat-left-w);
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }

    .chat-left-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 10px;
    }

    .chat-left-top {
      display: flex; align-items: center; justify-content: space-between;
    }

    .chat-title { font-size: 1.1rem; font-weight: 700; color: var(--text); }

    .btn-compose {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent); color: #fff; border: none;
      border-radius: 20px; padding: 7px 14px; font-size: .8rem;
      font-weight: 600; cursor: pointer; transition: all .15s;
      box-shadow: 0 2px 8px rgba(99,102,241,.3);
    }
    .btn-compose:hover { background: #4f46e5; transform: translateY(-1px); }

    .chat-search {
      position: relative;
    }
    .chat-search input {
      width: 100%; padding: 8px 12px 8px 34px;
      border: 1px solid var(--border); border-radius: 20px;
      font-size: .82rem; color: var(--text); background: var(--bg);
      outline: none; transition: border-color .15s;
    }
    .chat-search input:focus { border-color: var(--accent); }
    .chat-search i {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--text-3); font-size: .75rem;
    }

    /* Categorías */
    .chat-categories {
      padding: 8px 10px 4px;
    }
    .chat-cat-label { font-size: .68rem; font-weight: 600; color: var(--text-3); letter-spacing: .8px; text-transform: uppercase; padding: 4px 6px; }

    .cat-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 8px; border-radius: 8px; cursor: pointer;
      font-size: .82rem; color: var(--text-2); transition: all .12s;
      user-select: none;
    }
    .cat-item:hover { background: var(--bg); color: var(--text); }
    .cat-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
    .cat-item i { width: 16px; text-align: center; font-size: .78rem; }
    .cat-badge {
      margin-left: auto; background: var(--accent); color: #fff;
      border-radius: 10px; padding: 1px 7px; font-size: .7rem; font-weight: 700;
      display: none;
    }
    .cat-badge.show { display: inline; }

    .chat-divider { height: 1px; background: var(--border); margin: 6px 12px; }

    /* Lista de usuarios/conversaciones */
    .chat-list-label {
      font-size: .68rem; font-weight: 600; color: var(--text-3);
      letter-spacing: .8px; text-transform: uppercase; padding: 8px 16px 4px;
    }
    .chat-list { flex: 1; overflow-y: auto; padding-bottom: 8px; }
    .chat-list::-webkit-scrollbar { width: 4px; }
    .chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .chat-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; cursor: pointer; transition: background .1s;
      position: relative;
    }
    .chat-item:hover { background: var(--bg); }
    .chat-item.active { background: var(--accent-light); }
    .chat-item.unread .chat-item-name { font-weight: 700; color: var(--text); }
    .chat-item.unread .chat-item-preview { color: var(--text); }

    .chat-avatar {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      object-fit: cover; background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; font-weight: 700; color: var(--accent);
      position: relative; overflow: hidden;
    }
    .chat-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .presence-dot {
      position: absolute; bottom: 1px; right: 1px;
      width: 9px; height: 9px; border-radius: 50%;
      background: #ccc; border: 2px solid var(--surface);
    }
    .presence-dot.online { background: var(--green); }

    .chat-item-info { flex: 1; min-width: 0; }
    .chat-item-top { display: flex; justify-content: space-between; align-items: center; }
    .chat-item-name { font-size: .83rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-item-time { font-size: .7rem; color: var(--text-3); flex-shrink: 0; }
    .chat-item-preview { font-size: .75rem; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
    .unread-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
      flex-shrink: 0; display: none;
    }
    .chat-item.unread .unread-dot { display: block; }

    /* ── RIGHT PANEL ── */
    .chat-right {
      flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg);
      min-width: 0;
    }

    /* Empty state */
    .chat-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px; color: var(--text-3);
    }
    .chat-empty i { font-size: 3rem; opacity: .3; }
    .chat-empty p { font-size: .9rem; }

    /* ── CONVERSATION VIEW ── */
    .conversation { display: none; flex-direction: column; height: 100%; }
    .conversation.active { display: flex; }

    .conv-header {
      padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .conv-header-avatar {
      width: 36px; height: 36px; border-radius: 50%; background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem; font-weight: 700; color: var(--accent); flex-shrink: 0; overflow: hidden;
    }
    .conv-header-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .conv-header-info { flex: 1; min-width: 0; }
    .conv-header-name { font-weight: 600; font-size: .92rem; }
    .conv-header-status { font-size: .75rem; color: var(--text-3); }
    .conv-header-actions { display: flex; gap: 6px; }
    .conv-action-btn {
      width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border);
      background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-2); font-size: .8rem; transition: all .15s;
    }
    .conv-action-btn:hover { background: var(--bg); color: var(--accent); border-color: var(--accent); }

    .conv-messages {
      flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 6px;
    }
    .conv-messages::-webkit-scrollbar { width: 4px; }
    .conv-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Mensajes */
    .msg-group { display: flex; flex-direction: column; gap: 2px; }
    .msg-row { display: flex; align-items: flex-end; gap: 8px; }
    .msg-row.mine { flex-direction: row-reverse; }
    .msg-bubble {
      max-width: 65%; padding: 9px 13px; border-radius: 16px;
      font-size: .84rem; line-height: 1.5; word-break: break-word;
      position: relative;
    }
    .msg-row.theirs .msg-bubble {
      background: var(--surface); border: 1px solid var(--border);
      border-bottom-left-radius: 4px; color: var(--text);
    }
    .msg-row.mine .msg-bubble {
      background: var(--accent); color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-time {
      font-size: .65rem; color: var(--text-3); flex-shrink: 0; margin-bottom: 2px;
    }
    .msg-row.mine .msg-time { color: rgba(255,255,255,.65); }
    .msg-date-sep {
      text-align: center; font-size: .72rem; color: var(--text-3);
      margin: 8px 0; position: relative;
    }
    .msg-date-sep::before {
      content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border); z-index: 0;
    }
    .msg-date-sep span { background: var(--bg); padding: 0 10px; position: relative; z-index: 1; }

    .typing-indicator {
      display: none; align-items: center; gap: 6px; padding: 6px 0;
      font-size: .76rem; color: var(--text-3);
    }
    .typing-indicator.show { display: flex; }
    .typing-dots span {
      display: inline-block; width: 5px; height: 5px; border-radius: 50%;
      background: var(--text-3); animation: typingBounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .15s; }
    .typing-dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes typingBounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }

    /* Input */
    .conv-input-area {
      padding: 12px 16px; background: var(--surface); border-top: 1px solid var(--border);
      display: flex; align-items: flex-end; gap: 10px; flex-shrink: 0;
    }
    .conv-input-wrap { flex: 1; position: relative; }
    .conv-input {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 20px;
      font-size: .84rem; font-family: inherit; color: var(--text); background: var(--bg);
      resize: none; outline: none; transition: border-color .15s; max-height: 120px; min-height: 40px;
      overflow-y: auto;
    }
    .conv-input:focus { border-color: var(--accent); background: #fff; }
    .btn-send {
      width: 38px; height: 38px; border-radius: 50%; background: var(--accent); color: #fff;
      border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: .9rem; transition: all .15s; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(99,102,241,.3);
    }
    .btn-send:hover { background: #4f46e5; transform: scale(1.05); }
    .btn-send:disabled { background: var(--border); box-shadow: none; cursor: default; transform: none; }

    /* ── BANDEJA DE NOTIFICACIONES ── */
    .notif-btn-wrapper {
      position: fixed; top: 14px; right: 20px; z-index: 1000;
    }
    .notif-btn {
      width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border);
      background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-2); font-size: .9rem; transition: all .15s; position: relative;
      box-shadow: var(--shadow);
    }
    .notif-btn:hover { background: var(--accent-light); color: var(--accent); }
    .notif-count {
      position: absolute; top: -4px; right: -4px;
      background: var(--red); color: #fff; border-radius: 10px;
      padding: 1px 5px; font-size: .65rem; font-weight: 700; min-width: 16px; text-align: center;
      display: none; border: 2px solid var(--surface);
    }
    .notif-count.show { display: block; }

    .notif-panel {
      position: fixed; top: 58px; right: 16px; width: 340px; max-height: 480px;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow-md); z-index: 1001; display: none; flex-direction: column;
      overflow: hidden;
    }
    .notif-panel.open { display: flex; }
    .notif-panel-header {
      padding: 14px 16px 10px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .notif-panel-title { font-weight: 700; font-size: .9rem; }
    .notif-mark-all { font-size: .75rem; color: var(--accent); cursor: pointer; border: none; background: none; }

    .notif-tabs {
      display: flex; border-bottom: 1px solid var(--border);
    }
    .notif-tab {
      flex: 1; padding: 8px 0; font-size: .78rem; font-weight: 500; cursor: pointer;
      border: none; background: none; color: var(--text-2); border-bottom: 2px solid transparent;
      transition: all .15s;
    }
    .notif-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .notif-list { flex: 1; overflow-y: auto; }
    .notif-item {
      display: flex; gap: 10px; padding: 12px 14px; cursor: pointer;
      border-bottom: 1px solid #f1f5f9; transition: background .1s;
      position: relative;
    }
    .notif-item:hover { background: var(--bg); }
    .notif-item.unread { background: #f8f9ff; }
    .notif-item-avatar {
      width: 34px; height: 34px; border-radius: 50%; background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 700; color: var(--accent); flex-shrink: 0; overflow: hidden;
    }
    .notif-item-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .notif-item-body { flex: 1; min-width: 0; }
    .notif-item-from { font-size: .8rem; font-weight: 600; color: var(--text); }
    .notif-item-preview { font-size: .75rem; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .notif-item-time { font-size: .7rem; color: var(--text-3); flex-shrink: 0; }
    .notif-unread-dot {
      position: absolute; left: 6px; top: 50%; transform: translateY(-50%);
      width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: none;
    }
    .notif-item.unread .notif-unread-dot { display: block; }
    .notif-empty { padding: 30px; text-align: center; color: var(--text-3); font-size: .85rem; }

    /* ── MODAL REDACTAR ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 2000;
      display: none; align-items: flex-end; justify-content: flex-end; padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .compose-modal {
      width: 520px; background: var(--surface); border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2); display: flex; flex-direction: column;
      overflow: hidden; animation: slideUp .2s ease;
      max-height: calc(100vh - 40px);
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .compose-header {
      padding: 12px 16px; background: #1e293b; color: #fff;
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .compose-title { font-size: .88rem; font-weight: 600; }
    .compose-header-btns { display: flex; gap: 6px; }
    .compose-header-btn {
      width: 24px; height: 24px; border-radius: 50%; border: none; background: rgba(255,255,255,.15);
      color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: .75rem; transition: background .15s;
    }
    .compose-header-btn:hover { background: rgba(255,255,255,.3); }

    .compose-field {
      display: flex; align-items: flex-start; border-bottom: 1px solid var(--border); padding: 8px 14px;
    }
    .compose-field-label { font-size: .78rem; color: var(--text-2); font-weight: 500; width: 52px; flex-shrink: 0; padding-top: 4px; }
    .compose-field-input {
      flex: 1; border: none; outline: none; font-family: inherit; font-size: .84rem;
      color: var(--text); background: transparent; padding: 2px 0;
    }

    /* Search dropdown para "Para" */
    .compose-to-wrap { flex: 1; position: relative; }
    .compose-to-tags { display: flex; flex-wrap: wrap; gap: 4px; padding: 2px 0; }
    .to-tag {
      display: inline-flex; align-items: center; gap: 4px; background: var(--accent-light);
      color: var(--accent); border-radius: 12px; padding: 2px 8px; font-size: .76rem; font-weight: 500;
    }
    .to-tag button { background: none; border: none; color: var(--accent); cursor: pointer; font-size: .7rem; line-height: 1; padding: 0; }
    .compose-to-input { border: none; outline: none; font-family: inherit; font-size: .84rem; color: var(--text); background: transparent; min-width: 120px; }
    .to-dropdown {
      position: absolute; top: 100%; left: 0; right: 0; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px; box-shadow: var(--shadow-md);
      max-height: 200px; overflow-y: auto; z-index: 10; display: none;
    }
    .to-dropdown.open { display: block; }
    .to-option {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer;
      transition: background .1s; font-size: .83rem;
    }
    .to-option:hover { background: var(--bg); }
    .to-option-avatar {
      width: 26px; height: 26px; border-radius: 50%; background: var(--accent-light);
      display: flex; align-items: center; justify-content: center; font-size: .7rem;
      font-weight: 700; color: var(--accent); flex-shrink: 0; overflow: hidden;
    }
    .to-option-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .to-option-info { flex: 1; min-width: 0; }
    .to-option-name { font-weight: 500; }
    .to-option-role { font-size: .72rem; color: var(--text-3); }

    /* Toolbar de formato */
    .compose-toolbar {
      display: flex; gap: 2px; padding: 6px 10px; border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .toolbar-btn {
      width: 28px; height: 28px; border-radius: 4px; border: none; background: none;
      cursor: pointer; color: var(--text-2); font-size: .78rem; display: flex;
      align-items: center; justify-content: center; transition: all .1s;
    }
    .toolbar-btn:hover { background: var(--bg); color: var(--text); }
    .toolbar-sep { width: 1px; background: var(--border); margin: 4px 3px; }

    .compose-body-wrap { flex: 1; overflow-y: auto; min-height: 160px; }
    .compose-body {
      width: 100%; min-height: 160px; padding: 12px 16px;
      border: none; outline: none; font-family: inherit; font-size: .85rem;
      color: var(--text); resize: none; line-height: 1.6;
    }

    .compose-footer {
      padding: 10px 14px; border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .btn-send-compose {
      display: inline-flex; align-items: center; gap: 6px; background: var(--accent);
      color: #fff; border: none; border-radius: 20px; padding: 8px 18px;
      font-size: .82rem; font-weight: 600; cursor: pointer; transition: all .15s;
    }
    .btn-send-compose:hover { background: #4f46e5; }
    .btn-send-compose:disabled { background: var(--border); cursor: default; }
    .compose-footer-actions { display: flex; gap: 4px; margin-left: auto; }
    .compose-footer-btn {
      width: 30px; height: 30px; border-radius: 50%; border: none; background: none;
      cursor: pointer; color: var(--text-2); font-size: .82rem; display: flex;
      align-items: center; justify-content: center; transition: all .1s;
    }
    .compose-footer-btn:hover { background: var(--bg); color: var(--accent); }

    /* ── INBOX PANEL (vista bandeja completa) ── */
    .inbox-view { display: none; flex-direction: column; height: 100%; }
    .inbox-view.active { display: flex; }
    .inbox-header {
      padding: 16px 20px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .inbox-title { font-weight: 700; font-size: 1rem; }
    .inbox-list { flex: 1; overflow-y: auto; }
    .inbox-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 20px;
      border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: background .1s;
    }
    .inbox-item:hover { background: #f8f9ff; }
    .inbox-item.unread { background: #f0f3ff; }
    .inbox-item.unread .inbox-from { font-weight: 700; }
    .inbox-item.unread .inbox-subject { font-weight: 600; }
    .inbox-check { width: 16px; height: 16px; border: 1.5px solid var(--border); border-radius: 3px; flex-shrink: 0; cursor: pointer; }
    .inbox-avatar {
      width: 34px; height: 34px; border-radius: 50%; background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 700; color: var(--accent); flex-shrink: 0; overflow: hidden;
    }
    .inbox-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .inbox-info { flex: 1; min-width: 0; }
    .inbox-from { font-size: .82rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .inbox-subject { font-size: .8rem; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .inbox-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .inbox-time { font-size: .7rem; color: var(--text-3); }
    .inbox-tags { display: flex; gap: 4px; }
    .tag-followup { font-size: .65rem; background: #fef3c7; color: #b45309; border-radius: 8px; padding: 1px 6px; font-weight: 600; }
    .tag-unread { font-size: .65rem; background: var(--accent-light); color: var(--accent); border-radius: 8px; padding: 1px 6px; font-weight: 600; }

    /* ── BÚSQUEDA EN CHAT ── */
    .conv-search-bar {
      padding: 8px 16px; background: var(--surface);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .conv-search-wrap {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 12px; transition: border-color .15s;
    }
    .conv-search-wrap:focus-within { border-color: var(--accent); }
    .conv-search-wrap i { color: var(--text-3); font-size: .75rem; flex-shrink: 0; }
    .conv-search-wrap input {
      flex: 1; border: none; outline: none; font-family: inherit;
      font-size: .83rem; color: var(--text); background: transparent;
    }
    .conv-search-wrap input::placeholder { color: var(--text-3); }
    .conv-search-results {
      font-size: .72rem; color: var(--text-3); white-space: nowrap; flex-shrink: 0;
    }
    .conv-search-close {
      background: none; border: none; cursor: pointer; color: var(--text-3);
      font-size: .75rem; padding: 0; display: flex; align-items: center;
      transition: color .12s;
    }
    .conv-search-close:hover { color: var(--text); }
    .msg-bubble mark {
      background: #fef08a; color: inherit; border-radius: 2px;
    }

    /* ── RELOJ ── */
    .chat-datetime {
      display: flex; align-items: center; gap: 5px;
      font-size: .72rem; color: var(--text-3); padding: 2px 0 0;
      font-variant-numeric: tabular-nums;
    }
    .chat-datetime i { font-size: .65rem; opacity: .7; }
    #clockTime { font-weight: 600; color: var(--text-2); letter-spacing: .03em; }
    .clock-sep { color: var(--border); }

    /* ── EMOJI PICKER ── */
    .conv-input-area { position: relative; }
    .btn-emoji-toggle {
      width: 34px; height: 34px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--surface);
      cursor: pointer; color: var(--text-2); font-size: .95rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .15s;
    }
    .btn-emoji-toggle:hover { color: var(--accent); border-color: var(--accent); }
    .emoji-picker-wrap {
      position: absolute; bottom: calc(100% + 8px); right: 50px;
      display: none; z-index: 500;
      box-shadow: var(--shadow-md); border-radius: 12px; overflow: hidden;
    }
    .emoji-picker-wrap.open { display: block; }
    emoji-picker { height: 380px; width: 330px; }

    /* Scrollbar general */
    *::-webkit-scrollbar { width: 4px; height: 4px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #1e293b; color: #fff; padding: 9px 18px; border-radius: 20px;
      font-size: .82rem; z-index: 3000; opacity: 0; transition: opacity .25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<div class="layout">
  <nav class="sidebar sidebar-inicio" data-active="chat" style="overflow-y:visible;"></nav>

  <main class="main-content">
    <div class="chat-layout">

      <!-- ── COLUMNA IZQUIERDA ── -->
      <div class="chat-left">
        <div class="chat-left-header">
          <div class="chat-left-top">
            <span class="chat-title">Chat</span>
            <button class="btn-compose" id="btnCompose">
              <i class="fas fa-pen"></i> Redactar
            </button>
          </div>
          <div class="chat-datetime">
            <i class="fas fa-calendar-alt"></i>
            <span id="clockDate"></span>
            <span class="clock-sep">·</span>
            <i class="fas fa-clock"></i>
            <span id="clockTime"></span>
          </div>
          <div class="chat-search">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Buscar usuario…">
          </div>
        </div>

        <!-- Categorías -->
        <div class="chat-categories">
          <div class="chat-cat-label">Bandeja</div>
          <div class="cat-item active" data-cat="chats" id="cat-chats">
            <i class="fas fa-comment-dots"></i> Todos los chats
          </div>
          <div class="cat-item" data-cat="unread" id="cat-unread">
            <i class="fas fa-envelope"></i> No leídos
            <span class="cat-badge" id="badge-unread">0</span>
          </div>
          <div class="cat-item" data-cat="sent" id="cat-sent">
            <i class="fas fa-paper-plane"></i> Enviados
          </div>
          <div class="cat-item" data-cat="received" id="cat-received">
            <i class="fas fa-inbox"></i> Recibidos
          </div>
          <div class="cat-item" data-cat="followup" id="cat-followup">
            <i class="fas fa-clock"></i> Seguimiento
          </div>
        </div>

        <div class="chat-divider"></div>
        <div class="chat-list-label" id="chatListLabel">Recientes</div>
        <div class="chat-list" id="chatList"></div>
      </div>

      <!-- ── COLUMNA DERECHA ── -->
      <div class="chat-right" id="chatRight">

        <!-- Estado vacío -->
        <div class="chat-empty" id="chatEmpty">
          <i class="fas fa-comments"></i>
          <p>Selecciona una conversación</p>
          <p style="font-size:.8rem">o usa <strong>Redactar</strong> para enviar un mensaje</p>
        </div>

        <!-- Vista de conversación -->
        <div class="conversation" id="conversationView">
          <div class="conv-header">
            <div class="conv-header-avatar" id="convAvatar"></div>
            <div class="conv-header-info">
              <div class="conv-header-name" id="convName"></div>
              <div class="conv-header-status" id="convStatus">—</div>
            </div>
            <div class="conv-header-actions">
              <button class="conv-action-btn" title="Buscar en chat" id="btnSearchInChat"><i class="fas fa-search"></i></button>
              <button class="conv-action-btn" title="Seguimiento" id="btnFollowupConv"><i class="fas fa-clock"></i></button>
              <button class="conv-action-btn" title="Bandeja completa" id="btnOpenInbox"><i class="fas fa-list"></i></button>
            </div>
          </div>

          <!-- Barra de búsqueda dentro del chat -->
          <div class="conv-search-bar" id="convSearchBar" style="display:none;">
            <div class="conv-search-wrap">
              <i class="fas fa-search"></i>
              <input type="text" id="convSearchInput" placeholder="Buscar en este chat…" autocomplete="off">
              <span class="conv-search-results" id="convSearchResults"></span>
              <button class="conv-search-close" id="btnConvSearchClose" title="Cerrar"><i class="fas fa-times"></i></button>
            </div>
          </div>

          <div class="conv-messages" id="convMessages">
            <div class="typing-indicator" id="typingIndicator">
              <div class="typing-dots"><span></span><span></span><span></span></div>
              <span id="typingName"></span> está escribiendo…
            </div>
          </div>

          <div class="conv-input-area">
            <div class="conv-input-wrap">
              <textarea class="conv-input" id="convInput" placeholder="Escribe un mensaje… (Enter para enviar)" rows="1"></textarea>
            </div>
            <button class="btn-emoji-toggle" id="btnEmojiToggle" title="Emoji"><i class="fas fa-smile"></i></button>
            <button class="btn-send" id="btnSend"><i class="fas fa-paper-plane"></i></button>
            <div class="emoji-picker-wrap" id="emojiPickerWrap">
              <emoji-picker id="mainEmojiPicker"></emoji-picker>
            </div>
          </div>
        </div>

        <!-- Vista bandeja completa -->
        <div class="inbox-view" id="inboxView">
          <div class="inbox-header">
            <span class="inbox-title" id="inboxTitle">Bandeja de entrada</span>
          </div>
          <div class="inbox-list" id="inboxList"></div>
        </div>

      </div>
    </div>
  </main>
</div>

<!-- ── BOTÓN NOTIFICACIONES (arriba derecha) ── -->
<div class="notif-btn-wrapper">
  <button class="notif-btn" id="btnNotif" title="Bandeja de notificaciones">
    <i class="fas fa-bell"></i>
    <span class="notif-count" id="notifCount">0</span>
  </button>
</div>

<!-- ── PANEL NOTIFICACIONES ── -->
<div class="notif-panel" id="notifPanel">
  <div class="notif-panel-header">
    <span class="notif-panel-title">Notificaciones</span>
    <button class="notif-mark-all" id="btnMarkAll">Marcar todo como leído</button>
  </div>
  <div class="notif-tabs">
    <button class="notif-tab active" data-tab="all" id="ntab-all">Todos</button>
    <button class="notif-tab" data-tab="unread" id="ntab-unread">No leídos</button>
    <button class="notif-tab" data-tab="followup" id="ntab-followup">Seguimiento</button>
  </div>
  <div class="notif-list" id="notifList"></div>
</div>

<!-- ── MODAL REDACTAR ── -->
<div class="modal-overlay" id="composeOverlay">
  <div class="compose-modal" id="composeModal">
    <div class="compose-header">
      <span class="compose-title">Mensaje nuevo</span>
      <div class="compose-header-btns">
        <button class="compose-header-btn" id="btnMinimize" title="Minimizar"><i class="fas fa-minus"></i></button>
        <button class="compose-header-btn" id="btnExpand" title="Expandir"><i class="fas fa-expand-alt"></i></button>
        <button class="compose-header-btn" id="btnCloseCompose" title="Cerrar"><i class="fas fa-times"></i></button>
      </div>
    </div>
    <div class="compose-field">
      <span class="compose-field-label">Para</span>
      <div class="compose-to-wrap">
        <div class="compose-to-tags" id="toTags"></div>
        <input type="text" class="compose-to-input" id="toInput" placeholder="Buscar usuario…" autocomplete="off">
        <div class="to-dropdown" id="toDropdown"></div>
      </div>
    </div>
    <div class="compose-field">
      <span class="compose-field-label">Asunto</span>
      <input type="text" class="compose-field-input" id="composeSubject" placeholder="Asunto del mensaje">
    </div>
    <div class="compose-toolbar">
      <button class="toolbar-btn" data-cmd="bold" title="Negrita"><i class="fas fa-bold"></i></button>
      <button class="toolbar-btn" data-cmd="italic" title="Cursiva"><i class="fas fa-italic"></i></button>
      <button class="toolbar-btn" data-cmd="underline" title="Subrayado"><i class="fas fa-underline"></i></button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" data-cmd="insertOrderedList" title="Lista numerada"><i class="fas fa-list-ol"></i></button>
      <button class="toolbar-btn" data-cmd="insertUnorderedList" title="Lista"><i class="fas fa-list-ul"></i></button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" data-cmd="justifyLeft" title="Izquierda"><i class="fas fa-align-left"></i></button>
      <button class="toolbar-btn" data-cmd="justifyCenter" title="Centro"><i class="fas fa-align-center"></i></button>
      <button class="toolbar-btn" data-cmd="justifyRight" title="Derecha"><i class="fas fa-align-right"></i></button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" id="btnLink" title="Insertar enlace"><i class="fas fa-link"></i></button>
    </div>
    <div class="compose-body-wrap">
      <div class="compose-body" id="composeBody" contenteditable="true" placeholder="Escribe tu mensaje…"></div>
    </div>
    <div class="compose-footer">
      <button class="btn-send-compose" id="btnSendCompose">
        <i class="fas fa-paper-plane"></i> Enviar
      </button>
      <div class="compose-footer-actions">
        <button class="compose-footer-btn" title="Adjuntar archivo"><i class="fas fa-paperclip"></i></button>
        <button class="compose-footer-btn" title="Emoji"><i class="fas fa-smile"></i></button>
        <button class="compose-footer-btn" id="btnDeleteCompose" title="Descartar borrador"><i class="fas fa-trash"></i></button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/chat-page.js" defer></script>
</body>
</html>
