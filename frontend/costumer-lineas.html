<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM - Costumer Líneas</title>
  <link rel="stylesheet" href="/css/theme.css?v=20251124f"/>
  <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/sidebar-shared.css?v=20251124f">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Roboto',sans-serif; background:#f5f7fa; color:#333; }

    .main-content { margin-left:240px; flex:1; padding:30px; min-height:100vh; }

    /* Header */
    .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; padding-bottom:18px; border-bottom:2px solid #e2e8f0; }
    .page-title { font-size:26px; font-weight:700; color:#1f2937; }

    /* Stats */
    .summary-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; margin-bottom:24px; }
    .summary-card { background:#fff; border-radius:12px; padding:18px; box-shadow:0 2px 8px rgba(0,0,0,.06); border:1px solid #e2e8f0; }
    .card-icon { width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:18px; margin-bottom:10px; background:linear-gradient(135deg,#3b82f6,#1d4ed8); }
    .card-value { font-size:22px; font-weight:700; color:#1f2937; margin-bottom:4px; }
    .card-label { font-size:13px; color:#6b7280; }

    /* Table container */
    .table-container { background:#fff; border-radius:14px; box-shadow:0 4px 14px rgba(2,8,20,.06); border:1px solid #e6eef5; overflow:hidden; }
    .table-header { padding:18px 22px; border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center; }
    .table-title { font-size:17px; font-weight:600; color:#2d3748; }
    .table-actions { display:flex; gap:10px; align-items:center; }
    .search-input { padding:8px 14px; border:1px solid #e2e8f0; border-radius:8px; font-size:13px; width:230px; outline:none; }
    .search-input:focus { border-color:#3b82f6; box-shadow:0 0 0 2px rgba(59,130,246,.15); }

    .table-responsive { overflow-x:auto; max-height:calc(100vh - 380px); }
    table { width:100%; border-collapse:collapse; min-width:1100px; }
    th {
      background:linear-gradient(180deg,#f9fbff,#f3f6fb);
      font-weight:700; color:#1f2937; padding:12px 14px;
      text-align:left; border-bottom:1px solid #e6eef5;
      position:sticky; top:0; z-index:10;
      text-transform:uppercase; font-size:11px; letter-spacing:.06em;
    }
    td { padding:12px 14px; border-bottom:1px solid #eef2f7; color:#334155; vertical-align:middle; }
    tbody tr.data-row { cursor:pointer; transition:background .15s; }
    tbody tr.data-row:hover { background:#f0f7ff; }
    tbody tr.data-row.expanded { background:#e8f4ff; }

    /* Badges */
    .badge { display:inline-block; padding:3px 10px; border-radius:12px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
    .badge-pending  { background:#fef3c7; color:#d97706; }
    .badge-active   { background:#d1fae5; color:#065f46; }
    .badge-repro    { background:#ede9fe; color:#7c3aed; }
    .badge-cancelled{ background:#fee2e2; color:#dc2626; }

    /* Acción cell */
    .accion-cell { text-align:center; white-space:nowrap; }
    .thumb-img { width:34px; height:34px; object-fit:cover; border-radius:6px; border:1px solid #e2e8f0; cursor:pointer; vertical-align:middle; }
    .no-img { color:#cbd5e1; font-size:16px; }
    .delete-btn {
      background:#fee2e2; border:1px solid #fca5a5; color:#dc2626;
      border-radius:7px; padding:4px 10px; font-size:12px; font-weight:700;
      cursor:pointer; margin-left:6px; transition:background .15s;
    }
    .delete-btn:hover { background:#fca5a5; }

    /* Inline edit row */
    .ile-row td { padding:0; background:#f8fbff; border-bottom:2px solid #3b82f6; }
    .ile-form {
      padding:20px 24px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }
    .ile-form .ile-field { display:flex; flex-direction:column; gap:5px; }
    .ile-form .ile-field label { font-size:10px; font-weight:800; color:#64748b; text-transform:uppercase; letter-spacing:1px; }
    .ile-form .ile-field input,
    .ile-form .ile-field select {
      padding:9px 12px; border:1px solid #e2e8f0; border-radius:9px;
      font-size:13px; color:#1e293b; background:#fff; outline:none;
      transition:border .2s;
    }
    .ile-form .ile-field input:focus,
    .ile-form .ile-field select:focus { border-color:#3b82f6; }
    .ile-form .ile-field input:disabled,
    .ile-form .ile-field select:disabled { background:#f1f5f9; color:#94a3b8; cursor:not-allowed; }

    /* Imagen inline */
    .ile-img-zone {
      position:relative; min-height:80px;
      border:2px dashed #cbd5e1; border-radius:10px;
      background:#f8fafc; display:flex; align-items:center; justify-content:center;
      cursor:pointer; overflow:hidden; transition:border .2s, background .2s;
    }
    .ile-img-zone.disabled { cursor:default; opacity:.6; pointer-events:none; }
    .ile-img-zone img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; display:none; }
    .ile-img-placeholder { display:flex; flex-direction:column; align-items:center; gap:5px; pointer-events:none; }
    .ile-img-placeholder span { font-size:11px; font-weight:700; color:#94a3b8; }
    .ile-img-hint {
      display:none; position:absolute; bottom:4px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,.45); color:#fff; font-size:10px;
      padding:2px 7px; border-radius:3px; white-space:nowrap; pointer-events:none;
    }
    .ile-img-remove {
      display:none; position:absolute; top:4px; right:5px;
      background:rgba(239,68,68,.85); border:none; border-radius:4px;
      color:#fff; font-size:11px; padding:2px 7px; cursor:pointer; font-weight:700;
    }

    /* Save / cancel row */
    .ile-footer {
      grid-column:1/-1;
      display:flex; align-items:center; gap:12px; padding-top:6px; border-top:1px solid #e2e8f0;
    }
    .ile-save-btn {
      padding:9px 22px; background:linear-gradient(135deg,#3b82f6,#1d4ed8);
      border:none; border-radius:9px; color:#fff; font-size:13px; font-weight:700;
      cursor:pointer; transition:opacity .2s;
    }
    .ile-save-btn:hover { opacity:.88; }
    .ile-cancel-btn {
      padding:9px 18px; background:#f1f5f9; border:1px solid #e2e8f0;
      border-radius:9px; color:#475569; font-size:13px; font-weight:600; cursor:pointer;
    }
    .ile-msg { font-size:12px; color:#64748b; }

    .spin { display:inline-block; animation:spin 1s linear infinite; }
    @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

    .rab { border:none; border-radius:6px; padding:4px 10px; font-size:12px; font-weight:700; cursor:pointer; }
    .refresh-btn { padding:8px 14px; background:#f1f5f9; border:1px solid #e2e8f0; border-radius:8px; font-size:13px; font-weight:600; color:#475569; cursor:pointer; }
    .refresh-btn:hover { background:#e2e8f0; }
  </style>
</head>
<body>
  <script>
    (function(){
      try {
        const u = JSON.parse(localStorage.getItem('user')||sessionStorage.getItem('user')||'{}');
        const r = String(u.role||'').toLowerCase();
        const allowed = ['admin','administrador','administrator','backoffice','back office','back_office','bo','b.o','b:o','b-o','supervisor'];
        if (!allowed.some(function(v){ return r===v||r.includes(v); })) window.location.href='/inicio.html';
      } catch(e) { window.location.href='/inicio.html'; }
    })();
  </script>

  <div class="layout">
    <nav class="sidebar sidebar-inicio" data-active="costumer-lineas"></nav>
    <div class="main-content">
      <div class="page-header">
        <h1 class="page-title">Costumer Líneas</h1>
        <button class="refresh-btn" id="refresh-btn"><i class="fas fa-sync-alt"></i> Refrescar</button>
      </div>

      <div class="summary-cards">
        <div class="summary-card">
          <div class="card-icon"><i class="fas fa-phone-alt"></i></div>
          <div class="card-value" id="stat-total">0</div>
          <div class="card-label">Total de Registros</div>
        </div>
        <div class="summary-card">
          <div class="card-icon" style="background:linear-gradient(135deg,#10b981,#059669)"><i class="fas fa-check-circle"></i></div>
          <div class="card-value" id="stat-active">0</div>
          <div class="card-label">Activos</div>
        </div>
        <div class="summary-card">
          <div class="card-icon" style="background:linear-gradient(135deg,#f59e0b,#d97706)"><i class="fas fa-hourglass-half"></i></div>
          <div class="card-value" id="stat-pending">0</div>
          <div class="card-label">Pendientes</div>
        </div>
        <div class="summary-card">
          <div class="card-icon" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed)"><i class="fas fa-redo"></i></div>
          <div class="card-value" id="stat-repro">0</div>
          <div class="card-label">Repro</div>
        </div>
      </div>

      <div class="table-container">
        <div class="table-header">
          <h2 class="table-title">Listado de Líneas <span id="cl-month-label" style="font-size:11px;font-weight:700;color:#3b82f6;background:#eff6ff;padding:2px 10px;border-radius:999px;margin-left:8px;vertical-align:middle;"></span></h2>
          <div class="table-actions" style="flex-wrap:wrap;gap:8px;">
            <label style="font-size:12px;color:#64748b;font-weight:600;">Desde</label>
            <input type="date" id="cl-desde" style="padding:6px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;outline:none;">
            <label style="font-size:12px;color:#64748b;font-weight:600;">Hasta</label>
            <input type="date" id="cl-hasta" style="padding:6px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;outline:none;">
            <button id="cl-btn-mes" style="padding:6px 12px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;">Mes actual</button>
            <button id="cl-btn-todo" style="padding:6px 12px;background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;">Ver todo</button>
            <input type="text" class="search-input" id="search-input" placeholder="Buscar...">
          </div>
        </div>
        <div class="table-responsive">
          <table id="lineas-table">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Teléfono</th>
                <th>N° Cuenta</th>
                <th>Status</th>
                <th>Mercado</th>
                <th>Supervisor</th>
                <th>Día Venta</th>
                <th>Día Instalación</th>
                <th>Cant. Líneas</th>
                <th>Agente</th>
                <th>Acción</th>
              </tr>
            </thead>
            <tbody id="lineas-tbody">
              <tr><td colspan="11" style="text-align:center;padding:40px;color:#94a3b8;"><i class="fas fa-spinner spin"></i> Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/fetch-interceptor.js"></script>
  <script src="/js/logout-handler.js"></script>
  <script src="/js/user-info.js"></script>
  <script src="js/sidebar-loader.js"></script>

  <script>
    var _allLineas     = [];
    var _expandedId    = null;
    var _ileImgFile    = {};   // { [id]: File }
    var _myRole        = '';

    (function initRole(){
      try {
        var u = JSON.parse(localStorage.getItem('user')||sessionStorage.getItem('user')||'{}');
        _myRole = String(u.role||'').toLowerCase();
      } catch(e){}
    })();

    function canEdit(){ return ['admin','administrador','administrator','backoffice','back office','back_office','bo','b.o','b:o','b-o'].some(function(v){ return _myRole===v||_myRole.includes(v); }); }

    function fmtDate(v){ if(!v||v==='—') return '—'; try{ var p=String(v).trim().split('-'); if(p.length===3){ return p[2]+'/'+p[1]+'/'+p[0]; } return v; }catch(_){ return v; } }

    function statusBadge(s){
      var st = String(s||'').toLowerCase();
      var cls = st.includes('active')?'badge-active': st.includes('pending')?'badge-pending': st.includes('repro')||st.includes('rescheduled')?'badge-repro': st.includes('cancel')?'badge-cancelled':'badge-pending';
      return '<span class="badge '+cls+'">'+String(s||'PENDING').toUpperCase()+'</span>';
    }

    /* ── FILTRO Y ORDEN ── */
    function _setCurrentMonth(){
      var now = new Date();
      var y = now.getFullYear();
      var m = String(now.getMonth()+1).padStart(2,'0');
      document.getElementById('cl-desde').value = y+'-'+m+'-01';
      document.getElementById('cl-hasta').value = y+'-'+m+'-'+String(new Date(y, now.getMonth()+1, 0).getDate()).padStart(2,'0');
      var label = document.getElementById('cl-month-label');
      if (label) label.textContent = now.toLocaleString('es-ES',{month:'long',year:'numeric'}).replace(/^\w/, c=>c.toUpperCase());
    }

    function _applyFilter(){
      var desde = (document.getElementById('cl-desde').value||'').trim();
      var hasta = (document.getElementById('cl-hasta').value||'').trim();
      var q = (document.getElementById('search-input').value||'').toLowerCase().trim();
      var list = _allLineas.filter(function(r){
        var dv = String(r.dia_venta||'').trim();
        if (desde && dv && dv < desde) return false;
        if (hasta && dv && dv > hasta) return false;
        if (q){
          var blob = [(r.nombre_cliente||''),(r.telefono_principal||''),(r.agente_nombre||r.agente||''),(r.supervisor||'')].join(' ').toLowerCase();
          if (!blob.includes(q)) return false;
        }
        return true;
      });
      // Orden: más reciente primero
      list.sort(function(a,b){
        var da = a.dia_venta||a.created_at||'';
        var db = b.dia_venta||b.created_at||'';
        return db.localeCompare(da);
      });
      var label = document.getElementById('cl-month-label');
      if (label) {
        if (!desde && !hasta) label.textContent = 'Todos los registros';
        else label.textContent = (desde?desde.split('-').reverse().join('/'):'')+' – '+(hasta?hasta.split('-').reverse().join('/'):'');
      }
      renderTable(list);
      updateStats(list);
    }

    /* ── LOAD ── */
    async function loadLineas(){
      document.getElementById('lineas-tbody').innerHTML = '<tr><td colspan="11" style="text-align:center;padding:40px;color:#94a3b8;"><i class="fas fa-spinner spin"></i> Cargando...</td></tr>';
      try {
        var token = localStorage.getItem('token')||sessionStorage.getItem('token')||'';
        var resp = await fetch('/api/lineas-team', {
          headers: Object.assign({'Content-Type':'application/json'}, token ? {'Authorization':'Bearer '+token} : {}),
          credentials: 'include'
        });
        var data = await resp.json();
        _allLineas = Array.isArray(data.data) ? data.data : (Array.isArray(data) ? data : []);
        _setCurrentMonth();
        _applyFilter();
      } catch(err){
        document.getElementById('lineas-tbody').innerHTML = '<tr><td colspan="11" style="text-align:center;padding:40px;color:#dc2626;"><i class="fas fa-exclamation-circle"></i> '+err.message+'</td></tr>';
      }
    }

    /* ── STATS ── */
    function updateStats(list){
      document.getElementById('stat-total').textContent = list.length;
      document.getElementById('stat-active').textContent = list.filter(function(l){ return String(l.status||'').toLowerCase().includes('active'); }).length;
      document.getElementById('stat-pending').textContent = list.filter(function(l){ var s=String(l.status||'').toLowerCase(); return s.includes('pending')&&!s.includes('active'); }).length;
      document.getElementById('stat-repro').textContent = list.filter(function(l){ var s=String(l.status||'').toLowerCase(); return s.includes('repro')||s.includes('rescheduled'); }).length;
    }

    /* ── RENDER TABLE ── */
    function renderTable(list){
      _expandedId = null;
      _ileImgFile = {};
      var tbody = document.getElementById('lineas-tbody');
      if (!list || !list.length){
        tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;padding:40px;color:#94a3b8;">Sin registros</td></tr>';
        return;
      }
      var html = '';
      list.forEach(function(rec){
        var rid = String(rec.id||rec._id||'');
        var imgUrl = rec.imagen_url || '';
        var imgCell = '<td class="accion-cell">';
        if (imgUrl){
          imgCell += '<img class="thumb-img" src="'+imgUrl+'" onclick="event.stopPropagation();_openImgLightbox(\''+imgUrl+'\')" title="Ver imagen">';
        } else {
          imgCell += '<span class="no-img" title="Sin imagen">—</span>';
        }
        if (canEdit()){
          imgCell += '<button class="rab delete-btn" onclick="event.stopPropagation();deleteLinea(\''+rid+'\')">✕</button>';
        }
        imgCell += '</td>';
        html += '<tr class="data-row" id="row-'+rid+'" onclick="toggleRowExpand(\''+rid+'\')">'+
          '<td><strong>'+( rec.nombre_cliente||'—' )+'</strong></td>'+
          '<td>'+(rec.telefono_principal||'—')+'</td>'+
          '<td>'+(rec.numero_cuenta||'—')+'</td>'+
          '<td>'+statusBadge(rec.status)+'</td>'+
          '<td>'+(rec.mercado||'—')+'</td>'+
          '<td>'+(rec.supervisor||'—')+'</td>'+
          '<td>'+fmtDate(rec.dia_venta)+'</td>'+
          '<td>'+fmtDate(rec.dia_instalacion)+'</td>'+
          '<td style="text-align:center;">'+(rec.cantidad_lineas||1)+'</td>'+
          '<td>'+(rec.agente_nombre||rec.agente||'—')+'</td>'+
          imgCell+
          '</tr>';
      });
      tbody.innerHTML = html;
    }

    /* ── TOGGLE INLINE EDIT ── */
    function toggleRowExpand(rid){
      var tbody = document.getElementById('lineas-tbody');
      // Cerrar expansión anterior
      if (_expandedId !== null){
        var oldIle = document.getElementById('ile-'+_expandedId);
        if (oldIle) oldIle.remove();
        var oldRow = document.getElementById('row-'+_expandedId);
        if (oldRow) oldRow.classList.remove('expanded');
        if (_expandedId === rid){ _expandedId = null; return; }
      }
      _expandedId = rid;
      var dataRow = document.getElementById('row-'+rid);
      if (!dataRow) return;
      dataRow.classList.add('expanded');

      var rec = _allLineas.find(function(r){ return String(r.id||r._id||'')===rid; });
      if (!rec) return;

      var editable = canEdit();
      var dis = editable ? '' : ' disabled';
      var imgUrl = rec.imagen_url || '';

      var ileRow = document.createElement('tr');
      ileRow.className = 'ile-row';
      ileRow.id = 'ile-'+rid;
      ileRow.innerHTML = '<td colspan="11">'+
        '<div class="ile-form">'+
          '<div class="ile-field">'+
            '<label>Nombre Cliente</label>'+
            '<input type="text" id="ile-nombre-'+rid+'" value="'+_esc(rec.nombre_cliente)+'"'+dis+' style="text-transform:uppercase;">'+
          '</div>'+
          '<div class="ile-field">'+
            '<label>Teléfono Principal</label>'+
            '<input type="tel" id="ile-tel-'+rid+'" value="'+_esc(rec.telefono_principal)+'"'+dis+'>'+
          '</div>'+
          '<div class="ile-field">'+
            '<label>Número de Cuenta</label>'+
            '<input type="text" id="ile-cuenta-'+rid+'" value="'+_esc(rec.numero_cuenta)+'"'+dis+'>'+
          '</div>'+
          '<div class="ile-field">'+
            '<label>Pin de Seguridad</label>'+
            '<input type="text" id="ile-pin-'+rid+'" value="'+_esc(rec.pin_seguridad)+'"'+dis+'>'+
          '</div>'+
          '<div class="ile-field">'+
            '<label>Dirección</label>'+
            '<input type="text" id="ile-dir-'+rid+'" value="'+_esc(rec.direccion)+'"'+dis+'>'+
          '</div>'+
          '<div class="ile-field">'+
            '<label>Status</label>'+
            '<select id="ile-status-'+rid+'"'+dis+'>'+
              '<option value="PENDING"'+(String(rec.status||'').toLowerCase()==='pending'?' selected':'')+'>PENDING</option>'+
              '<option value="RESCHEDULED"'+(String(rec.status||'').toLowerCase().includes('repro')||String(rec.status||'').toLowerCase().includes('rescheduled')?' selected':'')+'>REPRO</option>'+
              '<option value="ACTIVE"'+(String(rec.status||'').toLowerCase().includes('active')?' selected':'')+'>ACTIVE</option>'+
              '<option value="CANCELLED"'+(String(rec.status||'').toLowerCase().includes('cancel')?' selected':'')+'>CANCELLED</option>'+
            '</select>'+
          '</div>'+
          '<div class="ile-field">'+
            '<label>Día de Venta</label>'+
            '<input type="date" id="ile-dventa-'+rid+'" value="'+_esc(rec.dia_venta||'')+'"'+dis+'>'+
          '</div>'+
          '<div class="ile-field">'+
            '<label>Día de Instalación</label>'+
            '<input type="date" id="ile-dinst-'+rid+'" value="'+_esc(rec.dia_instalacion||'')+'"'+dis+'>'+
          '</div>'+
          '<div class="ile-field">'+
            '<label>Cantidad de Líneas</label>'+
            '<select id="ile-cant-'+rid+'"'+dis+'>'+[1,2,3,4,5].map(function(n){ return '<option value="'+n+'"'+(parseInt(rec.cantidad_lineas||1)===n?' selected':'')+'>'+n+'</option>'; }).join('')+
            '</select>'+
          '</div>'+
          '<div class="ile-field" style="grid-column:1/-1;">'+
            '<label>Imagen del Lead</label>'+
            '<div class="ile-img-zone" id="ile-img-zone-'+rid+'"'+
              ' onclick="document.getElementById(\'ile-img-input-'+rid+'\').click()" ondragover="event.preventDefault();this.style.borderColor=\'#3b82f6\';" ondragleave="this.style.borderColor=\'#cbd5e1\';" ondrop="_ileImgDrop(event,\''+rid+'\')">'+
              '<div class="ile-img-placeholder" id="ile-img-ph-'+rid+'"'+(imgUrl?' style="display:none;"':'')+'>'+
                '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>'+
                '<span>Click o arrastra</span>'+
              '</div>'+
              '<img id="ile-img-preview-'+rid+'" src="'+(imgUrl||'')+'" style="'+(imgUrl?'display:block;':'display:none;')+'width:100%;height:100%;object-fit:cover;position:absolute;inset:0;" onclick="event.stopPropagation();_openImgLightbox(this.src)">'+
              '<div class="ile-img-hint" id="ile-img-hint-'+rid+'" style="'+(imgUrl?'display:block;':'')+'">🔍 Click para ver</div>'+
              (editable?'<button class="ile-img-remove" id="ile-img-remove-'+rid+'" type="button" onclick="event.stopPropagation();_ileImgRemove(\''+rid+'\')" style="'+(imgUrl?'display:block;':'')+'">✕</button>':'')+
            '</div>'+
            '<input type="file" id="ile-img-input-'+rid+'" accept="image/*" style="display:none" onchange="_ileImgSelect(event,\''+rid+'\')">'+
          '</div>'+
          '<div class="ile-footer">'+
            (editable?'<button class="ile-save-btn" onclick="guardarILE(\''+rid+'\')">Guardar</button>':'')+
            (!editable?'<button class="ile-save-btn" style="background:#0d9488;" onclick="_guardarSoloImagenLinea(\''+rid+'\')">📷 Subir imagen</button>':'')+
            '<button class="ile-cancel-btn" onclick="toggleRowExpand(\''+rid+'\')">Cancelar</button>'+
            '<span class="ile-msg" id="ile-msg-'+rid+'"></span>'+
          '</div>'+
        '</div>'+
      '</td>';
      dataRow.insertAdjacentElement('afterend', ileRow);
    }

    /* ── IMAGE HELPERS ── */
    function _esc(s){ return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

    function _ileImgSelect(e, rid){
      var f = e.target.files[0];
      if (f) _ileSetPreview(rid, f);
    }

    function _ileImgDrop(e, rid){
      e.preventDefault();
      var z = document.getElementById('ile-img-zone-'+rid);
      if(z) z.style.borderColor='#cbd5e1';
      var f = e.dataTransfer.files[0];
      if (f && f.type.startsWith('image/')) _ileSetPreview(rid, f);
    }

    function _ileSetPreview(rid, file){
      _ileImgFile[rid] = file;
      var reader = new FileReader();
      reader.onload = function(ev){
        var img = document.getElementById('ile-img-preview-'+rid);
        if(img){ img.src = ev.target.result; img.style.display='block'; }
        var ph = document.getElementById('ile-img-ph-'+rid);
        if(ph) ph.style.display='none';
        var hint = document.getElementById('ile-img-hint-'+rid);
        if(hint) hint.style.display='block';
        var rmv = document.getElementById('ile-img-remove-'+rid);
        if(rmv) rmv.style.display='block';
      };
      reader.readAsDataURL(file);
    }

    function _ileImgRemove(rid){
      delete _ileImgFile[rid];
      var inp = document.getElementById('ile-img-input-'+rid);
      if(inp) inp.value='';
      var img = document.getElementById('ile-img-preview-'+rid);
      if(img){ img.src=''; img.style.display='none'; }
      var ph = document.getElementById('ile-img-ph-'+rid);
      if(ph) ph.style.display='flex';
      var hint = document.getElementById('ile-img-hint-'+rid);
      if(hint) hint.style.display='none';
      var rmv = document.getElementById('ile-img-remove-'+rid);
      if(rmv) rmv.style.display='none';
    }

    function _openImgLightbox(src){
      if(!src) return;
      var overlay = document.createElement('div');
      overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:99999;display:flex;align-items:center;justify-content:center;cursor:zoom-out;padding:20px;';
      overlay.innerHTML='<img src="'+src+'" style="max-width:92vw;max-height:90vh;border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,.6);">';
      overlay.onclick=function(){ document.body.removeChild(overlay); };
      document.body.appendChild(overlay);
    }

    async function _uploadIleImg(rid){
      var file = _ileImgFile[rid];
      if(!file) return null;
      var fd = new FormData();
      fd.append('file', file);
      var token = (localStorage.getItem('token')||'').trim();
      var res = await fetch('/api/files/upload', {
        method:'POST', credentials:'include',
        headers: token ? {'Authorization':'Bearer '+token} : {},
        body: fd
      });
      if(!res.ok) throw new Error('Error subiendo imagen');
      var d = await res.json();
      return (d.data && d.data.url) || d.file_path || d.url || '';
    }

    /* ── GUARDAR ── */
    /* Subir solo imagen — disponible para todos los roles */
    async function _guardarSoloImagenLinea(rid){
      var msgEl = document.getElementById('ile-msg-'+rid);
      if(!_ileImgFile[rid]){ if(msgEl){msgEl.textContent='Selecciona una imagen primero';msgEl.style.color='#dc2626';}return; }
      if(msgEl){ msgEl.textContent='Subiendo imagen...'; msgEl.style.color='#64748b'; }
      try{
        var imgUrl = await _uploadIleImg(rid);
        if(!imgUrl) throw new Error('No se obtuvo URL');
        var token = localStorage.getItem('token')||sessionStorage.getItem('token')||'';
        var rec = _allLineas.find(function(r){ return String(r.id||r._id||'')===rid; });
        var res = await fetch('/api/lineas-team/update',{
          method:'PUT', credentials:'include',
          headers:Object.assign({'Content-Type':'application/json'},token?{'Authorization':'Bearer '+token}:{}),
          body:JSON.stringify({id:rid, imagen_url:imgUrl})
        });
        var data = await res.json();
        if(!res.ok||data.success===false) throw new Error(data.message||'Error');
        if(rec) rec.imagen_url = imgUrl;
        // Actualizar preview en la zona
        var preview = document.getElementById('ile-img-preview-'+rid);
        var ph = document.getElementById('ile-img-ph-'+rid);
        var hint = document.getElementById('ile-img-hint-'+rid);
        if(preview){ preview.src=imgUrl; preview.style.display='block'; }
        if(ph) ph.style.display='none';
        if(hint) hint.style.display='block';
        if(msgEl){ msgEl.textContent='✓ Imagen guardada'; msgEl.style.color='#065f46'; }
        delete _ileImgFile[rid];
      }catch(err){
        if(msgEl){ msgEl.textContent='Error: '+err.message; msgEl.style.color='#dc2626'; }
      }
    }

    async function guardarILE(rid){
      var msgEl = document.getElementById('ile-msg-'+rid);
      if(msgEl){ msgEl.textContent='Guardando...'; msgEl.style.color='#64748b'; }

      var imgUrl = null;
      if (_ileImgFile[rid]){
        try {
          if(msgEl){ msgEl.textContent='Subiendo imagen...'; }
          imgUrl = await _uploadIleImg(rid);
        } catch(err){
          if(msgEl){ msgEl.textContent='Error: '+err.message; msgEl.style.color='#dc2626'; }
          return;
        }
      } else {
        var previewEl = document.getElementById('ile-img-preview-'+rid);
        if(previewEl && previewEl.src && !previewEl.src.startsWith('data:') && previewEl.style.display!=='none'){
          imgUrl = previewEl.src;
        } else if(previewEl && (!previewEl.src || previewEl.style.display==='none')){
          imgUrl = '';
        }
      }

      var payload = { id: rid };
      var nombre = document.getElementById('ile-nombre-'+rid);
      var tel    = document.getElementById('ile-tel-'+rid);
      var cuenta = document.getElementById('ile-cuenta-'+rid);
      var pin    = document.getElementById('ile-pin-'+rid);
      var dir    = document.getElementById('ile-dir-'+rid);
      var status = document.getElementById('ile-status-'+rid);
      var dventa = document.getElementById('ile-dventa-'+rid);
      var dinst  = document.getElementById('ile-dinst-'+rid);
      var cant   = document.getElementById('ile-cant-'+rid);

      if(nombre) payload.nombre_cliente     = nombre.value;
      if(tel)    payload.telefono_principal  = tel.value;
      if(cuenta) payload.numero_cuenta       = cuenta.value;
      if(pin)    payload.pin_seguridad       = pin.value;
      if(dir)    payload.direccion           = dir.value;
      if(status) payload.status             = status.value;
      if(dventa) payload.dia_venta          = dventa.value;
      if(dinst)  payload.dia_instalacion    = dinst.value;
      if(cant)   payload.cantidad_lineas    = parseInt(cant.value, 10);
      if(imgUrl !== null) payload.imagen_url = imgUrl;

      try {
        var token = localStorage.getItem('token')||sessionStorage.getItem('token')||'';
        var resp = await fetch('/api/lineas-team/update', {
          method:'PUT',
          headers: Object.assign({'Content-Type':'application/json'}, token ? {'Authorization':'Bearer '+token} : {}),
          credentials:'include',
          body: JSON.stringify(payload)
        });
        var data = await resp.json();
        if(!resp.ok || data.success===false) throw new Error(data.message||data.detail||'Error al guardar');
        if(msgEl){ msgEl.textContent='✓ Guardado'; msgEl.style.color='#065f46'; }
        // Actualizar local
        var idx = _allLineas.findIndex(function(r){ return String(r.id||r._id||'')===rid; });
        if(idx>=0){
          if(nombre) _allLineas[idx].nombre_cliente = payload.nombre_cliente;
          if(tel)    _allLineas[idx].telefono_principal = payload.telefono_principal;
          if(cuenta) _allLineas[idx].numero_cuenta = payload.numero_cuenta;
          if(pin)    _allLineas[idx].pin_seguridad = payload.pin_seguridad;
          if(dir)    _allLineas[idx].direccion = payload.direccion;
          if(status) _allLineas[idx].status = payload.status;
          if(dventa) _allLineas[idx].dia_venta = payload.dia_venta;
          if(dinst)  _allLineas[idx].dia_instalacion = payload.dia_instalacion;
          if(cant)   _allLineas[idx].cantidad_lineas = payload.cantidad_lineas;
          if(imgUrl !== null) _allLineas[idx].imagen_url = imgUrl;
        }
        setTimeout(function(){ _applyFilter(); }, 900);
      } catch(err){
        if(msgEl){ msgEl.textContent='Error: '+err.message; msgEl.style.color='#dc2626'; }
      }
    }

    /* ── DELETE ── */
    async function deleteLinea(rid){
      if(!confirm('¿Eliminar este registro?')) return;
      try {
        var token = localStorage.getItem('token')||sessionStorage.getItem('token')||'';
        var resp = await fetch('/api/lineas-team/delete', {
          method:'DELETE',
          headers: Object.assign({'Content-Type':'application/json'}, token ? {'Authorization':'Bearer '+token} : {}),
          credentials:'include',
          body: JSON.stringify({ id: rid })
        });
        var data = await resp.json();
        if(!resp.ok || data.success===false) throw new Error(data.message||'Error al eliminar');
        _allLineas = _allLineas.filter(function(r){ return String(r.id||r._id||'')!==rid; });
        _applyFilter();
      } catch(err){
        alert('Error: '+err.message);
      }
    }

    /* ── SEARCH ── */
    document.getElementById('refresh-btn').addEventListener('click', loadLineas);
    document.getElementById('search-input').addEventListener('input', _applyFilter);
    document.getElementById('cl-desde').addEventListener('change', _applyFilter);
    document.getElementById('cl-hasta').addEventListener('change', _applyFilter);
    document.getElementById('cl-btn-mes').addEventListener('click', function(){ _setCurrentMonth(); _applyFilter(); });
    document.getElementById('cl-btn-todo').addEventListener('click', function(){
      document.getElementById('cl-desde').value = '';
      document.getElementById('cl-hasta').value = '';
      _applyFilter();
    });

    document.addEventListener('DOMContentLoaded', function(){
      if(window.loadSidebar) window.loadSidebar();
      loadLineas();
    });
  </script>
</body>
</html>
