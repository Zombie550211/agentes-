<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premios — Febrero</title>

  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="/css/sidebar-shared.css?v=20251124f" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #F4F5F7;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 0;
    }

    .layout { display: flex; min-height: 100vh; }
    .sidebar { flex: 0 0 auto; }
    .main-content {
      flex: 1;
      overflow-y: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .page {
      width: 100%;
      max-width: 860px;
    }

    .header-banner {
      background: #1B2A4A;
      border-radius: 20px 20px 0 0;
      padding: 36px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: fadeDown 0.6s ease both;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-icon {
      width: 46px;
      height: 46px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
    }

    .brand-text .company {
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    .brand-text .doc-title {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      margin-top: 2px;
    }

    .header-right {
      text-align: right;
    }

    .period-label {
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    .period-value {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      margin-top: 2px;
    }

    .main-card {
      background: #fff;
      border-radius: 0 0 20px 20px;
      box-shadow: 0 20px 60px rgba(27,42,74,0.1);
      overflow: hidden;
      animation: fadeUp 0.7s ease 0.1s both;
    }

    .section-label {
      padding: 20px 48px;
      background: #F8F9FC;
      border-bottom: 1px solid #EAECF2;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-label span {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #8A94A6;
    }

    .section-label .line {
      flex: 1;
      height: 1px;
      background: #EAECF2;
    }

    .section-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-add {
      appearance: none;
      border: 1px solid #D7DDEA;
      background: #fff;
      color: #1B2A4A;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      white-space: nowrap;
    }

    .btn-add:hover {
      background: #FAFBFF;
      border-color: #C9D2E6;
    }

    .prizes-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .prize-block {
      padding: 40px 48px;
      position: relative;
      transition: background 0.2s ease;
    }

    .prize-remove {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 28px;
      height: 28px;
      border-radius: 10px;
      border: 1px solid #EAECF2;
      background: #fff;
      color: #8A94A6;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      line-height: 1;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .prize-remove:hover {
      background: #FAFBFF;
      color: #1B2A4A;
    }

    .prize-block:hover { background: #FAFBFF; }

    .prize-block:first-child {
      border-right: 1px solid #EAECF2;
    }

    .prize-block::before {
      content: '';
      position: absolute;
      top: 0; left: 48px;
      width: 40px;
      height: 3px;
      border-radius: 0 0 4px 4px;
    }

    .prize-block.first::before { background: #C9972A; }
    .prize-block.second::before { background: #1B2A4A; }

    .rank-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .rank-badge {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 100px;
    }

    .prize-block.first .rank-badge {
      background: #FEF4DC;
      color: #C9972A;
    }

    .prize-block.second .rank-badge {
      background: #EEF1F8;
      color: #1B2A4A;
    }

    .rank-icon { font-size: 1.1rem; }

    .prize-amount {
      font-family: 'Playfair Display', serif;
      font-size: 4rem;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -2px;
      margin-bottom: 6px;
    }

    .prize-block.first .prize-amount { color: #C9972A; }
    .prize-block.second .prize-amount { color: #1B2A4A; }

    .prize-desc {
      font-size: 0.75rem;
      color: #8A94A6;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 28px;
    }

    .winner-chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #F4F5F7;
      border: 1px solid #EAECF2;
      border-radius: 100px;
      padding: 8px 14px 8px 8px;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: #fff;
    }

    .prize-block.first .avatar { background: #C9972A; }
    .prize-block.second .avatar { background: #1B2A4A; }

    .winner-name-chip {
      font-size: 0.82rem;
      font-weight: 600;
      color: #2D3A52;
    }

    .table-section {
      border-top: 1px solid #EAECF2;
    }

    .table-header {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      padding: 12px 48px;
      background: #F8F9FC;
      border-bottom: 1px solid #EAECF2;
    }

    .table-header span {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8A94A6;
    }

    .table-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      padding: 18px 48px;
      align-items: center;
      border-bottom: 1px solid #F0F1F5;
      transition: background 0.15s ease;
    }

    .table-row:hover { background: #FAFBFF; }

    .table-row:last-child { border-bottom: none; }

    .row-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: #1B2A4A;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .row-rank-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .table-row:nth-child(1) .row-rank-dot { background: #C9972A; }
    .table-row:nth-child(2) .row-rank-dot { background: #1B2A4A; }

    .row-cell {
      font-size: 0.82rem;
      color: #5A6478;
      font-weight: 400;
    }

    .row-cell.amount {
      font-weight: 700;
      font-size: 0.9rem;
    }

    .table-row:nth-child(1) .row-cell.amount { color: #C9972A; }
    .table-row:nth-child(2) .row-cell.amount { color: #1B2A4A; }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 100px;
      background: #E8F5EE;
      color: #2D8A55;
    }

    .status-pill::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #2D8A55;
    }

    .card-footer {
      padding: 18px 48px;
      background: #F8F9FC;
      border-top: 1px solid #EAECF2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 0 0 20px 20px;
    }

    .footer-note {
      font-size: 0.7rem;
      color: #8A94A6;
      letter-spacing: 0.5px;
    }

    .total-block {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .total-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8A94A6;
    }

    .total-value {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #1B2A4A;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 9999;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      width: 100%;
      max-width: 540px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 30px 90px rgba(0,0,0,0.25);
      overflow: hidden;
    }

    .modal-header {
      padding: 16px 18px;
      background: #F8F9FC;
      border-bottom: 1px solid #EAECF2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-title {
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #1B2A4A;
    }

    .modal-close {
      appearance: none;
      border: 1px solid #EAECF2;
      background: #fff;
      border-radius: 10px;
      width: 34px;
      height: 34px;
      cursor: pointer;
      color: #8A94A6;
      font-size: 18px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-body {
      padding: 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full { grid-column: 1 / -1; }

    .field label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8A94A6;
    }

    .field input,
    .field select {
      border: 1px solid #D7DDEA;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 0.9rem;
      outline: none;
      color: #1B2A4A;
      background: #fff;
    }

    .modal-footer {
      padding: 14px 18px;
      background: #fff;
      border-top: 1px solid #EAECF2;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .btn {
      appearance: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      border: 1px solid #D7DDEA;
      background: #fff;
      color: #1B2A4A;
    }

    .btn.primary {
      background: #1B2A4A;
      border-color: #1B2A4A;
      color: #fff;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .prizes-grid { grid-template-columns: 1fr; }
      .prize-block:first-child { border-right: none; border-bottom: 1px solid #EAECF2; }
      .header-banner, .prize-block, .table-header, .table-row, .card-footer { padding-left: 24px; padding-right: 24px; }
      .prize-block::before { left: 24px; }
      .table-header, .table-row { grid-template-columns: 2fr 1fr 1fr; }
      .table-header span:last-child, .row-cell:last-child { display: none; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <nav class="sidebar sidebar-inicio" data-active="premios"></nav>

    <main class="main-content">
      <div class="page">

        <div class="header-banner">
          <div class="brand">
            <div class="brand-icon">�</div>
            <div class="brand-text">
              <div class="company">Equipo de Ventas</div>
              <div class="doc-title">Reconocimiento de Desempeño</div>
            </div>
          </div>
          <div class="header-right">
            <div class="period-label">Período de evaluación</div>
            <div class="period-value">Promo Febrero 2026</div>
          </div>
        </div>

        <div class="main-card">

          <div class="section-label">
            <span>Premios por mayor venta</span>
            <div class="line"></div>
            <div class="section-actions">
              <button class="btn-add" id="btnOpenPremioModal" type="button">Agregar premio</button>
            </div>
          </div>

          <div class="prizes-grid" id="prizesGrid"></div>

          <div class="table-section">

            <div class="table-header">
              <span>Colaborador</span>
              <span>Categoría</span>
              <span>Monto</span>
              <span>Estado</span>
            </div>

            <div id="tableRows"></div>

          </div>

          <div class="card-footer">
            <div class="footer-note">Promo del 01 al 28 de Febrero · Generado automáticamente</div>
            <div class="total-block">
              <div class="total-label">Total premiado</div>
              <div class="total-value" id="totalValue">$0.00</div>
            </div>
          </div>

        </div>

      </div>
    </main>
  </div>

  <div class="modal-backdrop" id="premioModal">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <div class="modal-title">Agregar premio</div>
        <button class="modal-close" id="btnClosePremioModal" type="button">×</button>
      </div>
      <form id="premioForm">
        <div class="modal-body">
          <div class="field">
            <label for="premioTipo">Tipo</label>
            <select id="premioTipo" name="tipo" required>
              <option value="first">1er Lugar</option>
              <option value="second">2do Lugar</option>
            </select>
          </div>
          <div class="field">
            <label for="premioMonto">Monto (USD)</label>
            <input id="premioMonto" name="monto" type="number" step="0.01" min="0" value="0" required>
          </div>
          <div class="field full">
            <label for="premioCategoria">Categoría</label>
            <input id="premioCategoria" name="categoria" type="text" value="Viáticos" required>
          </div>
          <div class="field">
            <label for="premioIniciales">Iniciales</label>
            <input id="premioIniciales" name="iniciales" type="text" maxlength="4" placeholder="RV" required>
          </div>
          <div class="field">
            <label for="premioNombre">Nombre</label>
            <input id="premioNombre" name="nombre" type="text" placeholder="Roberto Velásquez" required>
          </div>
          <div class="field full">
            <label for="premioDesc">Descripción</label>
            <input id="premioDesc" name="descripcion" type="text" value="Premio en viáticos" required>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn" id="btnCancelPremio" type="button">Cancelar</button>
          <button class="btn primary" type="submit">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/logout-handler.js"></script>
  <script src="/js/user-info.js"></script>
  <script src="js/sidebar-loader.js"></script>

  <script>
    (function () {
      'use strict';

      const STORAGE_KEY = 'premios.items.v1';

      const defaultItems = [
        {
          id: 'default-1',
          tipo: 'first',
          nombre: 'Roberto Velásquez',
          iniciales: 'RV',
          categoria: 'Viáticos',
          descripcion: 'Premio en viáticos',
          monto: 500
        },
        {
          id: 'default-2',
          tipo: 'second',
          nombre: 'Guadalupe Santana',
          iniciales: 'GS',
          categoria: 'Viáticos',
          descripcion: 'Premio en viáticos',
          monto: 200
        }
      ];

      function safeJsonParse(raw, fallback) {
        try { return JSON.parse(raw); } catch (_) { return fallback; }
      }

      function loadItems() {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = safeJsonParse(raw, null);
        if (Array.isArray(parsed)) return parsed;
        return defaultItems.slice();
      }

      function saveItems(items) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
      }

      function money(n) {
        const num = Number(n || 0);
        return '$' + num.toFixed(2);
      }

      function moneyShort(n) {
        const num = Number(n || 0);
        if (Number.isFinite(num)) return '$' + (Math.round(num) === num ? String(num) : String(num));
        return '$0';
      }

      function rankBadgeText(tipo) {
        return tipo === 'first' ? '1er Lugar' : '2do Lugar';
      }

      function rankIcon(tipo) {
        return tipo === 'first' ? '🏆' : '🥈';
      }

      function render() {
        const prizesGrid = document.getElementById('prizesGrid');
        const tableRows = document.getElementById('tableRows');
        const totalValue = document.getElementById('totalValue');
        if (!prizesGrid || !tableRows || !totalValue) return;

        const items = loadItems();
        prizesGrid.innerHTML = '';
        tableRows.innerHTML = '';

        let total = 0;

        items.forEach((item) => {
          const tipo = item.tipo === 'first' ? 'first' : 'second';
          const monto = Number(item.monto || 0);
          total += monto;

          const block = document.createElement('div');
          block.className = 'prize-block ' + tipo;
          block.setAttribute('data-id', item.id);
          block.innerHTML = `
            <button class="prize-remove" type="button" aria-label="Eliminar">×</button>
            <div class="rank-row">
              <div class="rank-badge">${rankBadgeText(tipo)}</div>
              <span class="rank-icon">${rankIcon(tipo)}</span>
            </div>
            <div class="prize-amount">${moneyShort(monto)}</div>
            <div class="prize-desc">${String(item.descripcion || '').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
            <div class="winner-chip">
              <div class="avatar">${String(item.iniciales || '').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
              <div class="winner-name-chip">${String(item.nombre || '').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
            </div>
          `;
          prizesGrid.appendChild(block);

          const row = document.createElement('div');
          row.className = 'table-row';
          row.innerHTML = `
            <div class="row-name">
              <div class="row-rank-dot"></div>
              ${String(item.nombre || '').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
            </div>
            <div class="row-cell">${String(item.categoria || '').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
            <div class="row-cell amount">${money(monto)}</div>
            <div class="row-cell"><span class="status-pill">Asignado</span></div>
          `;
          tableRows.appendChild(row);
        });

        totalValue.textContent = money(total);

        prizesGrid.querySelectorAll('.prize-remove').forEach((btn) => {
          btn.addEventListener('click', function (e) {
            e.preventDefault();
            const parent = btn.closest('.prize-block');
            const id = parent ? parent.getAttribute('data-id') : null;
            if (!id) return;
            const next = loadItems().filter(x => String(x.id) !== String(id));
            saveItems(next);
            render();
          });
        });
      }

      function openModal() {
        const modal = document.getElementById('premioModal');
        if (!modal) return;
        modal.classList.add('open');
      }

      function closeModal() {
        const modal = document.getElementById('premioModal');
        if (!modal) return;
        modal.classList.remove('open');
      }

      function uid() {
        try {
          if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
        } catch (_) {}
        return 'p-' + String(Date.now()) + '-' + String(Math.floor(Math.random() * 100000));
      }

      document.addEventListener('DOMContentLoaded', function () {
        render();

        const btnOpen = document.getElementById('btnOpenPremioModal');
        const btnClose = document.getElementById('btnClosePremioModal');
        const btnCancel = document.getElementById('btnCancelPremio');
        const modal = document.getElementById('premioModal');
        const form = document.getElementById('premioForm');

        if (btnOpen) btnOpen.addEventListener('click', openModal);
        if (btnClose) btnClose.addEventListener('click', closeModal);
        if (btnCancel) btnCancel.addEventListener('click', closeModal);

        if (modal) {
          modal.addEventListener('click', function (e) {
            if (e.target === modal) closeModal();
          });
        }

        if (form) {
          form.addEventListener('submit', function (e) {
            e.preventDefault();

            const tipo = String(form.tipo.value || 'first');
            const monto = Number(form.monto.value || 0);
            const categoria = String(form.categoria.value || '').trim();
            const iniciales = String(form.iniciales.value || '').trim().toUpperCase();
            const nombre = String(form.nombre.value || '').trim();
            const descripcion = String(form.descripcion.value || '').trim();

            if (!categoria || !iniciales || !nombre || !descripcion) return;

            const items = loadItems();
            items.push({
              id: uid(),
              tipo: (tipo === 'second' ? 'second' : 'first'),
              nombre,
              iniciales,
              categoria,
              descripcion,
              monto: Number.isFinite(monto) ? monto : 0
            });
            saveItems(items);
            closeModal();
            form.reset();
            document.getElementById('premioTipo').value = 'first';
            document.getElementById('premioMonto').value = '0';
            document.getElementById('premioCategoria').value = 'Viáticos';
            document.getElementById('premioDesc').value = 'Premio en viáticos';
            render();
          });
        }
      });
    })();
  </script>
</body>
</html>
