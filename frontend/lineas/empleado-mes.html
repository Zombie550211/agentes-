<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Empleado del Mes - Team Líneas</title>
  <script>
    (function guard(){
      try{
        const user = JSON.parse(localStorage.getItem('user')||sessionStorage.getItem('user')||'{}');
        const role = String(user.role||'').toLowerCase();
        const username = String(user.username||'').toLowerCase();
        const team = String(user.team||'').toLowerCase();
        const ok = role==='teamlineas' || role==='lineas-agentes' || role==='supervisor team lineas' || (role==='supervisor' && team.includes('lineas')) || team.includes('lineas') || username.startsWith('lineas-');
        if(!ok){ window.location.replace('/login.html'); }
      }catch(e){ window.location.replace('/login.html'); }
    })();
  </script>
  <link rel="stylesheet" href="/css/theme.css?v=20251124f"/>
  <link rel="stylesheet" href="/css/sidebar-shared.css?v=20260529b" />
</head>

      <h1 style="margin:16px 0;">Empleado del Mes - Team Líneas</h1>
      <p>Página base para Team Líneas.</p>
    </main>
  </div>
  <script src="/js/fetch-interceptor.js"></script>

</body>
</html>
