<head>

  </script>

  <!-- Highcharts 3D -->
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; background: #000 !important; }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -1;
      background: linear-gradient(160deg,#0b1a33 0%,#0a1628 55%,#080f1f 100%);
  opacity: 0.55;
      pointer-events: none;
    }
    .layout { display: flex; min-height: 100vh; }
    .sidebar { flex: 0 0 auto; }
    .main-content { flex: 1; overflow-y: auto; }
    /* Sin tope de ancho: la página aprovecha todo el monitor (los grids internos
       son auto-adaptables, así que en pantallas chicas siguen apilándose bien). */
    .content-container { max-width: none; margin: 0 auto; padding: 20px 48px; }

    /* KPIs globales: una sola fila en monitores anchos; en pantallas menores
       las tarjetas van bajando solas (auto-fit). */
    .kpi-global-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    h1 { color: #f0f4ff; margin-top: 0; margin-bottom: 30px; font-size: 28px; text-shadow: 0 2px 8px rgba(0,0,0,0.5); }
    /* Team Section */
    .team-section { 
      margin-bottom: 40px; 
      background: rgba(10, 20, 60, 0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px; 
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }
    .team-title { 
      font-size: 20px; 
      font-weight: 700; 
      color: #f0f4ff; 
      margin: 0 0 20px 0;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }

    /* Team Content - Grid for Chart + KPI */
    .team-content { 
      display: grid; 
      grid-template-columns: 2fr 1fr; 
      gap: 20px;
      align-items: start;
    }

    /* Chart Container */
    .chart-container { 
      position: relative; 
      height: 500px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      padding: 16px;
    }
    .chart-container canvas { max-height: 470px; }

    /* KPI Card */
    .kpi-card {
      display: flex;
      flex-direction: column;
      gap: 0;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .kpi-item {
      display: flex;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      gap: 12px;
    }

    .kpi-item:last-child { border-bottom: none; }

    .kpi-icon {
      width: 4px;
      height: 40px;
      background: #818cf8;
      border-radius: 2px;
    }

    .kpi-content {
      flex: 1;
    }

    .kpi-label {
      font-size: 12px;
      color: rgba(255,255,255,0.60) !important;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 0;
    }

    .kpi-value {
      font-size: 24px;
      font-weight: 700;
      color: #818cf8;
      margin: 4px 0 0 0;
    }

    /* Loading State */
    .loading { text-align: center; color: rgba(255,255,255,0.55); padding: 20px; }
    .spinner { display: inline-block; border: 3px solid rgba(255,255,255,0.15); border-top: 3px solid #818cf8; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Efecto 3D para KPIs globales */
    .kpi-global-card {
      position: relative;
      overflow: visible;
      transform-style: preserve-3d;
      transform: perspective(1000px) rotateX(5deg) rotateY(-2deg);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 
        0 10px 30px rgba(0, 0, 0, 0.35),
        0 5px 15px rgba(0, 0, 0, 0.2);
    }
    
    .kpi-global-card::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 10%;
      width: 80%;
      height: 20px;
      background: radial-gradient(ellipse, rgba(0, 0, 0, 0.3) 0%, transparent 70%);
      filter: blur(10px);
      z-index: -1;
    }
    
    .kpi-global-card:hover {
      transform: perspective(1000px) rotateX(0deg) rotateY(0deg) translateY(-10px) scale(1.02);
      box-shadow: 
        0 25px 50px rgba(0, 0, 0, 0.45),
        0 15px 30px rgba(0, 0, 0, 0.3);
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .team-content { grid-template-columns: 1fr; }
      .chart-container { height: 400px; }
    }
    @media (max-width: 1280px) {
      .content-container > div:first-of-type { grid-template-columns: repeat(2, 1fr) !important; }
    }

    /* ===== Rendimiento por Agente: encabezado + toggle de vista ===== */
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 8px 0 20px 0;
      flex-wrap: wrap;
    }
    .section-title { font-size: 22px; font-weight: 700; color: #f0f4ff; margin: 0; }
    .section-sub { font-size: 13px; color: rgba(255,255,255,0.55); margin: 4px 0 0 0; }
    .view-toggle {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 6px 10px; border-radius: 12px;
    }
    .vt-caption { font-size: 12px; color: rgba(255,255,255,0.55); margin-right: 4px; }
    .vt-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; color: rgba(255,255,255,0.7);
      border: none; padding: 8px 14px; border-radius: 8px;
      cursor: pointer; font-weight: 600; font-size: 13px; transition: all 0.2s;
    }
    .vt-btn.active { background: #6366f1; color: #fff; box-shadow: 0 4px 12px rgba(99,102,241,0.4); }
    .vt-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ===== Grid de 3 tarjetas de team ===== */
    .teams-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      align-items: stretch;
    }
    .team-card {
      display: flex; flex-direction: column;
      background: rgba(10, 20, 60, 0.55);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px; padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }
    .team-card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .team-card-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(129,140,248,0.18); color: #818cf8; font-size: 18px;
    }
    .team-card-title { font-size: 18px; font-weight: 700; color: #f0f4ff; margin: 0; }

    /* Franja de stats del team */
    .team-stat-strip {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 4px; margin-bottom: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px; padding: 12px 8px;
    }
    .tstat { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 4px; }
    .tstat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; color: rgba(255,255,255,0.55); }
    .tstat-val { font-size: 22px; font-weight: 700; color: #f0f4ff; }
    .tstat-green { color: #22c55e; }
    .tstat-red { color: #f87171; }

    /* Franja de tipos de servicio del team (LÍNEA + EQUIPO / ESIM / WEARABLE) */
    .team-svc-strip {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 4px; margin: -10px 0 18px 0;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px; padding: 12px 8px;
    }
    .tstat-indigo { color: #818cf8; }
    .tstat-cyan   { color: #22d3ee; }
    .tstat-amber  { color: #fbbf24; }

    /* Gráfica del team */
    .team-chart-wrap { position: relative; height: 460px; }
    .team-chart { width: 100%; height: 100%; }
    /* Spinner / mensaje de "sin datos" como overlay centrado (no empuja la gráfica) */
    .team-chart-wrap .loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 0; margin: 0;
    }

    /* Botón Ver Detalle Completo */
    .btn-detalle {
      display: block; text-align: center; margin-top: 16px;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      color: #fff; text-decoration: none; font-weight: 700; font-size: 14px;
      padding: 12px 16px; border-radius: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-detalle:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(99,102,241,0.45); }

    @media (max-width: 1100px) {
      .teams-grid { grid-template-columns: 1fr; }
    }
    /* Monitores anchos: gráficas más altas y con más aire */
    @media (min-width: 2200px) {
      .teams-grid { gap: 28px; }
      .team-chart-wrap { height: 600px; }
      .tstat-val { font-size: 26px; }
    }
  </style>

  <script>
    // Variables para instancias de Highcharts
    let chartJonathanInstance = null;
    let chartLuisInstance = null;
    
    // Estado global del mes seleccionado
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth() + 1; // 1-12
    let sumarColchonActivo = false;

    // ===== Configuración de Teams de Líneas =====
    // Añadir un team nuevo = agregar un objeto aquí. La tarjeta, KPIs y gráfica
    // se generan automáticamente a partir de este array.
    // Teams de Líneas: se cargan desde la página de permisos (/api/lineas/teams).
    // NADA hardcodeado — la lista de teams y sus agentes sale de la tabla `users`.
    let TEAMS = [];

    // Normaliza nombre de agente (igual criterio que la gráfica) para cruzar roster ↔ leads.
    function normalizeAgentName(name) {
      return String(name || '').trim().replace(/_/g, ' ').replace(/\s+/g, ' ').toUpperCase();
    }

    // ¿el lead pertenece a este team? Por el token del supervisor CONGELADO en el lead
    // (no por el team actual del agente) — así las ventas cuentan donde se hicieron.
    function leadMatchesTeam(lead, team) {
      return !!team.teamWord && String((lead && lead.supervisor) || '').toUpperCase().includes(team.teamWord);
    }

    // ¿el "agente" es en realidad un supervisor de Líneas? (para no pintarlo como barra)
    // Se deriva de los supervisores que vienen de permisos, no de nombres fijos.
    function isSupervisorName(agente) {
      const a = normalizeAgentName(agente);
      return !!a && TEAMS.some(t => t.supervisor && t.supervisor === a);
    }

    // Construye TEAMS (y el roster de cada uno) desde permisos. El roster sirve para
    // mostrar TODOS los agentes del team aunque tengan 0 ventas en el mes.
    let __teamsLoaded = false;
    async function buildTeams() {
      if (__teamsLoaded && TEAMS.length) return;
      try {
        const res = await fetch('/api/lineas/teams', { credentials: 'include' });
        const data = res.ok ? await res.json() : null;
        const list = (data && data.teams) || [];
        TEAMS = list.map(t => {
          const token = String(t.token || '').toUpperCase();
          const slug = (token.toLowerCase() || 'team').replace(/[^a-z0-9]+/g, '-');
          return {
            teamWord: token, key: token, slug,
            title: t.label || ('Team ' + token),
            chartId: `chart-${slug}`, kpiPrefix: `kpi-${slug}-`, loadingId: `loading-${slug}`,
            roster: (t.agents || []).map(a => normalizeAgentName(a.name)).filter(Boolean),
            supervisor: normalizeAgentName((t.supervisor && t.supervisor.name) || ''),
          };
        });
        __teamsLoaded = true;

    function getMonthName(month) {

      const endDate = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(daysInMonth).padStart(2, '0')}`;

    function getLineCount(lead) {
      try {
        const fromField = Number(lead?.cantidad_lineas || 0) || 0;
        const fromLines = Array.isArray(lead?.lines) ? lead.lines.length : (Array.isArray(lead?.lineas) ? lead.lineas.length : 0);
        const fromPhones = Array.isArray(lead?.telefonos) ? lead.telefonos.length : 0;
        const base = Math.max(fromField, fromLines, fromPhones, 1);
        if (sumarColchonActivo && lead?.colchon_lineas) {
          return base + Number(lead.colchon_lineas);
        }
        return base;
      } catch (_) {
        return 1;
      }
    }

    function filterLeadsByMonth(leads) {
      const hasRange = !!(__rangeFrom && __rangeTo);
      const startDate = hasRange ? __rangeFrom : `${currentYear}-${String(currentMonth).padStart(2, '0')}-01`;
      const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
      const endDate = hasRange ? __rangeTo : `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(daysInMonth).padStart(2, '0')}`;
      
      
      let sinFecha = 0;
      let fueraRango = 0;
      let dentroRango = 0;
      
      const filtered = leads.filter(lead => {
        const diaVenta = lead.dia_venta || lead.fecha_venta || '';
        
        // Si no tiene dia_venta, excluir
        if (!diaVenta) {
          sinFecha++;
          return false;
        }
        
        // Filtrar SOLO por dia_venta dentro del mes (sin colchón)
        const ventaMesActual = diaVenta >= startDate && diaVenta <= endDate;
        
        if (ventaMesActual) {
          dentroRango++;
          return true;
        } else {
          fueraRango++;
          return false;
        }
      });
      

      return filtered;
    }

    function __dedupeLeads(leads) {
      try {
        const byId = new Map();
        let dup = 0;
        (Array.isArray(leads) ? leads : []).forEach(l => {
          const key = String(l?._id || l?.id || l?.ID || l?.id_cliente || l?.idCliente || l?._raw?._id || '').trim();
          if (!key) {
            // Si no hay ID, mantener el registro (no se puede deduplicar)
            byId.set(Symbol('noid'), l);
            return;
          }
          if (byId.has(key)) {
            dup++;
            return;
          }
          byId.set(key, l);
        });
        const out = Array.from(byId.values());
        if (dup > 0) console.warn('[__dedupeLeads] Duplicados detectados y removidos:', dup, '=>', out.length);
        return out;
      } catch (_) {
        return Array.isArray(leads) ? leads : [];
      }
    }

    async function loadEstadisticas() {
      try {
        let allLeads = [];
        
        // Obtener datos reales de la API de Team Líneas (todos los datos o mes seleccionado)
        try {
          const endpoint = `/api/leads-lineas?allData=true&month=${currentYear}-${String(currentMonth).padStart(2, '0')}`;
          const response = await fetch(endpoint);
          if (response.ok) {
            const result = await response.json();
            allLeads = Array.isArray(result.data) ? result.data : (result.leads || []);
          } else {
            console.warn('[loadEstadisticas] Error en respuesta:', response.status);
            allLeads = [];  // sin datos falsos: si la API falla, no se muestra nada inventado
          }
        } catch (err) {
          console.warn('[loadEstadisticas] No se pudieron obtener datos reales, usando mock:', err.message);
          allLeads = [];  // sin datos falsos: si la API falla, no se muestra nada inventado
        }

        // Si aun así no hay datos, usar mock
        if (!allLeads || allLeads.length === 0) {
          allLeads = [];  // sin datos falsos: si la API falla, no se muestra nada inventado
        }

        // Filtrar por mes/rango seleccionado y deduplicar
        const leads = __dedupeLeads(filterLeadsByMonth(allLeads));

        // Roster de agentes por team (página de permisos) para mostrarlos todos
        await buildTeams();

        // Si viene ?team=... en la URL, limitar la pantalla a ese team (por token)
        const __teamParamU = String(__rangeTeam || '').toUpperCase();

        // Procesar y renderizar cada team (dinámico desde permisos)
        const teamLeadsAll = [];
        TEAMS.forEach(t => {
          let teamLeads = __dedupeLeads(leads.filter(l => leadMatchesTeam(l, t)));
          if (__teamParamU && !__teamParamU.includes(t.teamWord)) teamLeads = [];

          if (teamLeads.length > 0 || (t.roster && t.roster.length > 0)) {
            renderTeamData(t.title, teamLeads, t.chartId, t.kpiPrefix, t.loadingId, t.roster);
            teamLeadsAll.push(...teamLeads);
          } else {
            resetTeamCard(t);
          }
        });

        // KPIs globales = suma de todos los teams (sin duplicados)
        updateGlobalKPIs(__dedupeLeads(teamLeadsAll));

      } catch (error) {
        console.error('[loadEstadisticas] Error fatal:', error);
      }
    }

    function __lineasStatNormalizeStatus(v) {
      const s = String(v || '').trim();
      if (!s) return '';
      return s.toUpperCase();
    }

    function __isActiveLikeStatus(stUpper) {
      const s = String(stUpper || '').toUpperCase();
      return (
        s === 'ACTIVE' ||
        s === 'ACTIVA' ||
        s.includes('ACTIV') ||
        s === 'COMPLETED' ||
        s.includes('COMPLET') ||
        s.includes('FINALIZ')
      );
    }

    function __isPendingLikeStatus(stUpper) {
      const s = String(stUpper || '').toUpperCase();
      return s === 'PENDING' || s === 'PENDIENTE';
    }

    function __isCancelledLikeStatus(stUpper) {
      const s = String(stUpper || '').toUpperCase();
      return s === 'CANCELLED' || s === 'CANCELADA' || s === 'CANCELADO';
    }

    function __getLineCount(lead) {
      // Preferir cantidad_lineas del campo principal
      const fromField = Number(lead?.cantidad_lineas || 0);
      if (fromField > 0) return fromField;
      
      // Si no hay cantidad_lineas, intentar contar desde lines_data
      const fromLinesData = Array.isArray(lead?.lines_data) ? lead.lines_data.length : 0;
      if (fromLinesData > 0) return fromLinesData;
      
      // Fallback: contar desde lineas_status (JSON keys)
      const fromStatusMap = lead?.lineas_status && typeof lead.lineas_status === 'object' ? Object.keys(lead.lineas_status).length : 0;
      if (fromStatusMap > 0) return fromStatusMap;
      
      // Último recurso: retornar 1 por defecto
      return 1;
    }

    // ── Tipos de servicio por línea (LÍNEA + EQUIPO / ESIM CARD / WEARABLE) ──
    // Acepta también los nombres antiguos (WIRELESS, SIM WIRELES, TABLETS, RELOJ)
    // por si queda algún dato sin migrar.
    function __svcTipo(v) {
      const s = String(v || '').toUpperCase();
      if (!s) return '';
      if (s.includes('EQUIPO') || s.includes('WIRELESS')) return 'equipo';
      if (s.includes('ESIM') || s.includes('SIM WIRELES')) return 'esim';
      if (s.includes('WEARABLE') || s.includes('TABLET') || s.includes('RELOJ')) return 'wearable';
      return '';
    }

    // Servicio de cada línea del lead: preferir lines_data (por línea); fallback servicios[].
    function __getLineServices(lead) {
      try {
        let ld = lead?.lines_data;
        if (ld && typeof ld === 'object' && !Array.isArray(ld)) ld = Object.values(ld);
        if (Array.isArray(ld) && ld.length) {
          const vals = ld.map(x => (x && typeof x === 'object') ? (x.servicio || x.svc || '') : '');
          if (vals.some(Boolean)) return vals;
        }
        const sv = lead?.servicios;
        if (Array.isArray(sv) && sv.length) return sv;
      } catch (_) {}
      return [];
    }

    // Suma las líneas de `leads` por tipo de servicio → {equipo, esim, wearable}.
    function __countServiceTypes(leads) {
      const acc = { equipo: 0, esim: 0, wearable: 0 };
      (leads || []).forEach(lead => {
        __getLineServices(lead).forEach(v => {
          const t = __svcTipo(v);
          if (t) acc[t]++;
        });
      });
      return acc;
    }

    function __getLineStatus(lead, idx) {
      // Regla: si es 1 sola línea, el status del lead manda
      try {
        const lineCount = __getLineCount(lead);
        if (lineCount === 1) {
          const global = lead?.status ?? lead?.STATUS ?? lead?.estado;
          const norm = __lineasStatNormalizeStatus(global);
          if (norm) return norm;
        }
      } catch (_) {}

      // Multi-línea: preferir lineas_status (suele ser la fuente más confiable en TEAM_LINEAS)
      try {
        const ls = lead?.lineas_status || lead?.lineasStatus || lead?.lineasStatusMap || null;
        if (ls && Object.prototype.hasOwnProperty.call(ls, idx)) {
          return __lineasStatNormalizeStatus(ls[idx]);
        }
      } catch (_) {}

      try {
        const rawLs = lead?._raw?.lineas_status || lead?._raw?.lineasStatus || lead?._raw?.lineasStatusMap || null;
        if (rawLs && Object.prototype.hasOwnProperty.call(rawLs, idx)) {
          return __lineasStatNormalizeStatus(rawLs[idx]);
        }
      } catch (_) {}

      // Fallback: lead.lines[idx].status/estado
      try {
        const lines = Array.isArray(lead?.lines) ? lead.lines : (Array.isArray(lead?.lineas) ? lead.lineas : null);
        const row = lines && lines[idx] ? lines[idx] : null;
        if (row && (row.estado || row.status)) {
          return __lineasStatNormalizeStatus(row.estado || row.status);
        }
      } catch (_) {}

      try {
        const global = lead?.status ?? lead?.STATUS ?? lead?.estado;
        const norm = __lineasStatNormalizeStatus(global);
        if (norm) return norm;
      } catch (_) {}

      return 'PENDING';
    }

    function updateGlobalKPIs(allLeads) {

      let totalVentas = allLeads.length;
      let totalLineasActivas = 0;
      let totalLineasPendientes = 0;
      let totalLineasCanceladas = 0;
      let totalVentasPendientes = 0; // Leads con status pending
      let totalVentasLineas = 0; // Total de líneas sin importar status

      allLeads.forEach(lead => {
        const cantidadLineas = __getLineCount(lead);
        const statusGlobal = (lead.status || '').toLowerCase();

        totalVentasLineas += cantidadLineas;

        // Sumar colchón si está activo
        if (sumarColchonActivo) {
          totalVentas += (lead.colchon_ventas || 0);
          totalVentasLineas += (lead.colchon_lineas || 0);
        }

        // Contar ventas pendientes (leads con status pending)
        if (statusGlobal.includes('pending')) {
          totalVentasPendientes++;
        }

        for (let i = 0; i < cantidadLineas; i++) {
          const lineStatus = __getLineStatus(lead, i);
          if (__isActiveLikeStatus(lineStatus)) totalLineasActivas++;
          else if (__isPendingLikeStatus(lineStatus)) totalLineasPendientes++;
          else if (__isCancelledLikeStatus(lineStatus)) totalLineasCanceladas++;
        }
      });
      
      // Actualizar KPIs globales en el DOM
      document.getElementById('kpi-global-ventas').textContent = totalVentas;
      document.getElementById('kpi-global-activas').textContent = totalLineasActivas;
      document.getElementById('kpi-global-lineas-pendientes').textContent = totalLineasPendientes;
      document.getElementById('kpi-global-lineas-canceladas').textContent = totalLineasCanceladas;
      document.getElementById('kpi-global-ventas-lineas').textContent = totalVentasLineas;

      // KPIs globales por tipo de servicio
      const svcGlobal = __countServiceTypes(allLeads);
      const gEquipo = document.getElementById('kpi-global-svc-equipo');
      const gEsim = document.getElementById('kpi-global-svc-esim');
      const gWear = document.getElementById('kpi-global-svc-wearable');
      if (gEquipo) gEquipo.textContent = svcGlobal.equipo;
      if (gEsim) gEsim.textContent = svcGlobal.esim;
      if (gWear) gWear.textContent = svcGlobal.wearable;
      
    }

          style: {
            fontSize: '18px',
            fontWeight: 'bold',
            color: '#f0f4ff'
          }
        },
        xAxis: {
          categories: agentes,
          labels: {
            skew3d: false,
            style: {
              fontSize: '11px',
              fontWeight: '600',
              color: '#e2e8f0'
            },
            rotation: -45
          },
          lineColor: 'rgba(255,255,255,0.2)',
          tickColor: 'rgba(255,255,255,0.2)'
        },
        yAxis: {
          title: { text: null },
          labels: { enabled: false },
          gridLineWidth: 0
        },
        tooltip: {
          backgroundColor: 'rgba(10,20,60,0.90)',
          borderColor: 'rgba(255,255,255,0.15)',
          borderRadius: 8,
          style: { color: '#f0f4ff', fontSize: '13px' },
          headerFormat: '<b style="color:#a78bfa">{point.key}</b><br>',
          pointFormat: '<span style="color:#94a3b8">{series.name}:</span> <b style="color:#f0f4ff">{point.y}</b>'
        },
        plotOptions: {
          column: {
            // Cada serie con su propio `stack`: Ventas y Líneas quedan como columnas
            // sueltas (igual que antes) y los 3 tipos de servicio se apilan en una
            // tercera columna cuya altura total ≈ Líneas del agente.
            stacking: 'normal',
            depth: 70,
            dataLabels: {
              enabled: true,
              format: '{point.y}',
              style: {
                color: '#ffffff',
                fontSize: '14px',
                fontWeight: 'bold',
                textOutline: '2px rgba(0,0,0,0.6)'
              }
            },
            groupZPadding: 10,
            borderWidth: 0
          }
        },
        legend: {
          align: 'center',
          verticalAlign: 'top',
          layout: 'horizontal',
          itemStyle: {
            fontSize: '14px',
            fontWeight: 'bold',
            color: '#e2e8f0'
          },
          itemHoverStyle: { color: '#ffffff' }
        },
        series: [
          {
            name: 'Ventas',
            data: ventasData,
            stack: 'ventas',
            color: {
              linearGradient: { x1: 0, x2: 0, y1: 0, y2: 1 },
              stops: [
                [0, '#818cf8'],
                [0.5, '#6366f1'],
                [1, '#4f46e5']
              ]
            }
          },
          {
            name: 'Líneas',
            data: lineasData,
            stack: 'lineas',
            color: {
              linearGradient: { x1: 0, x2: 0, y1: 0, y2: 1 },
              stops: [
                [0, '#34d399'],
                [0.5, '#10b981'],
                [1, '#059669']
              ]
            }
          },
          // Columna apilada de tipos de servicio (por agente). Sin etiquetas por
          // segmento para no saturar: los valores se ven en el tooltip.
          {
            name: 'Línea + Equipo',
            data: equipoData,
            stack: 'servicios',
            color: '#8b5cf6',
            dataLabels: { enabled: false }
          },
          {
            name: 'eSIM',
            data: esimData,
            stack: 'servicios',
            color: '#22d3ee',
            dataLabels: { enabled: false }
          },
          {
            name: 'Wearable',
            data: wearableData,
            stack: 'servicios',
            color: '#fbbf24',
            dataLabels: { enabled: false }
          }
        ]
      });
    }

    document.addEventListener('DOMContentLoaded', async function(){
      if (window.loadSidebar) window.loadSidebar();

      // Cargar teams desde permisos y construir las tarjetas antes de los datos
      await buildTeams();
      renderTeamCards();

      // Configurar navegación mensual
      updateMonthDisplay();
      
      document.getElementById('btn-prev-month').addEventListener('click', goToPreviousMonth);
      document.getElementById('btn-next-month').addEventListener('click', goToNextMonth);
      document.getElementById('btn-current-month').addEventListener('click', goToCurrentMonth);
      document.getElementById('btn-sumar-colchon').addEventListener('click', toggleSumarColchon);
      
      // Cargar estadísticas del mes actual
      loadEstadisticas();
      // Tiempo real: recarga al cambiar datos de líneas (los charts hacen destroy/re-render).
      if (window.CRMRealtime) CRMRealtime.connect('lineas', loadEstadisticas);
    });
  </script>
</body>
</html>
