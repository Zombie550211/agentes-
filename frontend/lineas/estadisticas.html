<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Estadísticas - Team Líneas</title>
  <script>
    // Sin restricción - acceso permitido para todos
  </script>
  <link rel="stylesheet" href="/css/theme.css?v=20251124f"/>
  <link rel="stylesheet" href="/css/sidebar-shared.css?v=20260529b" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <!-- Highcharts 3D -->
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; background: #000 !important; }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -1;
      background: url('/images/ESTADIOOO.jpeg') center center / cover no-repeat;
  opacity: 0.55;
      pointer-events: none;
    }
    .layout { display: flex; min-height: 100vh; }
    .sidebar { flex: 0 0 auto; }
    .main-content { flex: 1; overflow-y: auto; }
    .content-container { max-width: 1840px; margin: 0 auto; padding: 20px 36px; }
    h1 { color: #f0f4ff; margin-top: 0; margin-bottom: 30px; font-size: 28px; text-shadow: 0 2px 8px rgba(0,0,0,0.5); }

    /* Team Section */
    .team-section { 
      margin-bottom: 40px; 
      background: rgba(10, 20, 60, 0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px; 
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }
    .team-title { 
      font-size: 20px; 
      font-weight: 700; 
      color: #f0f4ff; 
      margin: 0 0 20px 0;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }

    /* Team Content - Grid for Chart + KPI */
    .team-content { 
      display: grid; 
      grid-template-columns: 2fr 1fr; 
      gap: 20px;
      align-items: start;
    }

    /* Chart Container */
    .chart-container { 
      position: relative; 
      height: 500px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      padding: 16px;
    }
    .chart-container canvas { max-height: 470px; }

    /* KPI Card */
    .kpi-card {
      display: flex;
      flex-direction: column;
      gap: 0;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .kpi-item {
      display: flex;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      gap: 12px;
    }

    .kpi-item:last-child { border-bottom: none; }

    .kpi-icon {
      width: 4px;
      height: 40px;
      background: #818cf8;
      border-radius: 2px;
    }

    .kpi-content {
      flex: 1;
    }

    .kpi-label {
      font-size: 12px;
      color: rgba(255,255,255,0.60) !important;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 0;
    }

    .kpi-value {
      font-size: 24px;
      font-weight: 700;
      color: #818cf8;
      margin: 4px 0 0 0;
    }

    /* Loading State */
    .loading { text-align: center; color: rgba(255,255,255,0.55); padding: 20px; }
    .spinner { display: inline-block; border: 3px solid rgba(255,255,255,0.15); border-top: 3px solid #818cf8; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Efecto 3D para KPIs globales */
    .kpi-global-card {
      position: relative;
      overflow: visible;
      transform-style: preserve-3d;
      transform: perspective(1000px) rotateX(5deg) rotateY(-2deg);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 
        0 10px 30px rgba(0, 0, 0, 0.35),
        0 5px 15px rgba(0, 0, 0, 0.2);
    }
    
    .kpi-global-card::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 10%;
      width: 80%;
      height: 20px;
      background: radial-gradient(ellipse, rgba(0, 0, 0, 0.3) 0%, transparent 70%);
      filter: blur(10px);
      z-index: -1;
    }
    
    .kpi-global-card:hover {
      transform: perspective(1000px) rotateX(0deg) rotateY(0deg) translateY(-10px) scale(1.02);
      box-shadow: 
        0 25px 50px rgba(0, 0, 0, 0.45),
        0 15px 30px rgba(0, 0, 0, 0.3);
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .team-content { grid-template-columns: 1fr; }
      .chart-container { height: 400px; }
    }
    @media (max-width: 1280px) {
      .content-container > div:first-of-type { grid-template-columns: repeat(2, 1fr) !important; }
    }

    /* ===== Rendimiento por Agente: encabezado + toggle de vista ===== */
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 8px 0 20px 0;
      flex-wrap: wrap;
    }
    .section-title { font-size: 22px; font-weight: 700; color: #f0f4ff; margin: 0; }
    .section-sub { font-size: 13px; color: rgba(255,255,255,0.55); margin: 4px 0 0 0; }
    .view-toggle {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 6px 10px; border-radius: 12px;
    }
    .vt-caption { font-size: 12px; color: rgba(255,255,255,0.55); margin-right: 4px; }
    .vt-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; color: rgba(255,255,255,0.7);
      border: none; padding: 8px 14px; border-radius: 8px;
      cursor: pointer; font-weight: 600; font-size: 13px; transition: all 0.2s;
    }
    .vt-btn.active { background: #6366f1; color: #fff; box-shadow: 0 4px 12px rgba(99,102,241,0.4); }
    .vt-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ===== Grid de 3 tarjetas de team ===== */
    .teams-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      align-items: stretch;
    }
    .team-card {
      display: flex; flex-direction: column;
      background: rgba(10, 20, 60, 0.55);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px; padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }
    .team-card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .team-card-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(129,140,248,0.18); color: #818cf8; font-size: 18px;
    }
    .team-card-title { font-size: 18px; font-weight: 700; color: #f0f4ff; margin: 0; }

    /* Franja de stats del team */
    .team-stat-strip {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 4px; margin-bottom: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px; padding: 12px 8px;
    }
    .tstat { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 4px; }
    .tstat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; color: rgba(255,255,255,0.55); }
    .tstat-val { font-size: 22px; font-weight: 700; color: #f0f4ff; }
    .tstat-green { color: #22c55e; }
    .tstat-red { color: #f87171; }

    /* Gráfica del team */
    .team-chart-wrap { position: relative; height: 460px; }
    .team-chart { width: 100%; height: 100%; }
    /* Spinner / mensaje de "sin datos" como overlay centrado (no empuja la gráfica) */
    .team-chart-wrap .loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 0; margin: 0;
    }

    /* Botón Ver Detalle Completo */
    .btn-detalle {
      display: block; text-align: center; margin-top: 16px;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      color: #fff; text-decoration: none; font-weight: 700; font-size: 14px;
      padding: 12px 16px; border-radius: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-detalle:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(99,102,241,0.45); }

    @media (max-width: 1100px) {
      .teams-grid { grid-template-columns: 1fr; }
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.2.0/highcharts.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.2.0/highcharts-3d.min.js"></script>
  <script>if(typeof Highcharts!=='undefined'){Highcharts.setOptions({accessibility:{enabled:false}});}</script>
  <script src="/js/fetch-interceptor.js"></script>

  <script>
    // Variables para instancias de Highcharts
    let chartJonathanInstance = null;
    let chartLuisInstance = null;
    
    // Estado global del mes seleccionado
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth() + 1; // 1-12
    let sumarColchonActivo = false;

    // ===== Configuración de Teams de Líneas =====
    // Añadir un team nuevo = agregar un objeto aquí. La tarjeta, KPIs y gráfica
    // se generan automáticamente a partir de este array.
    const TEAMS = [
      { key: 'JONATHAN F', slug: 'jonathan', title: 'Team Jonathan F',     teamWord: 'JONATHAN' },
      { key: 'LUIS G',     slug: 'luis',     title: 'Team Luis G',         teamWord: 'LUIS' },
      { key: 'VICTOR H',   slug: 'victor',   title: 'Team Líneas Victor',  teamWord: 'VICTOR' },
    ];
    TEAMS.forEach(t => {
      t.chartId   = `chart-${t.slug}`;
      t.kpiPrefix = `kpi-${t.slug}-`;
      t.loadingId = `loading-${t.slug}`;
      t.roster    = []; // agentes del team según la página de permisos (tabla users)
    });

    // Normaliza el campo supervisor a la clave canónica del team.
    function normalizeSupervisor(sup) {
      const s = String(sup || '').trim().toUpperCase();
      if (s.includes('JONATHAN')) return 'JONATHAN F';
      if (s.includes('LUIS'))     return 'LUIS G';
      if (s.includes('VICTOR'))   return 'VICTOR H';
      return s;
    }

    // Normaliza nombre de agente (igual criterio que la gráfica) para cruzar roster ↔ leads.
    function normalizeAgentName(name) {
      return String(name || '').trim().replace(/_/g, ' ').replace(/\s+/g, ' ').toUpperCase();
    }

    // Trae el roster de agentes por team desde la página de permisos (/api/users/agents),
    // agrupando por la columna `team` (TEAM LINEAS JONATHAN/LUIS/VICTOR), excluyendo
    // supervisores y cuentas sin nombre. Así la gráfica muestra TODOS los agentes,
    // aunque tengan 0 ventas en el mes.
    let __rostersLoaded = false;
    async function loadRosters() {
      if (__rostersLoaded) return;
      try {
        const res = await fetch('/api/users/agents');
        if (!res.ok) return;
        const data = await res.json();
        const agents = Array.isArray(data.agents) ? data.agents : [];
        TEAMS.forEach(t => { t.roster = []; });
        agents.forEach(u => {
          const role = String(u.role || '').toLowerCase();
          if (role.includes('supervisor')) return;           // el supervisor no es barra de agente
          const username = String(u.username || '');
          if (/^lineas[\s-]/i.test(username)) return;        // saltar cuentas legacy duplicadas (Lineas-Edward, ...)
          const display = normalizeAgentName(u.name || '');
          if (!display) return;
          const team = String(u.team || '').toUpperCase();
          const t = TEAMS.find(tt => team.includes(tt.teamWord));
          if (t && !t.roster.includes(display)) t.roster.push(display);
        });
        __rostersLoaded = true;
      } catch (_) { /* sin roster: la gráfica usa solo agentes con ventas */ }
    }

    // Construye el esqueleto de cada tarjeta de team dentro de #teams-grid.
    function renderTeamCards() {
      const grid = document.getElementById('teams-grid');
      if (!grid) return;
      grid.innerHTML = TEAMS.map(t => `
        <div class="team-card">
          <div class="team-card-head">
            <div class="team-card-icon"><i class="fas fa-user-tie"></i></div>
            <h3 class="team-card-title" id="team-title-${t.slug}">${t.title}</h3>
          </div>
          <div class="team-stat-strip">
            <div class="tstat"><span class="tstat-label">Clientes</span><span class="tstat-val" id="${t.kpiPrefix}ventas">-</span></div>
            <div class="tstat"><span class="tstat-label">Líneas</span><span class="tstat-val" id="${t.kpiPrefix}ventas-lineas">-</span></div>
            <div class="tstat"><span class="tstat-label">Activas</span><span class="tstat-val tstat-green" id="${t.kpiPrefix}activas">-</span></div>
            <div class="tstat"><span class="tstat-label">Pendientes</span><span class="tstat-val" id="${t.kpiPrefix}lineas-pendientes">-</span></div>
            <div class="tstat"><span class="tstat-label">Canceladas</span><span class="tstat-val tstat-red" id="${t.kpiPrefix}lineas-canceladas">-</span></div>
          </div>
          <div class="team-chart-wrap">
            <div class="loading" id="${t.loadingId}"><div class="spinner"></div></div>
            <div id="${t.chartId}" class="team-chart"></div>
          </div>
          <a class="btn-detalle" href="/lineas/costumer.html?team=${encodeURIComponent(t.key)}">Ver Detalle Completo</a>
        </div>
      `).join('');
    }

    // Pone una tarjeta de team en estado vacío (sin datos en el mes).
    function resetTeamCard(t) {
      const loadingEl = document.getElementById(t.loadingId);
      if (loadingEl) {
        loadingEl.innerHTML = '<p style="color: rgba(255,255,255,0.5); font-size: 14px;">No hay datos para este mes</p>';
        loadingEl.style.display = 'block';
      }
      if (window[t.chartId + 'Instance']) {
        try { window[t.chartId + 'Instance'].destroy(); } catch (_) {}
        window[t.chartId + 'Instance'] = null;
      }
      ['ventas', 'ventas-lineas', 'activas', 'lineas-pendientes', 'lineas-canceladas'].forEach(suffix => {
        const el = document.getElementById(t.kpiPrefix + suffix);
        if (el) el.textContent = '0';
      });
    }

    // Funciones de utilidad para manejo de fechas
    const __urlParams = (() => {
      try { return new URLSearchParams(window.location.search || ''); } catch (_) { return new URLSearchParams(); }
    })();
    const __rangeFrom = String(__urlParams.get('from') || '').trim();
    const __rangeTo = String(__urlParams.get('to') || '').trim();
    const __rangeTeam = String(__urlParams.get('team') || '').trim();

    function getMonthName(month) {
      const months = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 
                      'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
      return months[month - 1];
    }

    function updateMonthDisplay() {
      const monthName = getMonthName(currentMonth);
      document.getElementById('current-month-display').textContent = `${monthName} ${currentYear}`;

    function __dedupeLeads(leads) {
      try {
        const byId = new Map();
        let dup = 0;
        (Array.isArray(leads) ? leads : []).forEach(l => {
          const key = String(l?._id || l?.id || l?.ID || l?.id_cliente || l?.idCliente || l?._raw?._id || '').trim();
          if (!key) {
            // Si no hay ID, mantener el registro (no se puede deduplicar)
            byId.set(Symbol('noid'), l);
            return;
          }
          if (byId.has(key)) {
            dup++;
            return;
          }
          byId.set(key, l);
        });
        const out = Array.from(byId.values());
        if (dup > 0) console.warn('[__dedupeLeads] Duplicados detectados y removidos:', dup, '=>', out.length);
        return out;
      } catch (_) {
        return Array.isArray(leads) ? leads : [];
      }
    }

    function __lineasStatNormalizeStatus(v) {
      const s = String(v || '').trim();
      if (!s) return '';
      return s.toUpperCase();
    }

    function __isActiveLikeStatus(stUpper) {
      const s = String(stUpper || '').toUpperCase();
      return (
        s === 'ACTIVE' ||
        s === 'ACTIVA' ||
        s.includes('ACTIV') ||
        s === 'COMPLETED' ||
        s.includes('COMPLET') ||
        s.includes('FINALIZ')
      );
    }

    function __isPendingLikeStatus(stUpper) {
      const s = String(stUpper || '').toUpperCase();
      return s === 'PENDING' || s === 'PENDIENTE';
    }

    function __isCancelledLikeStatus(stUpper) {
      const s = String(stUpper || '').toUpperCase();
      return s === 'CANCELLED' || s === 'CANCELADA' || s === 'CANCELADO';
    }

    function __getLineCount(lead) {
      // Preferir cantidad_lineas del campo principal
      const fromField = Number(lead?.cantidad_lineas || 0);
      if (fromField > 0) return fromField;
      
      // Si no hay cantidad_lineas, intentar contar desde lines_data
      const fromLinesData = Array.isArray(lead?.lines_data) ? lead.lines_data.length : 0;
      if (fromLinesData > 0) return fromLinesData;
      
      // Fallback: contar desde lineas_status (JSON keys)
      const fromStatusMap = lead?.lineas_status && typeof lead.lineas_status === 'object' ? Object.keys(lead.lineas_status).length : 0;
      if (fromStatusMap > 0) return fromStatusMap;
      
      // Último recurso: retornar 1 por defecto
      return 1;
    }

    function __getLineStatus(lead, idx) {
      // Regla: si es 1 sola línea, el status del lead manda
      try {
        const lineCount = __getLineCount(lead);
        if (lineCount === 1) {
          const global = lead?.status ?? lead?.STATUS ?? lead?.estado;
          const norm = __lineasStatNormalizeStatus(global);
          if (norm) return norm;
        }
      } catch (_) {}

      // Multi-línea: preferir lineas_status (suele ser la fuente más confiable en TEAM_LINEAS)
      try {
        const ls = lead?.lineas_status || lead?.lineasStatus || lead?.lineasStatusMap || null;
        if (ls && Object.prototype.hasOwnProperty.call(ls, idx)) {
          return __lineasStatNormalizeStatus(ls[idx]);
        }
      } catch (_) {}

      try {
        const rawLs = lead?._raw?.lineas_status || lead?._raw?.lineasStatus || lead?._raw?.lineasStatusMap || null;
        if (rawLs && Object.prototype.hasOwnProperty.call(rawLs, idx)) {
          return __lineasStatNormalizeStatus(rawLs[idx]);
        }
      } catch (_) {}

      // Fallback: lead.lines[idx].status/estado
      try {
        const lines = Array.isArray(lead?.lines) ? lead.lines : (Array.isArray(lead?.lineas) ? lead.lineas : null);
        const row = lines && lines[idx] ? lines[idx] : null;
        if (row && (row.estado || row.status)) {
          return __lineasStatNormalizeStatus(row.estado || row.status);
        }
      } catch (_) {}

      try {
        const global = lead?.status ?? lead?.STATUS ?? lead?.estado;
        const norm = __lineasStatNormalizeStatus(global);
        if (norm) return norm;
      } catch (_) {}

      return 'PENDING';
    }

    function updateGlobalKPIs(allLeads) {

      let totalVentas = allLeads.length;
      let totalLineasActivas = 0;
      let totalLineasPendientes = 0;
      let totalLineasCanceladas = 0;
      let totalVentasPendientes = 0; // Leads con status pending
      let totalVentasLineas = 0; // Total de líneas sin importar status

      allLeads.forEach(lead => {
        const cantidadLineas = __getLineCount(lead);
        const statusGlobal = (lead.status || '').toLowerCase();

        totalVentasLineas += cantidadLineas;

        // Sumar colchón si está activo
        if (sumarColchonActivo) {
          totalVentas += (lead.colchon_ventas || 0);
          totalVentasLineas += (lead.colchon_lineas || 0);
        }

        // Contar ventas pendientes (leads con status pending)
        if (statusGlobal.includes('pending')) {
          totalVentasPendientes++;
        }

        for (let i = 0; i < cantidadLineas; i++) {
          const lineStatus = __getLineStatus(lead, i);
          if (__isActiveLikeStatus(lineStatus)) totalLineasActivas++;
          else if (__isPendingLikeStatus(lineStatus)) totalLineasPendientes++;
          else if (__isCancelledLikeStatus(lineStatus)) totalLineasCanceladas++;
        }
      });
      
      // Actualizar KPIs globales en el DOM
      document.getElementById('kpi-global-ventas').textContent = totalVentas;
      document.getElementById('kpi-global-activas').textContent = totalLineasActivas;
      document.getElementById('kpi-global-lineas-pendientes').textContent = totalLineasPendientes;
      document.getElementById('kpi-global-lineas-canceladas').textContent = totalLineasCanceladas;
      document.getElementById('kpi-global-ventas-lineas').textContent = totalVentasLineas;
      
    }

          categories: agentes,
          labels: {
            skew3d: false,
            style: {
              fontSize: '11px',
              fontWeight: '600',
              color: '#e2e8f0'
            },
            rotation: -45
          },
          lineColor: 'rgba(255,255,255,0.2)',
          tickColor: 'rgba(255,255,255,0.2)'
        },
        yAxis: {
          title: { text: null },
          labels: { enabled: false },
          gridLineWidth: 0
        },
        tooltip: {
          backgroundColor: 'rgba(10,20,60,0.90)',
          borderColor: 'rgba(255,255,255,0.15)',
          borderRadius: 8,
          style: { color: '#f0f4ff', fontSize: '13px' },
          headerFormat: '<b style="color:#a78bfa">{point.key}</b><br>',
          pointFormat: '<span style="color:#94a3b8">{series.name}:</span> <b style="color:#f0f4ff">{point.y}</b>'
        },
        plotOptions: {
          column: {
            depth: 70,
            dataLabels: {
              enabled: true,
              format: '{point.y}',
              style: {
                color: '#ffffff',
                fontSize: '14px',
                fontWeight: 'bold',
                textOutline: '2px rgba(0,0,0,0.6)'
              }
            },
            groupZPadding: 10,
            borderWidth: 0
          }
        },
        legend: {
          align: 'center',
          verticalAlign: 'top',
          layout: 'horizontal',
          itemStyle: {
            fontSize: '14px',
            fontWeight: 'bold',
            color: '#e2e8f0'
          },
          itemHoverStyle: { color: '#ffffff' }
        },
        series: [
          {
            name: 'Ventas',
            data: ventasData,
            color: {
              linearGradient: { x1: 0, x2: 0, y1: 0, y2: 1 },
              stops: [
                [0, '#818cf8'],
                [0.5, '#6366f1'],
                [1, '#4f46e5']
              ]
            }
          },
          {
            name: 'Líneas',
            data: lineasData,
            color: {
              linearGradient: { x1: 0, x2: 0, y1: 0, y2: 1 },
              stops: [
                [0, '#34d399'],
                [0.5, '#10b981'],
                [1, '#059669']
              ]
            }
          }
        ]
      });
    }

    document.addEventListener('DOMContentLoaded', function(){
      if (window.loadSidebar) window.loadSidebar();

      // Construir las tarjetas de team antes de cargar datos
      renderTeamCards();

      // Configurar navegación mensual
      updateMonthDisplay();
      
      document.getElementById('btn-prev-month').addEventListener('click', goToPreviousMonth);
      document.getElementById('btn-next-month').addEventListener('click', goToNextMonth);
      document.getElementById('btn-current-month').addEventListener('click', goToCurrentMonth);
      document.getElementById('btn-sumar-colchon').addEventListener('click', toggleSumarColchon);
      
      // Cargar estadísticas del mes actual
      loadEstadisticas();
      // Tiempo real: recarga al cambiar datos de líneas (los charts hacen destroy/re-render).
      if (window.CRMRealtime) CRMRealtime.connect('lineas', loadEstadisticas);
    });
  </script>
</body>
</html>
