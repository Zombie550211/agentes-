  <script>
    (function guard(){
      try{
        const user = JSON.parse(localStorage.getItem('user')||sessionStorage.getItem('user')||'{}');
        const role = String(user.role||'').toLowerCase();
        const team = String(user.team||'').toLowerCase();
        const username = String(user.username||'').toLowerCase();
        const isTeamLineas = role==='teamlineas' || role==='lineas-agentes' || role==='supervisor team lineas' || (role==='supervisor' && team.includes('lineas')) || team.includes('lineas') || username.startsWith('lineas-');
        const isAdmin = role === 'admin' || role === 'administrador';
        const isBackoffice = role === 'backoffice' || role === 'back office' || role === 'back_office' || role === 'bo' || role === 'b.o' || role === 'b:o' || role === 'b-o';
        const isRolIcon = role === 'rol_icon' || role === 'rol-icon' || role === 'rolicon';
        const ok = isTeamLineas || isAdmin || isBackoffice || isRolIcon;
        if(!ok){ window.location.replace('/login.html'); }
      }catch(e){ window.location.replace('/login.html'); }
    })();
  </script>

  <script>
    /* ── Imagen del Lead ── */
    var _llImgFile = null;

    function _llImgSelect(e) {
      var file = e.target.files[0];
      if (file) _llImgSetPreview(file);
    }

    function _llImgDrop(e) {
      e.preventDefault();
      var zone = document.getElementById('ll-img-zone');
      zone.style.borderColor = '#cbd5e1';
      zone.style.background = '#f8fafc';
      var file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) _llImgSetPreview(file);
    }

    function _llImgSetPreview(file) {
      _llImgFile = file;
      var reader = new FileReader();
      reader.onload = function(ev) {
        var preview = document.getElementById('ll-img-preview');
        preview.src = ev.target.result;
        preview.style.display = 'block';
        document.getElementById('ll-img-placeholder').style.display = 'none';
        document.getElementById('ll-img-hint').style.display = 'block';
        document.getElementById('ll-img-remove').style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    function _llImgRemove() {
      _llImgFile = null;
      document.getElementById('ll-img-input').value = '';
      var preview = document.getElementById('ll-img-preview');
      preview.src = '';
      preview.style.display = 'none';
      document.getElementById('ll-img-placeholder').style.display = 'flex';
      document.getElementById('ll-img-hint').style.display = 'none';
      document.getElementById('ll-img-remove').style.display = 'none';
    }

    function _llImgLightbox() {
      var src = document.getElementById('ll-img-preview').src;
      if (!src) return;
      var overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:99999;display:flex;align-items:center;justify-content:center;cursor:zoom-out;padding:20px;';
      overlay.innerHTML = '<img src="/'+src+'" style="max-width:92vw;max-height:90vh;border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,.6);">';
      overlay.onclick = function(){ document.body.removeChild(overlay); };
      document.body.appendChild(overlay);
    }

    async function _llUploadImg() {
      if (!_llImgFile) return '';
      var formData = new FormData();
      formData.append('file', _llImgFile);
      var token = (localStorage.getItem('token') || '').trim();
      var res = await fetch('/api/files/upload', {
        method: 'POST',
        credentials: 'include',
        headers: token ? { 'Authorization': 'Bearer ' + token } : {},
        body: formData
      });
      if (!res.ok) throw new Error('Error subiendo imagen');
      var data = await res.json();
      return (data.data && data.data.url) || data.file_path || data.url || '';
    }
  </script>

  <script>
    /* ── Reloj en vivo ── */
    (function(){
      const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      function tick() {
        const n = new Date();
        const h = n.getHours(), m = n.getMinutes(), s = n.getSeconds();
        const ampm = h >= 12 ? 'PM' : 'AM';
        document.getElementById('ll-clock-time').textContent =
          String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0') + ' ' + ampm;
        document.getElementById('ll-clock-date').textContent =
          DAYS[n.getDay()] + ' ' + n.getDate() + ' ' + MONTHS[n.getMonth()] + ' ' + n.getFullYear();
      }
      tick();
      setInterval(tick, 1000);
    })();

    /* ── Toggle pills ── */
    document.querySelectorAll('.ll-pill').forEach(function(pill) {
      pill.addEventListener('click', function() {
        var group = this.dataset.group;
        document.querySelectorAll('.ll-pill[data-group="' + group + '"]').forEach(function(p){ p.classList.remove('active'); });
        this.classList.add('active');
      });
    });

    function getToggleValue(group) {
      var active = document.querySelector('.ll-pill.active[data-group="' + group + '"]');
      return active ? active.dataset.value : '';
    }

    function setToggleValue(group, value) {
      document.querySelectorAll('.ll-pill[data-group="' + group + '"]').forEach(function(p){ p.classList.remove('active'); });
      var target = document.querySelector('.ll-pill[data-group="' + group + '"][data-value="' + value + '"]');
      if (target) target.classList.add('active');
    }

    /* ── Cantidad de líneas ── */
    document.querySelectorAll('.ll-num-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.ll-num-btn').forEach(function(b){ b.classList.remove('active'); });
        this.classList.add('active');
        renderLines();
      });
    });

    function getCantidadLineas() {
      var active = document.querySelector('.ll-num-btn.active');
      return active ? parseInt(active.dataset.num, 10) : 1;
    }

    function buildSvcOptions(selected) {
      var opts = ['WIRELESS','SIM WIRELES','TABLETS','RELOJ'];
      return opts.map(function(o){
        return '<option value="' + o + '"' + (selected === o ? ' selected' : '') + '>' + o + '</option>';
      }).join('');
    }

    function renderLines() {
      var n = getCantidadLineas();
      var container = document.getElementById('linesContainer');
      var saved = {};
      for (var i = 1; i <= 5; i++) {
        var telEl = document.getElementById('tel_' + i);
        var svcEl = document.getElementById('svc_' + i);
        if (telEl) saved[i] = { tel: telEl.value, svc: svcEl ? svcEl.value : 'WIRELESS' };
      }
      container.innerHTML = '';
      for (var i = 1; i <= n; i++) {
        var val = saved[i] || { tel: '', svc: 'WIRELESS' };
        var div = document.createElement('div');
        div.className = 'll-line-block open';
        div.innerHTML =
          '<div class="ll-line-header" onclick="this.closest(\'.ll-line-block\').classList.toggle(\'open\')">' +
            '<span class="ll-line-badge">Línea ' + i + '</span>' +
            '<span class="ll-line-hint">Teléfono + Servicio</span>' +
            '<i class="fa fa-chevron-down ll-line-chevron"></i>' +
          '</div>' +
          '<div class="ll-line-body">' +
            '<div class="ll-grid">' +
              '<div class="ll-field">' +
                '<label>Número de Teléfono *</label>' +
                '<input type="tel" id="tel_' + i + '" required placeholder="Tu respuesta" value="' + val.tel + '" />' +
              '</div>' +
              '<div class="ll-field">' +
                '<label>Servicio *</label>' +
                '<select id="svc_' + i + '" required>' + buildSvcOptions(val.svc) + '</select>' +
              '</div>' +
            '</div>' +
          '</div>';
        container.appendChild(div);
      }
      attachPhoneNormalizers();
    }

    function attachPhoneNormalizers() {
      var handler = function(e) {
        var t = e.target;
        var start = t.selectionStart;
        t.value = t.value.replace(/\D+/g, '');
        try { t.setSelectionRange(start, start); } catch(ex) {}
      };
      var ids = ['telefono_principal'];
      var n = getCantidadLineas();
      for (var i = 1; i <= n; i++) ids.push('tel_' + i);
      ids.forEach(function(id) {
        var el = document.getElementById(id);
        if (el && !el._normalized) {
          ['input','paste','change','blur'].forEach(function(ev){ el.addEventListener(ev, handler); });
          el._normalized = true;
        }
      });
    }

  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.loadSidebar) window.loadSidebar();

      var f = document.getElementById('lineasForm');
      var msg = document.getElementById('msg');
      var diaVenta = document.getElementById('dia_venta');
      var assignWrap = document.getElementById('assignWrap');
      var agentAssign = document.getElementById('agentAssign');

      function todayLocal() {
        var now = new Date();
        return now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
      }
      diaVenta.value = todayLocal();

      renderLines();
      attachPhoneNormalizers();

      /* Selector de agente — visible para Admin y Backoffice, carga desde API */
      (function initAgentAssign() {
        try {
          var user = JSON.parse(localStorage.getItem('user')||sessionStorage.getItem('user')||'{}');
          var roleLc = String(user.role||'').toLowerCase();
          var isAdmin = roleLc.includes('admin') || roleLc === 'administrador' ||
                        roleLc.includes('backoffice') || roleLc.includes('back office') ||
                        roleLc === 'bo' || roleLc === 'b.o' || roleLc === 'rol_icon' ||
                        roleLc === 'icon' || roleLc === 'bamo';
          if (!isAdmin || !assignWrap || !agentAssign) return;

          assignWrap.style.display = 'block';

          var token = (localStorage.getItem('token') || '').trim();
          fetch('/api/users/agents', {
            credentials: 'include',
            headers: token ? { 'Authorization': 'Bearer ' + token } : {}
          })
          .then(function(r){ return r.ok ? r.json() : null; })
          .then(function(data) {
            if (!data) { document.getElementById('agentAssignNote').textContent = 'No se pudo cargar la lista.'; return; }
            var users = data.agents || data.data || data.users || [];
            var getName = function(u){ return (u.name||u.fullName||u.nombre||u.username||'').trim(); };
            // Filtrar agentes del team lineas o agentes generales
            var agentes = users.filter(function(u){
              var r = String(u.role||'').toLowerCase();
              var t = String(u.team||'').toLowerCase();
              return r.includes('agente') || r.includes('vendedor') || r.includes('agent') ||
                     r.includes('teamlineas') || r.includes('lineas') || t.includes('lineas');
            }).sort(function(a,b){ return getName(a).localeCompare(getName(b)); });

            agentAssign.innerHTML = '<option value="">— Selecciona agente —</option>' +
              agentes.map(function(u){
                var n = getName(u);
                return n ? '<option value="'+n+'">'+n+'</option>' : '';
              }).join('');

            var note = document.getElementById('agentAssignNote');
            if (note) note.textContent = agentes.length + ' agentes disponibles';
          })
          .catch(function(){ document.getElementById('agentAssignNote').textContent = 'Error cargando agentes.'; });
        } catch(e) {}
      })();

      f.addEventListener('submit', async function(e) {
        e.preventDefault();
        msg.textContent = 'Enviando...';
        msg.style.color = '#64748b';

        var n = getCantidadLineas();
        var telefonos = [], servicios = [], lines = [];
        var status = getToggleValue('status') || 'pending';
        var defaultLineStatus = status.toLowerCase() === 'pending' ? 'PENDING' : status.toUpperCase();

        var _cleanTel = function(v){ var d=(v||'').replace(/\D+/g,''); return /^0+$/.test(d)?'':d; };

        for (var i = 1; i <= n; i++) {
          var v = _cleanTel(document.getElementById('tel_'+i).value);
          var s = (document.getElementById('svc_'+i)||{}).value || 'WIRELESS';
          telefonos.push(v);
          servicios.push(s);
          lines.push({ telefono: v, servicio: s, estado: defaultLineStatus });
        }

        var payload = {
          nombre_cliente: document.getElementById('nombre_cliente').value,
          telefono_principal: _cleanTel(document.getElementById('telefono_principal').value),
          numero_cuenta: document.getElementById('numero_cuenta').value,
          autopay: getToggleValue('autopay') || 'si',
          pin_seguridad: document.getElementById('pin_seguridad').value,
          direccion: document.getElementById('direccion').value,
          servicios: servicios,
          lines: lines,
          dia_venta: document.getElementById('dia_venta').value,
          dia_instalacion: document.getElementById('dia_instalacion').value,
          status: status,
          cantidad_lineas: n,
          telefonos: telefonos,
          id: document.getElementById('id_field').value,
          mercado: getToggleValue('mercado') || 'BAMO',
          supervisor: getToggleValue('supervisor') || 'JONATHAN F',
          agenteAsignado: (agentAssign && assignWrap && assignWrap.style.display !== 'none' ? String(agentAssign.value||'').trim() : ''),
          imagen_url: ''
        };

        try {
          if (_llImgFile) {
            msg.textContent = 'Subiendo imagen...';
            payload.imagen_url = await _llUploadImg();
          }
          var resp = await fetch('/api/lineas', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify(payload)
          });
          var data = await resp.json();
          if (!resp.ok || data.success === false) {
            // Mensaje específico del servidor (incluye detalles del duplicado si es 409)
            var errMsg = data.message || data.detail || (data.errors||[]).join(', ') || 'Error al crear';
            if (typeof errMsg === 'object') errMsg = errMsg.message || JSON.stringify(errMsg);
            throw new Error(String(errMsg));
          }

          msg.style.color = '#22d3ee';
          msg.textContent = '✓ Creado correctamente';
          f.reset();
          _llImgRemove();
          setToggleValue('autopay', 'si');
          setToggleValue('status', 'pending');
          setToggleValue('mercado', 'BAMO');
          setToggleValue('supervisor', 'JONATHAN F');
          document.querySelectorAll('.ll-num-btn').forEach(function(b){ b.classList.remove('active'); });
          document.querySelector('.ll-num-btn[data-num="1"]').classList.add('active');
          renderLines();
          attachPhoneNormalizers();
          diaVenta.value = todayLocal();
        } catch(err) {
          msg.style.color = '#ef4444';
          msg.textContent = String(err.message || 'Error al crear');
        }
      });
    });
  </script>
</body>
</html>
