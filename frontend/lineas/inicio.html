<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Outfit',sans-serif}

/* ── FONDO DARK ── */
body{
  background:#060c1e;
  background-image:
    radial-gradient(ellipse 70% 50% at 10% 0%,   rgba(0,100,255,.18) 0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 90% 5%,   rgba(0,200,255,.12) 0%,transparent 50%),
    radial-gradient(ellipse 40% 60% at 80% 95%,  rgba(124,58,237,.15) 0%,transparent 55%),
    radial-gradient(ellipse 60% 40% at 5%  90%,  rgba(0,150,255,.10) 0%,transparent 50%);
  color:#e2e8f0;
}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,200,255,.20);border-radius:4px}

/* ── VARIABLES ── */
:root{
  --neon:#00e5ff;
  --neon2:#0066ff;
  --purple:#7c3aed;
  --amber:#f59e0b;
  --green:#10b981;
  --red:#ef4444;
  --glass:rgba(8,18,48,0.72);
  --glass-b:rgba(0,180,255,.10);
  --glass-b2:rgba(0,180,255,.20);
  --ink:#e2e8f0;
  --ink2:#94a3b8;
  --ink3:#475569;
}

/* ── LAYOUT ── */
html,body{height:100%;overflow:hidden}

/* El sidebar usa position:fixed — main-content ocupa toda la pantalla
   y el sistema de auto-hide (sidebar-shared.css) le aplica margin-left */
.main-content{
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:margin-left .18s ease;
  z-index:10;
}

/* sidebar-shared.css ya aplica margin-left a .main-content en auto-hide */

/* glass-cards.css fuerza position:relative !important sobre .main-content y
   rompe el anclaje a pantalla (la página crece con el contenido en vez de
   hacer scroll interno). Mayor especificidad para restaurar el fixed. */
body .main-content{position:fixed!important;top:0;left:0;right:0;bottom:0}

/* ── TOPBAR ── */
.topbar{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;height:52px;
  background:rgba(6,12,30,.85);border-bottom:1px solid rgba(0,200,255,.08);
  backdrop-filter:blur(20px);
}
.topbar-brand{display:flex;align-items:center;gap:10px}
.tb-logo{width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,var(--neon2),var(--neon));
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:#fff;
  box-shadow:0 0 16px rgba(0,229,255,.35)}
.tb-title{font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:700;color:var(--ink)}
.tb-sub{font-size:.60rem;color:var(--ink3);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.tb-date{font-size:.70rem;color:var(--ink3)}
.tb-user{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;
  background:rgba(0,200,255,.06);border:1px solid rgba(0,200,255,.14);
  border-radius:50px;cursor:pointer}
.tb-av{width:26px;height:26px;border-radius:50%;
  background:linear-gradient(135deg,var(--neon2),var(--neon));
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:800;color:#fff;
  box-shadow:0 0 10px rgba(0,229,255,.40)}
.tb-uname{font-size:.72rem;font-weight:600;color:var(--ink)}
.tb-urole{font-size:.58rem;color:var(--ink3)}

/* ── PAGE ── */
.page{
  flex:1;min-height:0;overflow:hidden;
  display:grid;
  /* minmax(0,1fr): el contenido no puede estirar las filas (1fr = minmax(auto,1fr)) */
  grid-template-rows:minmax(0,1fr) minmax(0,1fr);
  grid-template-columns:1fr;
  gap:10px;padding:10px 14px 10px;
}


/* ── ROW 2: Welcome + Chart + Mini stats ── */
.row2{display:grid;grid-template-columns:260px 1fr 220px;grid-template-rows:minmax(0,1fr);gap:10px;min-height:0}

/* Welcome card */
.welcome-card{
  background:var(--glass);border:1px solid var(--glass-b);border-radius:16px;
  backdrop-filter:blur(24px);overflow:hidden;display:flex;flex-direction:column;
  position:relative;
}
.wc-bg{
  position:absolute;inset:0;
  background:linear-gradient(160deg,rgba(0,80,200,.25) 0%,rgba(124,58,237,.15) 50%,transparent 100%);
  pointer-events:none;
}
.wc-body{position:relative;z-index:1;padding:18px;flex:1;min-height:0;display:flex;flex-direction:column;gap:12px}
.wc-tag{font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--neon);opacity:.8}
.wc-name{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;
  color:#fff;line-height:1.2}
.wc-role{font-size:.68rem;color:var(--ink2);margin-top:2px}
.wc-divider{height:1px;background:rgba(0,200,255,.10);margin:4px 0}
.wc-stat-row{display:flex;flex-direction:column;gap:6px}
.wc-stat{display:flex;justify-content:space-between;align-items:center}
.wc-stat-lbl{font-size:.65rem;color:var(--ink3)}
.wc-stat-val{font-size:.75rem;font-weight:700;color:var(--ink)}
.wc-pill{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;
  background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.18);
  border-radius:50px;font-size:.65rem;color:var(--neon);font-weight:600;
  margin-top:auto;cursor:pointer;text-decoration:none;transition:background .15s}
.wc-pill:hover{background:rgba(0,229,255,.14)}
.wc-pill i{font-size:.60rem}

/* Chart panel */
.chart-panel{
  background:var(--glass);border:1px solid var(--glass-b);border-radius:16px;
  backdrop-filter:blur(24px);display:flex;flex-direction:column;overflow:hidden;
  position:relative;
}
.cp-header{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 8px;
}

.cp-title{font-size:.72rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em}
.cp-val{font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700;
  color:var(--neon);text-shadow:0 0 20px rgba(0,229,255,.50);line-height:1;margin-top:2px}
.cp-delta{font-size:.68rem;color:#34d399;font-weight:600;margin-top:2px}
.cp-legend{display:flex;gap:14px}
.cp-leg-item{display:flex;align-items:center;gap:5px;font-size:.62rem;color:var(--ink3)}
.cp-leg-dot{width:8px;height:8px;border-radius:50%}
.cp-chart{flex:1;min-height:0}

/* Mini stats panel */
.mini-panel{
  background:var(--glass);border:1px solid var(--glass-b);border-radius:16px;
  backdrop-filter:blur(24px);display:flex;flex-direction:column;gap:8px;
  padding:14px;overflow:hidden;
}
.mp-title{font-size:.62rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:2px}
.mp-big{font-family:'Space Grotesk',sans-serif;font-size:1.8rem;font-weight:700;
  color:var(--ink);line-height:1}
.mp-sub{font-size:.62rem;color:var(--ink3);margin-top:1px;margin-bottom:4px}
.mp-divider{height:1px;background:rgba(0,200,255,.08)}
.mp-agent{display:flex;align-items:center;gap:7px;padding:5px 0}
.mp-ag-av{width:26px;height:26px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:800;color:#fff}
.mp-ag-info{flex:1;min-width:0}
.mp-ag-name{font-size:.68rem;font-weight:600;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mp-ag-role{font-size:.56rem;color:var(--ink3)}
.mp-ag-val{font-size:.70rem;font-weight:700;color:var(--neon);flex-shrink:0}
.mp-bar-row{margin-top:2px}
.mp-bar{height:3px;border-radius:4px;background:rgba(255,255,255,.06);overflow:hidden}
.mp-bar-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.34,1.56,.64,1)}

/* ── ROW 3: Ranking + Recientes ── */
.row3{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:minmax(0,1fr);gap:10px;min-height:0}

.table-panel{
  background:var(--glass);border:1px solid var(--glass-b);border-radius:16px;
  backdrop-filter:blur(24px);display:flex;flex-direction:column;overflow:hidden;
}
.tp-header{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid rgba(0,200,255,.06);
}
.tp-title{font-size:.72rem;font-weight:700;color:var(--ink);
  text-transform:uppercase;letter-spacing:.05em}
.tp-link{font-size:.62rem;color:var(--neon);text-decoration:none;opacity:.8}
.tp-link:hover{opacity:1}
.tp-body{flex:1;overflow-y:auto;padding:0 6px 6px}
.tp-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:10px;
  transition:background .12s;cursor:default}
.tp-row:hover{background:rgba(0,200,255,.04)}
.tp-num{font-size:.60rem;font-weight:800;color:var(--ink3);width:14px;flex-shrink:0;text-align:center}
.tp-av{width:28px;height:28px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:.60rem;font-weight:800;color:#fff}
.tp-info{flex:1;min-width:0}
.tp-name{font-size:.70rem;font-weight:600;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tp-team{font-size:.58rem;color:var(--ink3)}
.tp-bar-wrap{width:80px;flex-shrink:0}
.tp-bar{height:3px;border-radius:4px;background:rgba(255,255,255,.05);overflow:hidden}
.tp-bar-fill{height:100%;border-radius:4px}
.tp-pts{font-size:.68rem;font-weight:700;color:var(--neon);width:36px;text-align:right;flex-shrink:0}

/* Recent activity */
.act-list{flex:1;overflow-y:auto;padding:0 6px 6px}
.act-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:10px;
  transition:background .12s}
.act-row:hover{background:rgba(0,200,255,.04)}
.act-icon{width:30px;height:30px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:.72rem}
.act-info{flex:1;min-width:0}
.act-name{font-size:.70rem;font-weight:600;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act-meta{font-size:.58rem;color:var(--ink3);margin-top:1px}
.act-tag{font-size:.58rem;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0}
.tag-ok {background:rgba(16,185,129,.12);color:#34d399}
.tag-pen{background:rgba(245,158,11,.12);color:#fbbf24}
.tag-can{background:rgba(239,68,68,.10);color:#f87171}

/* ── Top Líneas (welcome card) ── */
.tl-row{display:flex;align-items:center;gap:7px;padding:4px 6px;border-radius:8px;transition:background .12s}
.tl-row:hover{background:rgba(0,229,255,.04)}
.tl-pos{font-size:.58rem;font-weight:800;color:var(--ink3);width:14px;text-align:center;flex-shrink:0}
.tl-av{width:24px;height:24px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.52rem;font-weight:800;color:#fff}
.tl-name{flex:1;font-size:.66rem;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.tl-val{font-size:.70rem;font-weight:700;flex-shrink:0}
.tl-sub{font-size:.54rem;color:var(--ink3);margin-top:1px}

/* ── NEON BADGE podio ── */
.neon-badge{
  width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.52rem;font-weight:900;color:#fff;flex-shrink:0;
}

/* ── Skeleton loader ── */
.skel{background:rgba(255,255,255,.04);border-radius:8px;animation:skel-pulse 1.4s ease-in-out infinite}
@keyframes skel-pulse{0%,100%{opacity:.3}50%{opacity:.7}}

/* ── Responsive ── */
@media(max-width:1200px){
  .row2{grid-template-columns:220px 1fr 200px}
  .kcard-val{font-size:1.2rem}
}
@media(max-width:1000px){
  html,body{overflow:auto;height:auto}
  body .main-content{position:static!important;height:auto!important;overflow-y:auto!important;top:auto!important;left:auto!important;right:auto!important;bottom:auto!important}
  .page{grid-template-rows:auto auto auto;overflow:visible;height:auto}
  .row2{grid-template-columns:1fr;grid-template-rows:auto 260px auto;grid-auto-rows:auto}
  /* En layout apilado las filas son auto — tope para que la lista haga scroll */
  .welcome-card{max-height:420px}
  .row3{grid-template-columns:1fr}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
}
body { background: #FF0000 !important; }
body::before {

  position: fixed; inset: 0; z-index: -1;
  background: url('/images/ESTADIOOO.jpeg') center center / cover no-repeat;
  opacity: 0.55;
  pointer-events: none;
}
</style>

<script>
'use strict';
/* ═══════════════════════════════════════
   DASHBOARD — Team Líneas  (dark neon)
═══════════════════════════════════════ */

const $ = id => document.getElementById(id);
const fmt = d => { const p = n => String(n).padStart(2,'0'); const dd=new Date(d); return `${dd.getFullYear()}-${p(dd.getMonth()+1)}-${p(dd.getDate())}`; };
const initials = s => String(s||'').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?';
const capFirst = s => String(s||'').split(/\s+/).map(w=>w?w[0].toUpperCase()+w.slice(1):'').join(' ');
/* Escapa HTML para interpolar datos del servidor en innerHTML sin riesgo de XSS.
   (No usar con textContent — ahí el escape lo hace el navegador.) */
const escH = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const PALETTE  = ['#00e5ff','#0ea5e9','#6366f1','#f59e0b','#10b981','#ec4899','#a78bfa','#f97316'];
const colorFor = s => { let h=0; for(const c of String(s||'')) h=(h*31+c.charCodeAt(0))&0xffff; return PALETTE[h%PALETTE.length]; };
const MONTHS   = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

/* ── Usuario ── */
let _user = null;
try{ _user = JSON.parse(localStorage.getItem('user')||sessionStorage.getItem('user')||'null'); }catch(_){}
const _role    = String(_user?.role||'').toLowerCase();
const _isSup   = _role.includes('supervisor');
/* Admin/Backoffice ven datos globales — el backend ya limita por rol,
   este filtro extra solo aplica a agentes (sus propias ventas) */
const _seesAll = _isSup || /admin|administra|backoffice|back_office/.test(_role);

/* ── Fecha local ──
   new Date('2026-06-01') se interpreta como medianoche UTC y en zona UTC-6
   cae en el 31 de mayo — las ventas del día 1 se contaban en el mes anterior.
   Parsear Y/M/D a mano crea la fecha en hora local, sin desfase. */
function parseLocalDate(raw){
  if(!raw) return null;
  const m=String(raw).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return new Date(+m[1],+m[2]-1,+m[3]);
  const d=new Date(raw);
  return isNaN(d)?null:d;
}

/* ── Fetch ── */
async function fetchLineas(url){
  try{
    const r = await fetch(url,{credentials:'include'});
    if(!r.ok) return [];
    const j = await r.json();
    return Array.isArray(j)?j:(j.data||j.leads||j.clientes||[]);
  }catch(_){ return []; }
}

/* ── Filtro rol ── */
function filterForUser(leads){
  if(_seesAll) return leads;
  const disp = _myUname.replace(/\./g,' ').replace(/_/g,' ').toUpperCase();
  return leads.filter(l=>{
    const ag = String(l.agente||l.agenteNombre||'').toLowerCase();
    return ag===_myUname||ag.toUpperCase()===disp;
  });
}

let _apexChart = null;

/* Mismo estilo que la gráfica de Ventas Mensuales de inicio residencial
   (paleta de su modo oscuro — esta página es oscura fija) */
function _apexOpts(cats,data){
  const textColor='#cbd5e1', gridColor='rgba(148,163,184,.10)';
  const tooltipBg='#1e293b', tooltipTxt='#e2e8f0';
  const lineColor='#818cf8', dotColor='#c7d2fe', gradHex='#818cf8';
  return{
    series:[{name:'Ventas',data}],
    chart:{type:'area',height:'100%',background:'transparent',toolbar:{show:false},animations:{enabled:false}},
    stroke:{curve:'smooth',width:3,colors:[lineColor]},
    fill:{type:'gradient',gradient:{shadeIntensity:1,opacityFrom:0.55,opacityTo:0.02,stops:[0,95]}},
    colors:[gradHex],
    markers:{size:4,colors:[dotColor],strokeColors:tooltipBg,strokeWidth:2,hover:{size:7}},
    xaxis:{
      categories:cats,
      labels:{style:{colors:textColor,fontSize:'11px',fontFamily:'Outfit,sans-serif',fontWeight:600}},
      axisBorder:{show:false},axisTicks:{show:false}
    },
    yaxis:{
      min:0,forceNiceScale:true,
      labels:{style:{colors:textColor,fontSize:'11px',fontFamily:'Outfit,sans-serif',fontWeight:600},formatter:v=>Math.round(v)}
    },
    grid:{
      borderColor:gridColor,strokeDashArray:4,
      xaxis:{lines:{show:false}},yaxis:{lines:{show:true}},
      padding:{top:0,right:8,bottom:0,left:4}
    },
    tooltip:{
      theme:'dark',style:{fontSize:'12px'},
      custom({series,seriesIndex,dataPointIndex,w}){
        const val=series[seriesIndex][dataPointIndex];
        const cat=w.globals.labels[dataPointIndex];
        return '<div style="background:'+tooltipBg+';color:'+tooltipTxt+';padding:8px 13px;border-radius:10px;'
          +'border:1px solid rgba(99,102,241,.25);box-shadow:0 8px 24px rgba(0,0,0,.18);font-family:Outfit,sans-serif;font-size:12px">'
          +'<div style="font-size:10px;font-weight:600;color:'+lineColor+';margin-bottom:2px">'+cat+'</div>'
          +'<div style="font-size:16px;font-weight:800">'+val+' <span style="font-size:10px;opacity:.7">ventas</span></div>'
          +'</div>';
      }
    },
    dataLabels:{enabled:false},legend:{show:false}
  };
}

/* Animación de dibujo del trazo — portada de inicio residencial */
function _animateChartDraw(container){
  const svg=container.querySelector('svg');
  if(!svg) return;

  /* El trazo principal está en .apexcharts-line o .apexcharts-area-series path con stroke */
  let paths=svg.querySelectorAll('.apexcharts-line, .apexcharts-area path[stroke]:not([stroke="none"])');
  if(!paths.length){
    paths=svg.querySelectorAll('path[stroke]:not([stroke="none"]):not([stroke="transparent"])');
  }

  paths.forEach(function(path){
    const len=path.getTotalLength?path.getTotalLength():0;
    if(!len) return;
    path.style.strokeDasharray=len;
    path.style.strokeDashoffset=len;
    path.style.transition='none';
    path.getBoundingClientRect();
    path.style.transition='stroke-dashoffset 5s cubic-bezier(.4,0,.2,1)';
    path.style.strokeDashoffset='0';
  });

  /* El área rellena aparece con fade después de un pequeño delay */
  svg.querySelectorAll('.apexcharts-area').forEach(function(fill){
    fill.style.opacity='0';
    fill.style.transition='opacity 2s ease 1.5s';
    fill.getBoundingClientRect();
    fill.style.opacity='1';
  });
}

function renderChart(data,cats){
  const el=$('apex-monthly-sales');
  if(!el||typeof ApexCharts==='undefined') return;
  if(!document.getElementById('apex-glow-style')){
    const s=document.createElement('style'); s.id='apex-glow-style';
    s.textContent='#apex-monthly-sales .apexcharts-area-series .apexcharts-series path{filter:drop-shadow(0 0 6px rgba(99,102,241,.60))} #apex-monthly-sales .apexcharts-marker{filter:drop-shadow(0 0 4px rgba(99,102,241,.80))}';
    document.head.appendChild(s);
  }
  if(_apexChart){
    _apexChart.updateOptions(_apexOpts(cats,data),true,true);
    return;
  }
  _apexChart=new ApexCharts(el,_apexOpts(cats,data));
  _apexChart.render().then(()=>_animateChartDraw(el));
}

/* ═══════ RENDER HELPERS ══════ */
/* ── Top por Líneas (welcome card) ── */
function renderTopLineas(leads){
  const el = $('wc-top-lineas');
  if (!el) return;

  /* Agrupar por agente sumando cantidad_lineas */
  const agMap = {};
  leads.forEach(l => {
    const ag = l.agente || l.agente_nombre || l.agenteNombre || 'Sin agente';
    const lineas = parseInt(l.cantidad_lineas || l.lineas || 0, 10) || 1; // default 1 si no hay dato
    if (!agMap[ag]) agMap[ag] = { name: ag, lineas: 0, ventas: 0 };
    agMap[ag].lineas += lineas;
    agMap[ag].ventas++;
  });

  const sorted = Object.values(agMap).sort((a, b) => b.lineas - a.lineas);
  if (!sorted.length) {
    el.innerHTML = '<div style="padding:10px 0;text-align:center;color:#475569;font-size:.70rem">Sin datos este mes</div>';
    return;
  }

  const medals = ['🥇','🥈','🥉'];
  const max = sorted[0].lineas;
  /* Todos los usuarios con ventas en el mes (con scroll si no caben) */
  el.innerHTML = sorted.map((ag, i) => {
    const col = colorFor(ag.name);
    const pct = Math.round((ag.lineas / max) * 100);
    return `<div class="tl-row">
      <span class="tl-pos">${medals[i] || (i+1)}</span>
      <div class="tl-av" style="background:${col};box-shadow:0 0 8px ${col}44">${escH(initials(ag.name))}</div>
      <div style="flex:1;min-width:0">
        <div class="tl-name">${escH(capFirst(ag.name))}</div>
        <div style="height:2px;background:rgba(255,255,255,.06);border-radius:4px;margin-top:3px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${col};border-radius:4px"></div>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="tl-val" style="color:${col}">${ag.lineas}<span style="font-size:.52rem;opacity:.7;margin-left:2px">líneas</span></div>
        <div class="tl-sub">${ag.ventas} ventas</div>
      </div>
    </div>`;
  }).join('');
}

function renderRankingList(sorted){

function renderRecent(leads){
  const list=$('recent-list');
  if(!list) return;
  /* Todos los registros de los últimos 30 días, del más nuevo al más viejo
     (la API ya los entrega ordenados por created_at DESC; la lista hace scroll) */
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-30); cutoff.setHours(0,0,0,0);
  let recent=leads.filter(l=>{
    const d=parseLocalDate(l.created_at||l.creadoEn||l.dia_venta);
    return d&&d>=cutoff;
  });
  if(!recent.length) recent=leads.slice(0,20);
  const statusTag=s=>{
    const sl=(s||'').toLowerCase();
    if(sl==='cali'||sl==='instalado'||sl==='completado') return 'tag-ok';
    if(sl==='pending'||sl==='pendiente') return 'tag-pen';
    return 'tag-can';
  };
  list.innerHTML=recent.map(l=>{
    const name=l.nombre_cliente||l.nombre||'—';
    const agente=l.agente||l.agenteNombre||'Sin agente';
    const status=l.status||'—';
    const tag=statusTag(status);
    const col=colorFor(agente);
    return `<div class="act-row">
      <div class="act-icon" style="background:${col}22;color:${col}"><i class="fas fa-user"></i></div>
      <div class="act-info">
        <div class="act-name">${escH(capFirst(name))}</div>
        <div class="act-meta">${escH(capFirst(agente))} · ${escH(l.mercado||'—')}</div>
      </div>
      <span class="act-tag ${tag}">${escH(status)}</span>
    </div>`;
  }).join('');
}

/* ═══════ LOAD DASHBOARD ══════ */
let _firstLoad=true;
async function loadDashboard(){
  // 1ª carga: reusa el prefetch (_allFetch). Recargas posteriores (tiempo real):
  // vuelve a consultar para traer los datos frescos.
  const allData=_firstLoad ? await _allFetch : await fetchLineas('/api/lineas-team');
  _firstLoad=false;

  /* Mes actual */
  const allMonth=allData.filter(l=>{
    const d=parseLocalDate(l.dia_venta||l.created_at||l.creadoEn);
    return d&&d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
  });
  const myMonth=filterForUser(allMonth);

  const myVentas=myMonth.length;
  const myPuntos=myMonth.reduce((s,l)=>s+parseFloat(l.puntaje||l.puntos||0),0);

  /* Top por Líneas en welcome card (mes actual) */
  renderTopLineas(filterForUser(allMonth));

  /* Ranking mensual */
  const agMap={};
  allMonth.forEach(l=>{
    const ag=l.agente||l.agente_nombre||l.agenteNombre||'Sin agente';
    if(!agMap[ag]) agMap[ag]={name:ag,ventas:0,puntos:0};
    agMap[ag].ventas++;
    agMap[ag].puntos+=parseFloat(l.puntaje||l.puntos||0);
  });
  const sorted=Object.values(agMap).sort((a,b)=>b.ventas-a.ventas);

  renderRankingList(sorted);
  renderRecent(allData);

  /* ── Top semanal ── */
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - now.getDay()); // domingo
  weekStart.setHours(0,0,0,0);
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekStart.getDate() + 6);
  weekEnd.setHours(23,59,59,999);

  const weekLeads = allData.filter(l => {
    const d = parseLocalDate(l.dia_venta || l.created_at || l.creadoEn);
    return d && d >= weekStart && d <= weekEnd;
  });

  const weekMap = {};
  weekLeads.forEach(l => {
    const ag = l.agente || l.agente_nombre || l.agenteNombre || 'Sin agente';
    if (!weekMap[ag]) weekMap[ag] = { name: ag, ventas: 0 };
    weekMap[ag].ventas++;
  });
  const weekSorted = Object.values(weekMap).sort((a,b) => b.ventas - a.ventas);

  // Etiqueta con rango de la semana
  const fmtD = d => `${d.getDate()}/${d.getMonth()+1}`;
  const lbl = $('mp-week-label');
  if (lbl) lbl.textContent = `${fmtD(weekStart)} – ${fmtD(weekEnd)}`;

  renderWeeklyAgents(weekSorted, weekLeads.length);

  /* Gráfico anual */
  const allYear=allData.filter(l=>{
    const d=parseLocalDate(l.dia_venta||l.created_at||l.creadoEn);
    return d&&d.getFullYear()===now.getFullYear();
  });
  const myYear=filterForUser(allYear);
  const counts=new Array(12).fill(0);
  myYear.forEach(l=>{
    const d=parseLocalDate(l.dia_venta||l.created_at||l.creadoEn);
    if(d) counts[d.getMonth()]++;
  });

  const totalYear=myYear.length;
  $('cp-total').textContent=totalYear;
  $('cp-delta').textContent=`ventas en ${now.getFullYear()}`;

  if(counts.every(v=>v===0)){
    const el=$('apex-monthly-sales');
    if(el) el.innerHTML='<div style="height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:#475569"><i class="fas fa-chart-area" style="font-size:2rem;opacity:.3"></i><span style="font-size:.75rem">Sin ventas este año</span></div>';
  } else {
    /* Año completo (Ene-Dic), igual que la gráfica de inicio residencial */
    renderChart(counts,MONTHS);
  }
}
