services:
  - type: web
    name: crm-agente
    env: python
    buildCommand: pip install -r CRM_PYTHON/requirements.txt
    startCommand: cd CRM_PYTHON && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/status
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: MYSQL_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
    plan: free
